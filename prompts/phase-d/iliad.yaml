# Phase D annotation prompt — Iliad (Homer).
tradition: iliad

tradition_preamble: >
  You are annotating the Iliad (Homer). The source passages provided come from an
  in-pipeline translation witness identified in each passage label — e.g. Gnedich 1829
  (Russian, public domain) or Murray 1924 (English, public domain). That witness, and
  only that witness, is your admissible textual evidence.

  GROUNDING RULE (witness-anchored):
  (1) Every annotation's primary textual evidence MUST quote or cite the in-pipeline
      witness passage shown in the passage label — quote its actual words in the
      witness's own language, and cite it as "<Witness> <book>.<line>", e.g.
      "Gnedich 1829, 1.1" or "Murray 1924, 1.1". An annotation whose only evidence is
      an edition NOT shown in the pipeline has no witness anchor and is REJECTED.
  (2) Multiple witness translations may be provided for the same passage (e.g.
      murray-1924 and gnedich-1829, each labelled). Cite whichever provided passage you
      quote and attribute it correctly. NEVER reproduce text from memory of an edition
      that was not provided in the passage labels — cite what the witnesses in front of
      you attest, not what you know from training.
  (3) M.L. West's critical edition (Teubner, 1998–2000) is the standard line-NUMBERING
      reference. A West line number may be APPENDED to the witness citation as a
      parenthetical locator (e.g. "Gnedich 1829, 1.1 (cf. West Il. 1.1)") — never
      standalone, never as the content of the annotation.
  (4) Scholarly commentary (West, Kirk 1985–1993, Richardson 1993, Janko 1992,
      Edwards 1991, Macleod 1982) is secondary: label it "West argues…"/"Kirk
      observes…", never as primary textual fact.

  ATHETISED/UNCERTAIN: where the witness marks lines as athetised or spurious, or the
  text is uncertain, hedge per epistemic_framing; do not annotate reconstructed or
  athetised content as if witnessed.

propp_fit_note: >
  Propp functions apply with POOR-TO-MODERATE fit to the Iliad. Propp derived his
  morphology from a corpus of Russian wonder tales featuring a single hero on a
  linear quest toward restoration and reward. The Iliad is structurally incompatible
  with this paradigm in several respects, and annotation must be explicit about these
  incompatibilities.

  Core structural problems:
  (a) The Iliad is a multi-protagonist war epic, not a single-hero quest. Achilles,
      Agamemnon, Hector, Diomedes, and Patroclus each have claim to heroic centrality
      in different books. Propp assumes a single hero throughout.
  (b) The Iliad has no Proppian resolution: Functions PROPP-20 (Return), PROPP-27
      (Recognition), PROPP-31 (Wedding) are absent. The poem ends with Hector's burial,
      not with restitution. This structural absence is not a flaw — it is the defining
      feature of the Iliadic narrative mode.
  (c) The aristeia (a hero's sequence of extended battlefield excellence) is the
      Iliad's own compositional unit with no Proppian equivalent. Aristeia share
      surface features with PROPP-16 (Struggle) and PROPP-18 (Victory) but are
      episodes within a continuous war, not resolutions of a quest.

  Where Propp functions do apply:
  - The poem's opening establishes a PROPP-8 (Villainy/Lack) through the seizure of
    Briseis, which triggers the narrative action.
  - Embassy scenes (Book IX) map to PROPP-9 (Mediation) and PROPP-10 (Beginning
    Counter-Action), though Achilles' refusal inverts the expected functional outcome.
  - Divine arming sequences (Book XVIII–XIX) map usefully to PROPP-14 (Receipt of
    Magical Agent).
  - Patroclus's mission (Books XVI) maps to PROPP-11 (Departure) and initiates a
    sub-sequence ending at PROPP-18 (Victory for the Trojans, inversion of expected
    polarity).

  Methodology-fit rule: Propp annotations are valid when a specific passage fits a
  specific function, provided the annotator notes where the Iliadic form diverges.
  Do NOT set methodology_fit_warning=true as a tradition-wide default — evaluate
  per passage. DO set methodology_fit_warning=true whenever you write a
  methodology_fit_note; note and warning always travel together (this is a schema
  invariant enforced by the validator). Typical triggers for per-passage warnings:
  when an aristeia is being forced into a single Propp function, when collective
  divine action is being labelled PROPP-8, or when the absence of return/resolution
  functions is being treated as a gap to annotate rather than a structural feature
  to document.

bakhtin_fit_note: >
  Bakhtin chronotopes apply with GOOD fit to the Iliad. The framework was developed
  for the European novel, not for oral epic, and that origin should be acknowledged
  in any annotation where the formulation strains; see the oral-tradition
  methodology_fit_concern in rules/tracks/bakhtin.yaml. That concern is the
  exception, not the rule — for most Iliadic passages, chronotope assignment is
  straightforward.

  Specific chronotope guidance for the Iliad:

  BAKHTIN-THRESHOLD: The dominant chronotope of battlefield scenes. Every aristeia
  and killing sequence operates at the threshold between life and death. The threshold
  is not merely metaphorical here: in the Iliad, the threshold is the actual moment
  of death, which the poem renders in extraordinary physical detail (the soul departing,
  the body falling, the name given). Apply to: all battle scenes, supplication scenes
  at the moment of killing or sparing, Hector outside the Scaean Gate (Book XXII).

  BAKHTIN-DIVINE: Apply to Olympian council scenes and moments where divine and human
  time interact. The divine chronotope in the Iliad is characterised by the gods
  watching mortal time from outside it — Zeus weighing fates on the scales (Book VIII,
  Book XXII), Hephaestus forging the shield (Book XVIII). Do not use BAKHTIN-CASTLE
  for Olympus; it is not a historical-time-saturated place but a divine-time space.

  BAKHTIN-HEROIC-BODY: A strong fit for aristeia sequences and arming scenes. In the
  Iliad, the hero's body is the primary site of narrative meaning: Achilles' armour,
  Hector's body, Patroclus's corpse are all chronotopic objects where identity, time,
  and social order are inscribed and contested.

  BAKHTIN-IDYLL: Apply specifically to Homeric similes. The extended similes
  consistently invoke peacetime scenes — ploughing, beekeeping, children building
  sandcastles, women dyeing wool — that intrude from a different temporal world
  (pre-war, peacetime, nature's cyclical time) into the battlefield. This is a
  formally distinct use of the idyllic chronotope: not a sustained idyllic world
  but a momentary irruption of idyllic time into the threshold.

  BAKHTIN-ROAD: Apply with caution and only where a journey has the road's specific
  quality of chance encounter and revelation. The embassy to Achilles (Book IX),
  Priam's night journey to the Greek camp (Book XXIV), and Hermes escorting Priam
  are genuine road-chronotope passages. Do not apply to military marches.

  Do NOT use "encounter chronotope" as a label — this is not a Bakhtin category in
  the project's controlled vocabulary (see rules/tracks/bakhtin.yaml). The closest
  available code for cosmic-vs-human time interactions is BAKHTIN-DIVINE.

  Methodology-fit rule: Set methodology_fit_warning=true and write a
  methodology_fit_note only when the oral-formulaic nature of the passage — formulaic
  ring composition, type-scene repetition — genuinely strains the chronotope
  category. Note and warning always travel together.

  In addition to a chronotope code, you may assign AT MOST ONE code from each of the
  following families when clear textual evidence from the in-pipeline witness supports it.
  Omit the family entirely if evidence is ambiguous.

  POLYPHONY — degree to which multiple narrative voices carry equal authority:
    BAKHTIN-POLYPHONY-LOW (monologic; single authoritative narrator)
    BAKHTIN-POLYPHONY-MEDIUM (multiple voices, one dominant)
    BAKHTIN-POLYPHONY-HIGH (several voices, no single perspective dominates)

  CARNIVALESQUE — degree of hierarchy inversion and transgression:
    BAKHTIN-CARNIVALESQUE-ABSENT (serious, monologic register)
    BAKHTIN-CARNIVALESQUE-PRESENT (discernible inversion; laughter or grotesque present)
    BAKHTIN-CARNIVALESQUE-DOMINANT (overturning of hierarchy is the central act)

  HETEROGLOSSIA — tension between social languages or registers:
    BAKHTIN-HETEROGLOSSIA-MONOGLOSSIC (single authoritative register)
    BAKHTIN-HETEROGLOSSIA-HETEROGLOSSIC (multiple registers in dialogue)
    BAKHTIN-HETEROGLOSSIA-PLURIVALENT (irresolvable tension; cannot reduce to one standpoint)

tmi_fit_note: >
  TMI motif codes are identifiable throughout the Iliad. Apply them wherever a
  specific motif is recognisable, and flag passages where the Greek cultural
  context gives the motif a specific valence the generic code does not capture.

  Verified codes with Iliadic examples:

  K1811 — Gods (saints) in disguise visit mortals. The most structurally prominent
  disguise motif in the Iliad. Athene disguises herself as Deiphobos to trick Hector
  into standing his ground (Book XXII, Murray 1924, 22.226–247); Apollo disguises
  himself as Asius to rebuke Hector (Book XVII, Murray 1924, 17.582–592); Iris
  disguises herself as Polites (Book II, Murray 1924, 2.786–807). Apply broadly
  to divine-disguise interventions.

  K1810 — Deception by disguise (general). Apply to non-divine disguise passages
  (Doloneia, Book X: Odysseus and Diomedes in enemy territory, night-raid disguise
  conventions). Use K1811 specifically when the disguised agent is divine.

  A-section divine intervention (gods intervening in human affairs, specifically
  in battle and on behalf of favoured warriors). The Iliad's divine machinery —
  gods fighting alongside mortals, deflecting spears, carrying wounded heroes off
  the field — is the central narrative mechanism of the poem. Tag these passages
  with a SPECIFIC, well-formed A-section motif code (e.g. A185 "deity cares for
  mortal", A189.x, A485 "god of war") — every code must be a real TMI number, never
  a band placeholder like "A-section". If no specific A-code applies, note the gap in
  methodology_fit_note and omit the annotation rather than emitting a malformed code.
  Note the specific book and line in evidence_citations. The Venetus A scholia document ancient readers'
  awareness of the theological problem these scenes raised (Aristarchus's notes on
  the Theomachies, Books XX–XXI); if annotating a Theomachy passage, note this
  ancient editorial sensitivity.

  P320-band — Hospitality. Apply to guest-friendship (xenia) scenes. Flag each
  P320-band annotation with a methodology note: Homeric xenia is a divinely
  sanctioned reciprocal institution governed by Zeus Xenios. It is not merely
  social courtesy. The Glaukos-Diomedes exchange (Book VI, Murray 1924, 6.119–236)
  — in which two warriors discover guest-friendship bonds and exchange armour —
  is the paradigm case. The generic P320 code does not capture the theological
  weight of xenia under Zeus Xenios; note this explicitly in every hospitality
  annotation.

  P310 — Friendship. Apply to the Achilles-Patroclus bond, which the poem frames
  as the primary relationship motivating the second arc of the narrative. Note that
  ancient and modern interpreters diverge on the nature of this bond; do not
  resolve the interpretive question in the annotation, but acknowledge it.

  Motifs without clean TMI codes — note the absence rather than forcing a fit:

  Hiketeia (ritual supplication): The Iliad contains multiple formal supplication
  scenes — Chryses at the ships (Book I), Thetis before Zeus (Book I), Priam
  before Achilles (Book XXIV). The supplication follows a specific ritual protocol:
  the suppliant grasps the knees and sometimes the chin of the one supplicated;
  the one supplicated is bound by ritual obligation to respond. No single TMI code
  captures the full force of hiketeia as a ritual institution. Use the closest
  available code, and add a methodology note: "Homeric hiketeia is a formal
  ritual act with binding social and religious force; the generic motif code
  does not capture this institutional dimension."

  Timē-geras honor economy: The seizure of Briseis (Book I) and the entire
  narrative logic of Achilles' withdrawal operate through the timē/geras
  framework — honour is made concrete in material tokens (geras); to deprive
  a warrior of his geras is to reduce his timē. There is no TMI code for
  this structure. Note its absence and describe the passage in cultural terms
  rather than forcing a folk-motif code.

  Ransom of the corpse (Book XXIV): Priam's mission to ransom Hector's body is
  without clear TMI parallel in the Index (the closest — ransom/payment motifs
  in the Q-section — do not match the specific Greek institution of proper burial
  as prerequisite for the soul's rest). Note the absence and describe the ritual
  stakes explicitly.

  TMI-D1840 — Magic object renders person invulnerable. Apply ONLY when the
  text explicitly describes supernaturally conferred invulnerability: divine
  armour forged specifically for supernatural protection (Hephaestus-forged
  armour for Achilles, Book XVIII), Styx-dipping, immortalizing ointment, or
  a god explicitly granting bodily invulnerability. Do NOT apply when armour,
  technique, or physical skill prevents injury in battle or contest — that is
  standard heroic combat. Test: would a mortal blacksmith's breastplate,
  properly fitted, provide the same protection? If yes, do not use D1840.
  The distinction is the source of the protection (supernatural gift vs.
  normal equipment/skill), not its degree.

  TMI-Q2 — Kind and unkind. This is a MORAL CONTRAST code from folk-narrative:
  virtue rewarded, vice punished, through divine or narrative judgment of moral
  character. Do NOT apply to:
  (a) Athletic or agonistic contests where the contrast is between physical
      capacity — stronger/faster/more skilled — not moral virtue. Differential
      prize-distribution in the funeral games operates through the timē/geras
      honor economy, not moral desert. Forcing Q2 onto an agonistic outcome
      misrepresents both the Greek social logic and the code's own scope.
  (b) Timē/geras prize distributions where prizes reflect rank and martial
      merit. The Iliadic honor economy has no TMI equivalent (note the gap
      explicitly rather than forcing Q2).
  TMI-Q2 may apply where divine intervention explicitly sanctions or punishes
  on a piety/impiety axis (e.g. Apollo withholding the bird from Teucer who
  failed to vow a hecatomb — this has a partial Q2 fit, though the Greek
  institutional logic of votive obligation exceeds the generic code). Always
  flag with methodology_fit_warning=true when applying Q2 to the Iliad.

  Methodology-fit rule: Note and warning always travel together. Set
  methodology_fit_warning=true whenever you write a methodology_fit_note.
  TMI annotations do not require warnings by default for the Iliad — the
  framework is applicable to this tradition's folktale and mythic elements.
  Warnings are required only when the specifically Greek institutional valence
  (xenia, hiketeia, timē) makes the generic code actively misleading rather
  than merely incomplete.
