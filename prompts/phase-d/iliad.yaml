bakhtin_fit_note: >
  TODO: Bakhtin chronotopes apply well to the Iliad.
  The battlefield is a threshold chronotope (life/death boundary).
  Olympian scenes introduce an encounter chronotope (cosmic vs. human time).
  Homeric similes operate as idyllic chronotopes (peacetime intrusions into war).

