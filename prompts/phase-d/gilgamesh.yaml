tradition: gilgamesh
# George 2003 is the standard line-NUMBERING reference, not an in-pipeline source.
# It is copyrighted and NOT ingested. It may be cited only as a parenthetical locator
# appended to a witness citation — never as sole evidence, never as content.

tradition_preamble: >
  You are annotating the Epic of Gilgamesh (Standard Babylonian Version). The source
  passages provided come from in-pipeline translation witnesses (e.g. Gumilev 1919,
  Dyakonov 1961, Thompson 1928), which are public domain. These witnesses are your
  ONLY admissible textual evidence.

  GROUNDING RULE:
  (1) Every annotation's primary textual evidence MUST quote or cite the in-pipeline
      witness passage shown in the passage label — e.g. "Thompson 1928, Tablet XI" with
      the supporting passage text. An annotation whose only evidence is an external
      edition has NO witness anchor and is REJECTED.
  (2) Andrew George's Standard Babylonian line numbering ("George 2003, SB {tablet} {line}")
      may appear ONLY as a parenthetical cross-reference APPENDED to a witness citation,
      to point a scholar at the standard text — never standalone, never as the default on
      every annotation, and never as the content of the annotation.
  (3) Do NOT reproduce text from George 2003 or any edition not in the pipeline; it is
      copyrighted and this pipeline is public-domain-only. Cite what the witness in front
      of you attests, not what you know from training.

  LACUNA RULE: where the witness records lines or columns as lost, broken, or illegible,
  the annotation must HEDGE the gap ("the witness breaks off here", "this column is lost
  in the present witness") and MUST NOT import reconstructed content from George 2003 or
  any edition. An annotation whose evidence falls in a witness-lacuna is REJECTED. The only
  faithful annotation on a lacuna documents the fact of the gap, never reconstructed events.

propp_fit_note: >
  Propp functions apply with moderate fit to Gilgamesh. The morphology is broadly
  present (initial situation, departure, tests, struggle, return) but the sequence
  does not map cleanly to all 31 functions — annotate what is present, not what is absent.
  Enkidu's creation and civilisation arc maps to functions I–VII.
  The quest for immortality maps to functions IX–XIV (departure, tests, struggle).
  IMPORTANT: whenever you write a methodology_fit_note, you MUST also set
  methodology_fit_warning=true in the same annotation object. Never write a note
  without the warning flag.

bakhtin_fit_note: >
  Bakhtin chronotopes apply well to Gilgamesh. The wilderness (Enkidu's domain),
  the city of Uruk, the Cedar Forest, and the Waters of Death are distinct
  spatial-temporal zones with clear chronotopic character.
  The threshold chronotope is especially prominent at underworld crossings and gates.

  In addition to a chronotope code, you may assign AT MOST ONE code from each of the
  following families when clear textual evidence from the in-pipeline witness supports it.
  Omit the family entirely if evidence is ambiguous.

  POLYPHONY — degree to which multiple narrative voices carry equal authority:
    BAKHTIN-POLYPHONY-LOW (monologic; single authoritative narrator)
    BAKHTIN-POLYPHONY-MEDIUM (multiple voices, one dominant)
    BAKHTIN-POLYPHONY-HIGH (several voices, no single perspective dominates)

  CARNIVALESQUE — degree of hierarchy inversion and transgression:
    BAKHTIN-CARNIVALESQUE-ABSENT (serious, monologic register)
    BAKHTIN-CARNIVALESQUE-PRESENT (discernible inversion; laughter or grotesque present)
    BAKHTIN-CARNIVALESQUE-DOMINANT (overturning of hierarchy is the central act)

  HETEROGLOSSIA — tension between social languages or registers:
    BAKHTIN-HETEROGLOSSIA-MONOGLOSSIC (single authoritative register)
    BAKHTIN-HETEROGLOSSIA-HETEROGLOSSIC (multiple registers in dialogue)
    BAKHTIN-HETEROGLOSSIA-PLURIVALENT (irresolvable tension; cannot reduce to one standpoint)

  IMPORTANT: whenever you write a methodology_fit_note, you MUST also set
  methodology_fit_warning=true in the same annotation object.

tmi_fit_note: >
  TMI motif codes apply throughout. Key motifs: flood narrative (A1010), wild-man
  tamed by woman (B601.7 / F567.2), quest for immortality (H1376.3), plant of
  immortality stolen by serpent (D965.1 / B176.1).
  Always cite the source translation alongside the TMI code in evidence_citations.
  IMPORTANT: whenever you write a methodology_fit_note, you MUST also set
  methodology_fit_warning=true in the same annotation object.
