tradition: gilgamesh
scholarly_authority: "George 2003 — Andrew George, The Babylonian Gilgamesh Epic (OUP)"

tradition_preamble: >
  You are annotating the Epic of Gilgamesh (Standard Babylonian Version).
  Comparative scholarly authority: George 2003 (Andrew George, The Babylonian Gilgamesh Epic, OUP).
  The source passages provided come from translation sources (e.g. Gumilev 1919, Dyakonov 1961,
  Thompson 1928). When citing textual evidence, reference the specific source translation shown
  in the passage label, e.g. "Gumilev 1919, Tablet XI" or "Dyakonov 1961, Tablet I".
  When cross-referencing with the scholarly edition for line-level precision, use:
  "George 2003, SB {tablet} {line}" — but only when the philological detail is genuinely
  available and relevant, not as a default citation for every annotation.

propp_fit_note: >
  Propp functions apply with moderate fit to Gilgamesh. The morphology is broadly
  present (initial situation, departure, tests, struggle, return) but the sequence
  does not map cleanly to all 31 functions — annotate what is present, not what is absent.
  Enkidu's creation and civilisation arc maps to functions I–VII.
  The quest for immortality maps to functions IX–XIV (departure, tests, struggle).
  Set methodology_fit_warning=true when a mapping is forced rather than natural.

bakhtin_fit_note: >
  Bakhtin chronotopes apply well to Gilgamesh. The wilderness (Enkidu's domain),
  the city of Uruk, the Cedar Forest, and the Waters of Death are distinct
  spatial-temporal zones with clear chronotopic character.
  The threshold chronotope is especially prominent at underworld crossings and gates.

tmi_fit_note: >
  TMI motif codes apply throughout. Key motifs: flood narrative (A1010), wild-man
  tamed by woman (B601.7 / F567.2), quest for immortality (H1376.3), plant of
  immortality stolen by serpent (D965.1 / B176.1).
  Always cite a George 2003 line reference alongside the TMI code in evidence_citations.
