# Granularity: episode (default), sub-episode, verse-range, lacuna, interpolation
default_granularity: episode

# Signals used to identify parva and episode boundaries in raw text
# TODO: tune for specific translation and GRETIL corpus structure before M3
boundary_signals:
  parva: ["Parva", "PARVA", "Book "]
  episode_keywords:
    bhagavad-gita: ["Gita", "Arjuna", "Krishna", "yoga", "dharma", "battlefield"]
    draupadi-disrobing: ["Draupadi", "disrobe", "Duhshasana", "Bhima"]
    dice-game-first: ["dice", "Shakuni", "Yudhishthira", "lost"]
    death-of-abhimanyu: ["Abhimanyu", "chakravyuha", "surrounded"]
    bhishmas-death: ["Bhishma", "bed of arrows", "sun", "uttarayana"]
    krishnas-death: ["Krishna", "hunter", "arrow", "foot"]

# Lacuna and interpolation markers
# The Poona CE marks interpolations with brackets; Southern/Northern recension additions
lacuna_markers: ["[CE lacuna]", "[interpolation]", "[Southern recension]", "[Northern recension]", "[corrupt]"]
