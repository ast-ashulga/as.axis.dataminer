# Segmentation rules for the Mahabharata.
# NAS taxonomy follows fragment-graph-design.md §1.
# PLACEHOLDER — requires Cultural Expert review before M3.
# IMPORTANT: living_tradition = true. Do not release output without formal Cultural Expert sign-off.
tradition: mahabharata
nas_prefix: "nms://mahabharata"

# Base text: Poona Critical Edition (Bhandarkar Oriental Research Institute).
# Reference translation: van Buitenen EN (1973–1978), volumes 1–3.
# Sanskrit GRETIL corpus for Layer 3 (layer_3_original flag = false until post-M2).

divisions:
