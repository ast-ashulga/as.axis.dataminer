# Granularity: episode (default), sub-episode, verse-range, lacuna
default_granularity: episode

# Signals used to identify division and episode boundaries in raw text
# TODO: tune for specific translation(s) used (Murray/Wyatt, Lattimore, or Perseus Greek)
boundary_signals:
  book: ["Book ", "BOOK ", "Rhapsody "]
  episode_keywords:
    catalogue-of-ships: ["Boeotians", "ships", "leaders"]
    embassy-to-achilles: ["Phoenix", "Ajax", "Odysseus", "embassy"]
    death-of-patroclus: ["Patroclus", "Hector", "struck", "fell"]
    shield-of-achilles: ["shield", "Hephaestus", "forged", "wrought"]
    death-of-hector: ["Hector", "Achilles", "spear", "killed"]
    ransom-of-hector: ["Priam", "ransom", "twelve days"]

# Lacuna patterns: rare in the Iliad manuscript tradition; note textual variants instead
lacuna_markers: ["[lacuna]", "[corrupt]", "[disputed]", "[athetised]"]
