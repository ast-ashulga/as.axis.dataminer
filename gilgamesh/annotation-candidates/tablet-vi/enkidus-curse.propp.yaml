  rationale: Enkidu's act of tearing out the Bull of Heaven's member and hurling it at Ishtar, accompanied by his explicit verbal threat, constitutes a transgression against a divine figure. This violates the implicit cosmic prohibition against insulting or defiling the gods, and it is this act — rather than merely the killing of the Bull — that precipitates the divine council's fatal sentence against Enkidu. The violation here is directed at a deity rather than a parental interdiction, which makes the Propp mapping strained but defensible by analogy.
