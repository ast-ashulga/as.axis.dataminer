- code: TMI-T91
  label: Refusal of divine lover
  proposed_tier: reconstructed
  status: confirmed
  rationale: "Gilgamesh explicitly and at length refuses the amorous advances of the goddess Ishtar, who proposes marriage and promises him wealth, tribute, and divine favor. His refusal is not merely polite deflection but a sustained rhetorical counter-attack cataloguing Ishtar's past lovers and the harm she brought them. This is the most direct and unambiguous instance of TMI-T91 in the ancient Near Eastern corpus. Both translations render the refusal with full narrative weight: Gilgamesh lists the fates of Tammuz, the shepherd, Ishullanu, the lion, the horse, and others to justify his rejection."
  evidence_citations:
  - "Gumilev 1919, Tablet VI: 'Сохрани для себя свои богатства... И, меня полюбив, ты изменишь тоже мой образ!'"
  - "Dyakonov 1961, Tablet VI: 'Но в жены себе тебя не возьму я!'"
  - George 2003, SB VI 22–79
  methodology_fit_warning: false
