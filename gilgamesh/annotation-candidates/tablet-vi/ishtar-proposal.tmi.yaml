- code: TMI-A1335
  label: Origin of death — mortality as the lot of mortals vs. immortality of gods
  proposed_tier: contested
  status: confirmed
  rationale: "Gilgamesh's refusal implicitly touches on the divine-mortal asymmetry: Ishtar, as an immortal goddess, cannot offer lasting partnership to a mortal, and the fates of her former lovers underscore the danger of transgressing the boundary between human and divine. The passage does not directly theorize the origin of death, but it participates in the broader Gilgamesh thematic complex in which mortal vulnerability is contrasted with divine permanence. The application is contested because TMI-A1335 is more properly a cosmogonic motif; its presence here is thematic rather than structural."
  evidence_citations:
  - "Gumilev 1919, Tablet VI: 'Где любовник, которого бы ты всегда любила, / Где герой, приятный тебе и в грядущем?'"
