  methodology_fit_warning: true
  methodology_fit_note: TMI-A1335 is most precisely applicable to cosmogonic myth segments (notably Tablet X and the Siduri episode). Its application to Tablet VI is an extrapolation from the broader epic theme and should be flagged as a secondary, contested annotation rather than a direct motif match for this passage alone.
