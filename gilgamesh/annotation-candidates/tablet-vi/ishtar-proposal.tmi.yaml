- code: TMI-Q2
  label: Kind and unkind — contrasting treatment of lovers
  proposed_tier: contested
  status: confirmed
  rationale: "Gilgamesh's enumeration of Ishtar's past lovers functions as an extended catalogue of the 'unkind' treatment meted out to those who accepted or pleased the goddess: Tammuz is condemned to lamentation, the shepherd is turned into a hyena, Ishullanu is transformed into a mole or spider. The motif here operates in inverted form — the 'kind' lovers (those who gave devotion) receive cruel fates, while Gilgamesh, by refusing, implicitly positions himself as the one who escapes this pattern. Application of TMI-Q2 is contested because the framework typically involves a direct narrative comparison between two characters rather than a retrospective catalogue, and the moral valence is complicated by Ishtar's divine status."
  evidence_citations:
  - "Gumilev 1919, Tablet VI: 'Любовнику юности первой твоей, Таммузу, / На годы и годы назначила ты стенанья!'"
  - "Dyakonov 1961, Tablet VI: 'Давай перечислю, с кем ты блудила!'"
  - George 2003, SB VI 42–79
  methodology_fit_warning: true
  methodology_fit_note: TMI-Q2 is designed for narratives structurally built around two contrasting characters; applying it to a rhetorical catalogue within a single speech risks over-extending the framework. The annotation is defensible as a secondary motif embedded in the refusal speech but should not be treated as a primary structural feature of the tablet.
