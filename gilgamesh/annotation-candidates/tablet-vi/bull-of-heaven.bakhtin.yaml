- code: BAKHTIN-CASTLE
  label: Castle / Palace Chronotope
  proposed_tier: contested
  status: confirmed
  rationale: "The walls and public square of Uruk function in this passage as the spatial anchor for power, lineage, and heroic legend: Ishtar mounts the high wall to deliver her curse, Gilgamesh parades through the city square and proclaims his supremacy before the serving-women of the house, and the bull's horns are hung in the temple of Lugalbanda. These gestures — dedicating trophies to divine ancestors in a consecrated space, proclaiming lordship from the walls — closely approximate the castle chronotope's logic of history and power made concrete in architectural stone. However, Uruk is a city rather than a medieval castle, making this a less canonical fit; the annotation is defensible but the analogy is imperfect for a Bronze Age Mesopotamian urban context."
  evidence_citations:
  - "Gumilev 1919, Tablet VI: 'Иштар поднялась на высокую стену Урука, / Взошла на уступ и сказала свое проклятье'"
  - "Gumilev 1919, Tablet VI: 'Своему божеству Лугал-банде он их посвящает, / Он несет их и вешает в храме своего властелина'"
  - "Dyakonov 1961, Tablet VI: 'В Урук с небес погнала его Иштар'"
  methodology_fit_warning: true
  methodology_fit_note: Bakhtin's castle chronotope was theorized in relation to European medieval Romance, where the castle encodes feudal power and dynastic time. Applying it to ancient Mesopotamian urban monumentalism requires analogical extension. The logic of power-inscribed-in-architecture is present, but the specific feudal-genealogical resonances of the medieval castle are not. The annotation is therefore marked 'contested' and should be read as a structural homology rather than a direct typological match.
