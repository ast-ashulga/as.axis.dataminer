- code: BAKHTIN-HEROIC-BODY
  label: Heroic Body Chronotope
  proposed_tier: reconstructed
  status: confirmed
  rationale: "The battle with the Bull of Heaven is narrated almost entirely through the bodies of Enkidu and Gilgamesh as spatial-temporal markers of the action: Enkidu seizes the bull by the horns, Gilgamesh strikes between the horns and the neck with his dagger, and together they extract the heart. The bull's body likewise functions as a time-space marker — its three exhalations each devastate a numbered cohort of Uruk's citizens, structuring narrative time in precise bodily increments. The subsequent dedication of the bull's horns (thirty minas of lapis lazuli, six measures of oil) further transforms the heroic body-encounter into a permanent, spatially-anchored monument."
  evidence_citations:
  - "Gumilev 1919, Tablet VI: 'Но, ухватясь за рога, Эабани склонил его морду... Разрубает быка меж рогами и шеей, / Разрубает быка, вынимает кровавое сердце'"
  - "Dyakonov 1961, Tablet VI: 'Прыгнув, Энкиду за рог Быка ухватился... Между рогами, меж затылком и шеей / Быка поразил кинжалом'"
  - George 2003, SB VI 118–133
  methodology_fit_warning: false
  ai_generated: true
