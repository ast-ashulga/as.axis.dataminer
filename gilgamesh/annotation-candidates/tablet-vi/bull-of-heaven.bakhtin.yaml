- code: BAKHTIN-DIVINE
  label: Divine / Cosmic Chronotope
  proposed_tier: reconstructed
  status: confirmed
  rationale: 'The opening scene transposes action entirely to the divine realm: Ishtar ascends to heaven, presents herself before Anu and Antu, and the council of the gods deliberates over the fate of Gilgamesh. This is mythic time operating above human time — the decision to release the Bull of Heaven is a cosmological act with consequences for the mortal world. The negotiation between Ishtar and Anu, including her threat to open the gates of the underworld and raise the dead, articulates a cosmic perspective on human events that is paradigmatically Bakhtinian in the divine-mythic mode.'
  evidence_citations:
