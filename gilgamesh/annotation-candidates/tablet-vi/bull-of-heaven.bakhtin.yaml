- code: BAKHTIN-THRESHOLD
  label: Threshold Chronotope
  proposed_tier: reconstructed
  status: confirmed
  rationale: "Ishtar's threat to 'prolozhit' put' v glubinu preispodnei' (open a path to the depths of the underworld) and raise the dead to devour the living represents a threshold moment of maximal crisis — the boundary between the living world and the realm of death is explicitly invoked as a weapon. Even though this threat is not enacted in this tablet, its articulation suspends normal time and places the entire cosmos at a liminal boundary between states of existence. This is a textbook threshold chronotope: time freezes at the edge of catastrophic transformation."
  evidence_citations:
  - "Dyakonov 1961, Tablet VI: 'Проложу я путь в глубину преисподней, / Подниму я мертвых, чтоб живых пожирали, / Станет меньше тогда живых, чем мертвых'"
  - "Gumilev 1919, Tablet VI: 'Я сломаю ворота, заключившие воды, / По земному пространству пущу все ветры, / И останется меньше живых, чем мертвых'"
  - George 2003, SB VI 96–100
  methodology_fit_warning: false
