- code: TMI-H900
  label: Tasks and quests
  proposed_tier: contested
  status: confirmed
  rationale: "Anu imposes a conditional counter-demand on Ishtar before releasing the Bull: she must agree to endure seven years of privation (eating only roots, sleeping on straw, gleaning grain) as the price of her request. This functions structurally as a condition placed upon a petitioner, paralleling the 'task assigned as condition' schema of TMI-H900. Both translations preserve the exchange: 'Можешь ты семь лет отдыхать на соломе...' (Gumilev 1919, Tablet VI) / the implied conditional structure in Dyakonov's version. The motif is applied here to a divine petitioner rather than a mortal hero, which is a mild methodology-fit concern."
  evidence_citations:
  - "Gumilev 1919, Tablet VI: 'Можешь ты семь лет отдыхать на соломе, Можешь ты семь лет собирать колосья и семь лет есть одни коренья?'"
  - George 2003, SB VI 100–106
  methodology_fit_warning: true
  methodology_fit_note: TMI-H900 typically frames a mortal hero as the recipient of a task. In this passage, the conditional demand is placed on the goddess Ishtar by her father Anu. The structural function is analogous (condition attached to a boon), but the divine-petitioner context is atypical for this motif code. The annotation is defensible as a structural parallel but should be understood as contested.
