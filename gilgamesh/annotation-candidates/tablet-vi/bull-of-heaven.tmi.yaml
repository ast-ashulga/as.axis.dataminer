- code: TMI-T91
  label: Refusal of divine lover
  proposed_tier: reconstructed
  status: confirmed
  rationale: "The Tablet VI Bull of Heaven episode is precipitated directly by Gilgamesh's prior rejection of Ishtar's advances (narrated immediately before this passage). Ishtar's fury, her ascent to Anu, and her demand for the Bull are explicitly framed as retribution for this refusal. The passage makes clear that the divine lover's wounded pride is the narrative engine: 'Гильгамеш меня только что проклял' / 'Гильгамеш меня посрамляет' (Gumilev 1919, Tablet VI; Dyakonov 1961, Tablet VI). Although the refusal itself is not re-narrated in this segment, it is the stated causal premise, making TMI-T91 structurally operative here."
  evidence_citations:
