- code: TMI-F10
  label: Journey to heaven
  proposed_tier: contested
  status: confirmed
  rationale: "Ishtar ascends to heaven (the divine realm of Anu and Antu) to petition for the Bull of Heaven. Both translations explicitly describe this upward journey to the celestial court: 'полетела на небо, Появилась Иштар пред отцом своим Ану' (Gumilev 1919, Tablet VI) and 'поднялась на небо, поднявшись, Иштар пред отцом своим, Ану, плачет' (Dyakonov 1961, Tablet VI). The motif is applied to a divine figure rather than a mortal hero, which is a partial fit; the confidence tier is therefore contested rather than straightforwardly reconstructed."
  evidence_citations:
  - "Gumilev 1919, Tablet VI: 'Рассердилась Иштар, полетела на небо, Появилась Иштар пред отцом своим Ану'"
  - "Dyakonov 1961, Tablet VI: 'Иштар разъярилась, поднялась на небо'"
  methodology_fit_warning: true
  methodology_fit_note: TMI-F10 is standardly applied to mortal heroes journeying to a divine realm. Here the traveller is the goddess Ishtar herself, making the directionality (divine figure returning home rather than mortal ascending) a category mismatch. The annotation is nonetheless defensible as a structural parallel to the 'upward journey to celestial court' narrative function, but the fit is imperfect and the tier should be contested.
