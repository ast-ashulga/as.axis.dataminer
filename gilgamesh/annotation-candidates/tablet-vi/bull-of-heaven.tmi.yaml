- code: TMI-A1335
  label: Origin of death
  proposed_tier: contested
  status: confirmed
  rationale: "Ishtar's threat to 'raise the dead so that they devour the living' and to make 'the living fewer than the dead' (Dyakonov 1961, Tablet VI: 'Подниму я мертвых, чтоб живых пожирали, Станет меньше тогда живых, чем мертвых') gestures toward the mythological boundary between mortality and immortality that is the thematic spine of the entire epic. While this passage does not narrate the origin of death per se, Ishtar's threat to collapse the boundary between the living and dead world is a direct invocation of the mortal/immortal asymmetry that TMI-A1335 encodes. The fit is partial and the tier is therefore contested."
  evidence_citations:
  - "Dyakonov 1961, Tablet VI: 'Подниму я мертвых, чтоб живых пожирали, Станет меньше тогда живых, чем мертвых'"
  - "Gumilev 1919, Tablet VI: 'останется меньше живых, чем мертвых'"
  methodology_fit_warning: true
  methodology_fit_note: TMI-A1335 is an etiological motif explaining why humans die. Here it is not an etiological narrative but a rhetorical threat by a goddess. The motif applies only by structural resonance with the living/dead boundary theme, not as a direct instantiation of the origin-of-death narrative type. Annotation is contested and should be read as thematic rather than typological.
