- code: TMI-Q2
  label: Kind and unkind
  proposed_tier: contested
  status: confirmed
  rationale: The episode contrasts the impiety and destructive vengeance of Ishtar (the 'unkind' figure who sends mass death upon the citizens of Uruk in retribution for a personal slight) with Gilgamesh and Enkidu's pious act of offering the Bull's heart to Shamash and dedicating its horns to Lugalbanda. This moral contrast — destructive divine pique versus heroic piety — partially maps onto the kind/unkind opposition of TMI-Q2, though the text does not resolve with differential rewards in the classic folktale manner. The fit is partial.
  evidence_citations:
