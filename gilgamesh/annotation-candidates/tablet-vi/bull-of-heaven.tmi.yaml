  - "Dyakonov 1961, Tablet VI: 'Вырву ему сердце, положу перед Шамашем'"
  methodology_fit_warning: true
  methodology_fit_note: TMI-Q2 is primarily a folktale motif about contrasting treatment of characters and its consequences. The Gilgamesh episode does not follow the classic pattern of two characters tested by the same situation. The contrast here is between divine vindictiveness and heroic piety, which is structurally suggestive but not a clean instantiation of the motif. Tier is contested.
