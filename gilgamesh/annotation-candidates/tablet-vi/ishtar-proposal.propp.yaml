- code: PROPP-10
  label: Beginning Counter-Action
  proposed_tier: reconstructed
  status: confirmed
  rationale: "Gilgamesh's explicit, sustained refusal of Ishtar's proposal constitutes a decisive act of counter-action: he resolves not to submit to the threat posed by the goddess and articulates this resolution at length. This is the moment at which the hero actively moves against the force of villainy rather than remaining passive. The counter-action here sets in motion the chain of events (Ishtar's wrath, the Bull of Heaven) that drives the remainder of Tablet VI."
  evidence_citations:
  - "Gumilev 1919, Tablet VI: 'Гильгамеш отверзает уста и вещает, / К владычице Иштар обращает слово'"
  - "Dyakonov 1961, Tablet VI: 'Гильгамеш уста открыл и молвит, вещает он государыне Иштар'"
  - George 2003, SB VI 22–79
