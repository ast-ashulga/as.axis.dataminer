- code: PROPP-7
  label: Complicity
  proposed_tier: contested
  status: confirmed
  rationale: "PROPP-7 would require the hero to be deceived or to submit to the villain's overtures. Here the function is conspicuously inverted: Gilgamesh explicitly refuses and deconstructs the deception rather than succumbing to it. The absence of complicity is structurally significant and suggests the narrative deliberately subverts this expected morphological step. Annotation is included to flag the structural gap rather than to assert the function's presence."
  evidence_citations:
  - "Gumilev 1919, Tablet VI: 'Сохрани для себя свои богатства'"
  - "Dyakonov 1961, Tablet VI: 'Но в жены себе тебя не возьму я!'"
  methodology_fit_warning: true
  methodology_fit_note: "This is a structural inversion of PROPP-7: the hero actively resists rather than submitting. Annotating the negation of a Propp function is methodologically unusual but defensible as a marker of the epic's distinctive literary self-consciousness. Confidence is contested because the function is negated, not instantiated."
