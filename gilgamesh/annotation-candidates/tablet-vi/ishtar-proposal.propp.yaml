annotations:
- code: PROPP-6
  label: Trickery
  proposed_tier: contested
  status: confirmed
  rationale: Ishtar's elaborate proposal to Gilgamesh — offering a golden chariot, tribute from kings, and miraculous fertility of herds — functions as a form of enticement or deceptive seduction. She presents herself and the union as wholly beneficial, concealing the pattern of destruction she has visited upon previous lovers. This maps loosely to the villain's attempt to deceive the hero, though Ishtar is not a conventional Proppian villain and the 'trickery' is seductive rather than conspiratorial, which creates a methodological tension.
  evidence_citations:
  - "Gumilev 1919, Tablet VI: 'Ну, Гильгамеш, отныне ты мой любовник! / Твоим вожделеньем я хочу насладиться'"
  - "Dyakonov 1961, Tablet VI: 'Давай, Гильгамеш, будь мне супругом, / Зрелость тела в дар подари мне!'"
  - George 2003, SB VI 6–21
  methodology_fit_warning: true
  methodology_fit_note: Ishtar does not fit cleanly into the Proppian villain role across the epic as a whole; her function here is closer to a donor-adversary hybrid. The trickery is implicit (concealment of her destructive history) rather than explicit deception, making this mapping contested rather than reconstructed with confidence.
