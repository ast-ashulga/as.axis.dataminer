- code: PROPP-8
  label: Villainy / Lack
  proposed_tier: reconstructed
  status: confirmed
  rationale: Gilgamesh's lengthy catalogue of Ishtar's former lovers — Tammuz, the shepherd, Ishullanu, the lion, the horse — documents a pattern of harm inflicted by the goddess on those who entered into union with her. This recitation functions narratively to establish Ishtar as a source of villainy and to identify the lack (of a trustworthy divine patron or safe union) that motivates subsequent events, including Ishtar's vengeful dispatch of the Bull of Heaven. The harm to prior victims is cited explicitly as evidence of ongoing villainy.
  evidence_citations:
  - "Gumilev 1919, Tablet VI: 'Любовнику юности первой твоей, Таммузу, / На годы и годы назначила ты стенанья!'"
  - "Gumilev 1919, Tablet VI: 'Ты избила его, превратила в гиену'"
  - "Dyakonov 1961, Tablet VI: 'Давай перечислю, с кем ты блудила!'"
  - George 2003, SB VI 42–79
