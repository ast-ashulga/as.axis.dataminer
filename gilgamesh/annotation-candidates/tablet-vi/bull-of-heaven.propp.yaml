- code: PROPP-30
  label: Punishment
  proposed_tier: contested
  status: confirmed
  rationale: "Ishtар is humiliated and symbolically punished when Enkidu tears off the Bull's leg and hurls it at her face: 'Вырвал он ногу быка, бросил в лицо богине' (Gumilev 1919, Tablet VI). She then mourns over the severed limb with her cult women — a public ritual of lamentation that also marks her defeat. This constitutes punishment of the villain, though the fit is contested: the punishment is gestural and shaming rather than final or lethal, and Ishtар retains her divine power. Her subsequent role in the death of Enkidu (implied in the passage's closing dream-vision setup) shows the punishment is incomplete."
  evidence_citations:
  - Gumilev 1919, Tablet VI
  - George 2003, SB VI 155–160
  methodology_fit_warning: true
  methodology_fit_note: Proppian punishment typically ends the villain's capacity for harm; here Ishtар is shamed but not neutralised. The narrative arc of Tablet VI does not resolve her antagonism, making this a partial and contested application of PROPP-30.
