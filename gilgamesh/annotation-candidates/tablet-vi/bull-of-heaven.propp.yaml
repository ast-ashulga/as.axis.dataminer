- code: PROPP-8
  label: Villainy / Lack
  proposed_tier: reconstructed
  status: confirmed
  rationale: "Ishtар's dispatch of the Bull of Heaven constitutes an act of villainy directed against the hero Gilgamesh. She petitions Anu to create the Bull specifically as an instrument of harm: 'Мой отец, пусть родится бык небесный, бык небесный, который убьет Гильгамеша' (Gumilev 1919, Tablet VI) / 'Отец, создай Быка мне, чтоб убил Гильгамеша в его жилище' (Dyakonov 1961, Tablet VI). The Bull then kills hundreds of Uruk's citizens and directly threatens Gilgamesh and Enkidu, fulfilling the Proppian function of harm caused by a villain-agent. The methodology fit is moderate: in Propp the villain acts against the hero directly, whereas here the Bull is an intermediary weapon wielded by a divine antagonist, making the mapping slightly indirect."
  evidence_citations:
  - Gumilev 1919, Tablet VI
  - Dyakonov 1961, Tablet VI
  - George 2003, SB VI 92–100
  methodology_fit_warning: true
  methodology_fit_note: The 'villain' here is a goddess using a divine creature as proxy weapon rather than a conventional Proppian villain acting directly. The function is still defensible as villainy-by-agent, but the divine-political context (Ishtар's wounded pride rather than structural opposition to the hero) stretches the Propp frame.
