- code: PROPP-27
  label: Recognition
  proposed_tier: contested
  status: confirmed
  rationale: "Following the victory, Gilgamesh publicly proclaims his own supremacy before the assembled people of Uruk: 'Кто блистателен среди народа? Кто могуществен среди народа? Гильгамеш блистателен среди народа, Гильгамеш могуществен среди народа!' (Gumilev 1919, Tablet VI). This functions as communal recognition of the hero's identity and deeds. The fit is contested because in Propp, recognition typically follows a period of unrecognised arrival (PROPP-23) by a third party; here the recognition is self-proclaimed and public celebration rather than discovery of a disguised hero."
  evidence_citations:
  - Gumilev 1919, Tablet VI
  methodology_fit_warning: true
  methodology_fit_note: Self-proclamation as recognition is an inversion of the Proppian model, where a third party identifies the hero. The absence of a preceding PROPP-23 (Unrecognized Arrival) further weakens the morphological sequence. The annotation is defensible as a functional analogue but should be treated as contested.
