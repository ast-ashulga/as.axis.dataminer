- code: PROPP-16
  label: Struggle
  proposed_tier: reconstructed
  status: confirmed
  rationale: "The combat between the heroes and the Bull of Heaven constitutes a direct struggle between hero and villain-agent. Both translations describe the multi-phase confrontation: Enkidu seizes the Bull by the horns while Gilgamesh strikes the killing blow between the horns and neck: 'Между рогами, меж затылком и шеей / Быка поразил кинжалом' (Dyakonov 1961, Tablet VI) and 'Разрубает быка меж рогами и шеей' (Gumilev 1919, Tablet VI). The graduated nature of the Bull's three exhalations creating successive pits of death before the heroes' coordinated counter-attack maps well to Propp's struggle function."
  evidence_citations:
  - Gumilev 1919, Tablet VI
  - Dyakonov 1961, Tablet VI
  - George 2003, SB VI 109–133
