- code: PROPP-18
  label: Victory
  proposed_tier: reconstructed
  status: confirmed
  rationale: "The Bull of Heaven is slain by the joint action of Gilgamesh and Enkidu, constituting a clear victory over the villain-agent. Gumilev renders this: 'Бросил его Эабани, и дух испустил он' (Gumilev 1919, Tablet VI), and Dyakonov confirms: 'Как Быка они убили, ему вырвали сердце, перед Шамашем положили' (Dyakonov 1961, Tablet VI). The dedicatory offering of the Bull's heart to Shamash ritually seals the victory. This is one of the more securely mappable Propp functions in this tablet."
  evidence_citations:
  - Gumilev 1919, Tablet VI
  - Dyakonov 1961, Tablet VI
  - George 2003, SB VI 133–140
