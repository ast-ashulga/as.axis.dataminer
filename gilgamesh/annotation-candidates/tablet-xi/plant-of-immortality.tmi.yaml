- code: TMI-A1335
  label: Origin of death
  proposed_tier: reconstructed
  status: confirmed
  rationale: "The serpent's theft of the plant functions etiologically: it explains why humans are mortal and why the snake alone can shed its skin and renew itself. Gilgamesh's lament ('For whom did my hands endure hardship?') underscores the irrevocable loss of immortality for humankind. This motif is widely recognized by scholars as embedded in the Tablet XI plant episode as a mythological explanation for human death."
  evidence_citations:
  - "Gumilev 1919, Tablet XI: 'Для кого, о Ур-Эа, мои руки терпели усталость? / Для кого я растратил кровь из сердца?'"
  - George 2003, SB XI 308–314
  methodology_fit_warning: true
  methodology_fit_note: The etiological reading (origin of death) is analytically inferred rather than explicit in the text itself; the passage foregrounds personal loss rather than a cosmological statement about mortality. The annotation is nonetheless defensible given the broader narrative context of SB Tablet XI and the scholarly consensus (George 2003, pp. 503–504), but it should be flagged as interpretive.
