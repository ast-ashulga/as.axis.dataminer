  label: Serpent steals magic plant
  proposed_tier: reconstructed
  status: confirmed
  rationale: While Gilgamesh bathes in a cool-water well, a serpent smells the plant, creeps up, and carries it away. This is the defining mythological moment explaining why humans lack immortality, and it maps directly onto the motif of the serpent stealing the magic rejuvenating plant from the hero. The theft is the pivotal narrative loss that renders Gilgamesh's quest ultimately futile.
