  proposed_tier: reconstructed
  status: confirmed
  rationale: The entire episode is framed as Gilgamesh's quest for a means of transcending human mortality. His retrieval of the plant, his stated intention to share it with the citizens of Uruk, and his lament after its theft all confirm that this passage is the culminating—and failed—moment of that quest. The motif is not merely implied but explicitly articulated in Gilgamesh's speeches.
