- code: PROPP-16
  label: Struggle
  proposed_tier: contested
  status: confirmed
  rationale: The flood narrative presents a six-day, six-night cosmic battle between elemental forces of destruction and the survival of the lone vessel. While Utnapishtim does not engage in direct combat, the structural position of the flood's violence — the storm gods, the raging waters, the darkness — occupies the narrative slot of Propp's struggle, with the ark's endurance constituting the hero's side of the contest.
  evidence_citations:
  - "Gumilev 1919, Tablet XI: 'Шесть дней, шесть ночей бродят ветер и воды, ураган владеет землею'"
  - "Dyakonov 1961, Tablet XI: 'Ходит ветер шесть дней, семь ночей, Потопом буря покрывает землю. При наступлении дня седьмого Буря с потопом войну прекратили, Те, что сражались подобно войску'"
  methodology_fit_warning: true
  methodology_fit_note: Propp's PROPP-16 requires direct combat between hero and villain. In this passage there is no physical confrontation; the hero passively endures within the ark while cosmic forces rage externally. The text itself uses martial metaphor ('подобно войску' / 'like an army') which invites structural comparison, but the absence of direct agency on the hero's part makes this annotation contested. It maps better as an extended ordeal or trial than a Proppian struggle.
