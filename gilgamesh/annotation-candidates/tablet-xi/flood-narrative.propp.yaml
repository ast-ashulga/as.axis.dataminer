- code: PROPP-31
  label: Wedding
  proposed_tier: contested
  status: confirmed
  rationale: Enlil's blessing of Utnapishtim and his wife — touching their foreheads, standing between them, elevating them to divine status, and settling them 'at the mouth of rivers, far away' — occupies the structural position of the tale's culminating reward. The bestowal of immortality and a new, exalted dwelling place functions as the hero's final elevation, analogous to Propp's wedding/enthronement function.
  evidence_citations:
  - "Gumilev 1919, Tablet XI: 'Прежде Ут-напиштим был смертными, Ныне и он, и жена нам, бессмертным, подобны: Пусть он живет, Ут-напиштим, в устье рек далеко!'"
  - "Dyakonov 1961, Tablet XI: 'Доселе Утнапишти был человеком, Отныне ж Утнапишти нам, богам, подобен, Пусть живет Утнапишти при устье рек, в отдаленье!'"
  methodology_fit_warning: true
  methodology_fit_note: PROPP-31 in its canonical form involves marriage and accession to a throne. Here the 'reward' is deification and spatial relocation rather than a wedding, though Utnapishtim's wife is explicitly included in the elevation. The function maps onto the broad concept of 'final heroic elevation' but diverges from the matrimonial specifics of Propp's formulation. Additionally, this embedded narrative is told retrospectively to Gilgamesh, meaning it does not function as a resolution of the main epic's quest — Gilgamesh cannot replicate Utnapishtim's path. This contextual displacement further complicates the fit.
