- code: PROPP-30
  label: Punishment
  proposed_tier: contested
  status: confirmed
  rationale: Enlil/Bel is publicly rebuked by both Ea and Ninhursag/Ishtar for his disproportionate and unreflective decision to destroy humanity. Ishtar explicitly bars him from the post-flood sacrifice, and Ea delivers a sustained moral indictment of his conduct. While Enlil is not destroyed or exiled, the narrative subjects him to collective divine censure that functions structurally as punishment of the principal villain.
  evidence_citations:
  - "Gumilev 1919, Tablet XI: 'Но пусть Бел не подходит к жертве, Потому что он не размыслил, потоп устроил'"
  - "Dyakonov 1961, Tablet XI: 'Эллиль к этой жертве пусть не подходит, Ибо он, не размыслив, потоп устроил И моих человеков обрек истребленью!'"
  methodology_fit_warning: true
  methodology_fit_note: Propp's PROPP-30 typically involves decisive, often physical punishment of the villain. Here Enlil's 'punishment' is symbolic exclusion from sacrifice and verbal rebuke, followed by his partial rehabilitation when he boards the ark and grants immortality to Utnapishtim. The villain is admonished rather than definitively punished, and the narrative arc moves toward reconciliation rather than elimination. This makes the annotation contested.
