- code: PROPP-6
  label: Trickery
  proposed_tier: contested
  status: confirmed
  rationale: Ea, bound by the divine oath to conceal the flood plan from mortals, circumvents the prohibition by speaking the secret to a reed wall rather than directly to Utnapishtim. This constitutes a form of divine deception — technically keeping the oath while ensuring the information reaches its intended recipient. The act is structurally analogous to Propp's trickery function in that a party uses an indirect or cunning stratagem to achieve an end while maintaining a false appearance of compliance.
  evidence_citations:
  - "Gumilev 1919, Tablet XI: 'Их слова повторил он изгороди тростниковой: «Изгородь, изгородь! Ограда, ограда! Слушай, изгородь!»'"
  - "Dyakonov 1961, Tablet XI: 'Но хижине он их слово поведал: «Хижина, хижина! Стенка, стенка! Слушай, хижина! Стенка, запомни!»'"
  - George 2003, SB XI 20–23
  methodology_fit_warning: true
  methodology_fit_note: In Propp's morphology, PROPP-6 (Trickery) is normally directed by the villain against the hero/victim. Here the trickery is performed by a protective deity (Ea) against fellow gods, not against the hero. The 'villain' role is distributed across the divine council. This inversion weakens the direct applicability of the function, but the structural element of deliberate deception to achieve a narrative goal is nonetheless present and defensible in a 'reconstructed' reading.
