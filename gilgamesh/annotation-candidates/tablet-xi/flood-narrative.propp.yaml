- code: PROPP-2
  label: Interdiction
  proposed_tier: reconstructed
  status: confirmed
  rationale: "Ea issues a series of commands to Utnapishtim: build the ark, abandon wealth, load all living seed, and — critically — issue a deceptive cover story to the populace. These function as prohibitions and directives structurally equivalent to Propp's interdiction: the hero is given a set of instructions he must follow, including the command not to reveal the true reason for his departure to his fellow citizens."
  evidence_citations:
  - "Gumilev 1919, Tablet XI: 'Разрушь свой дом, выстрой судно, Оставь богатства, думай о жизни'"
  - "Dyakonov 1961, Tablet XI: 'Снеси жилище, построй корабль, Покинь изобилье, заботься о жизни, Богатство презри, спасай свою душу!'"
  methodology_fit_warning: true
  methodology_fit_note: Propp's PROPP-2 typically involves a prohibition issued to the hero before departure that will later be violated (PROPP-3). Here the interdiction functions more as a divine commission or set of salvation instructions than a prohibition whose violation drives the plot. The sequence is not followed by a clear PROPP-3 violation in this passage. The fit is structurally approximate rather than precise.
