- code: PROPP-8
  label: Villainy / Lack
  proposed_tier: reconstructed
  status: confirmed
  rationale: "The flood itself constitutes the primary act of villainy in this narrative segment: the divine council, led by Enlil/Bel, decrees and executes the destruction of humanity. This is the catastrophic harm from which the hero (Utnapishtim) must be saved and which frames the entire embedded narrative recounted to Gilgamesh. The destruction of all humankind is the 'lack' that the survival narrative seeks to address."
  evidence_citations:
  - "Gumilev 1919, Tablet XI: 'И сделать потоп подтолкнуло их сердце, богов великих'"
  - "Dyakonov 1961, Tablet XI: 'Богов великих потоп устроить склонило их сердце'"
  - George 2003, SB XI 14
  methodology_fit_warning: true
  methodology_fit_note: The 'villain' here is a collective divine council and specifically Enlil, a deity rather than a conventional antagonist figure. The villainy is cosmic in scale and is not directed at a single hero-victim in the Proppian sense but at all of humanity. This broadens the function beyond its typical morphological scope. The annotation remains defensible as a macro-structural identification of harm-initiation.
