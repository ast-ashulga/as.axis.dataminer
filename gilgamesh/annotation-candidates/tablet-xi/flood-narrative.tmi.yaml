- code: TMI-A1021
  label: Escape from deluge in boat (ark)
  proposed_tier: reconstructed
  status: confirmed
  rationale: "Utnapishtim is explicitly commanded by Ea to build a ship and load it with his family, animals, and 'all living seed' to survive the flood. Both translations detail the ship's construction, loading, and the hero's survival within it: 'Снеси жилище, построй корабль... На свой корабль погрузи все живое' (Dyakonov). This is the paradigmatic Near Eastern instance of the ark-escape motif, foundational to the TMI category."
