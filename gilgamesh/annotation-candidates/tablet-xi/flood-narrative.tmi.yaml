- code: TMI-A1010
  label: Deluge
  proposed_tier: reconstructed
  status: confirmed
  rationale: "The passage describes the inundation of the earth decreed by the great gods, with storms, flooding, and the destruction of humanity. Both translations extensively narrate the catastrophic flood: 'Шесть дней, шесть ночей бродят ветер и воды, ураган владеет землею' / 'Ходит ветер шесть дней, семь ночей, Потопом буря покрывает землю.' This is one of the most canonical attestations of TMI-A1010 in world literature, directly paralleled in the Atrahasis epic and Genesis 6–9."
