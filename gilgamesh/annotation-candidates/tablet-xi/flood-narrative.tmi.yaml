- code: TMI-B450
  label: Helpful bird
  proposed_tier: reconstructed
  status: confirmed
  rationale: "Utnapishtim releases three birds sequentially — a dove, a swallow, and a raven — to determine whether the floodwaters have receded. The raven's failure to return signals that dry land is accessible. Both translations give near-identical accounts: 'Вынес голубя и отпустил я... Вынес ласточку... Вынес ворона' (Dyakonov). The birds function as environmental scouts whose behavior reveals the state of the world, precisely the role described under TMI-B450."
  evidence_citations:
