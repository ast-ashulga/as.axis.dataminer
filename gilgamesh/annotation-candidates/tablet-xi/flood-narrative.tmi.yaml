- code: TMI-A1022
  label: Escape from deluge on mountain
  proposed_tier: contested
  status: confirmed
  rationale: "After the waters recede, the ark comes to rest on Mount Nisir (Ницир / Низир), which arrests the vessel's drift. While the mountain here serves as the grounding point for the boat rather than a refuge climbed independently, it fulfills the structural role of elevated terrain as the locus of survival after the deluge. The motif is partially instantiated: the hero does not climb the mountain on foot, so the application is secondary to TMI-A1021."
  evidence_citations:
  - Gumilev 1919, Tablet XI
  - Dyakonov 1961, Tablet XI
  - George 2003, SB XI 140–144
  methodology_fit_warning: true
  methodology_fit_note: The mountain in this passage functions as the resting place of the boat, not as an independently scaled refuge. TMI-A1022 strictly describes escape by climbing a mountain, which does not occur here. The annotation is defensible as a partial structural parallel but should be marked contested to reflect that the motif is mediated through the boat narrative rather than realized independently.
