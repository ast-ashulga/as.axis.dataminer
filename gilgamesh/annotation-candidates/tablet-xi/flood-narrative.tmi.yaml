- code: TMI-A1335
  label: Origin of death
  proposed_tier: contested
  status: confirmed
  rationale: "The passage concludes with Enlil's blessing of Utnapishtim and his wife, granting them divine immortality as an exceptional reward: 'Прежде Ут-напиштим был смертными, Ныне и он, и жена нам, бессмертным, подобны' (Gumilev) / 'Доселе Утнапишти был человеком, Отныне ж Утнапишти нам, богам, подобен' (Dyakonov). This implicitly frames immortality as the exception that proves the rule of human mortality, providing mythological grounding for why ordinary humans die. The motif is present but indirect — the text explains one human's escape from death rather than narrating the origin of death as a universal condition."
  evidence_citations:
  - Gumilev 1919, Tablet XI
  - Dyakonov 1961, Tablet XI
  - George 2003, SB XI 198–205
  methodology_fit_warning: true
  methodology_fit_note: "TMI-A1335 as defined concerns myths that explicitly explain why humans must die. This passage instead narrates the singular exception: the granting of immortality to Utnapishtim. The motif is instantiated etiologically only by implication — Utnapishtim's uniqueness underscores the mortal condition of all other humans, which is the very point he makes to Gilgamesh at the passage's close ('Кто же ныне для тебя богов собрал бы'). The annotation is defensible as a structural correlate but contested as a direct instantiation of the motif."
