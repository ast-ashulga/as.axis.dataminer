- code: TMI-H1376.3
  label: Quest for immortality
  proposed_tier: reconstructed
  status: confirmed
  rationale: "The entire framing of the Tablet XI flood narrative is embedded within Gilgamesh's quest for immortality: he has journeyed to Utnapishtim specifically to learn how to escape death. Utnapishtim's closing rhetorical question — 'Кто же ныне для тебя богов собрал бы, Чтоб нашел ты жизнь, которую ищешь?' (Dyakonov) — explicitly names the quest. The flood narrative is narrated as evidence for why Gilgamesh's quest is effectively impossible under normal circumstances, making TMI-H1376.3 the superordinate narrative frame for this entire segment."
