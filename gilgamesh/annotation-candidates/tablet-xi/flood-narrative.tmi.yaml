- code: TMI-D1810
  label: Magic knowledge through dreams
  proposed_tier: contested
  status: confirmed
  rationale: "Ea, unable to directly reveal the gods' secret decree to Utnapishtim, conveys the warning obliquely — speaking to the reed wall so that the hero may overhear. In the Dyakonov translation, Ea explicitly states: 'Многомудрому сон я послал, и тайну богов постиг он,' confirming that a dream was used as the vehicle for conveying divine knowledge without technically breaking the divine oath. This is a clear instantiation of prophetic knowledge transmitted through a dream sequence."
  evidence_citations:
  - Dyakonov 1961, Tablet XI
  - George 2003, SB XI 187–188
  methodology_fit_warning: true
  methodology_fit_note: The Gumilev translation renders Ea's speech to the 'reed fence' without explicitly mentioning a dream, while the Dyakonov translation makes the dream mechanism explicit in Ea's later speech to Enlil. The dream motif is present in the Standard Babylonian text (George 2003, SB XI 187) but is not foregrounded as a full dream narrative sequence — it is referenced retrospectively. The annotation is defensible but the dream is embedded within a legal-theological excuse rather than narrated as a vision, which slightly weakens the fit with TMI-D1810 as typically formulated.
