- code: BAKHTIN-DIVINE
  label: Divine / Cosmic Chronotope
  proposed_tier: reconstructed
  status: confirmed
  rationale: The passage explicitly invokes the 'assembly of the immortals' ('собранье бессмертных' in Gumilev 1919, Tablet XI; 'собранье богов' in Dyakonov 1961, Tablet XI) as the cosmic locus where Utnapishtim was granted eternal life. This is a reference to mythic, cosmological time operating beyond human chronology — the divine council that determines fates. Gilgamesh's question is oriented toward understanding how cosmic-divine time intersected with Utnapishtim's individual biography, marking the passage as a site where human and divine temporal registers collide.
