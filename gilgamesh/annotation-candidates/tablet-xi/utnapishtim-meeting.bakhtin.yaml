  rationale: "Gilgamesh's scrutiny of Utnapishtim's physical form — noting that he is not frightening in stature and lies on his back to sleep like any mortal — inverts the heroic body chronotope in an analytically significant way. Rather than the hero's body serving as a marker of extraordinary time-space, here the absence of bodily distinction is itself the narrative crux: immortality has left no corporeal trace. The annotation is contested because the passage describes Utnapishtim's body rather than Gilgamesh's, and the heroic body framework is used here in a deflated, deconstructive mode rather than in its standard affirmative register."
