- code: BAKHTIN-THRESHOLD
  label: Threshold Chronotope
  proposed_tier: reconstructed
  status: confirmed
  rationale: "Gilgamesh's encounter with Utnapishtim at the edge of the world constitutes a supreme liminal moment: Gilgamesh has crossed the Waters of Death and arrived at the boundary between mortal existence and immortality. The dialogue itself is suspended at this threshold — Gilgamesh has not yet received the answer to his quest, and the entire exchange hovers between his mortal state and the possibility of transcendence. The repeated insistence that Utnapishtim appears 'just like me' ('таков, как и я' in Dyakonov 1961, Tablet XI) dramatises the crisis of the threshold: the boundary between mortal and immortal is spatially present yet visually invisible."
