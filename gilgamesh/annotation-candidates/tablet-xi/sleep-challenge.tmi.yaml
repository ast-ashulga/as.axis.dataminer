- code: TMI-A1335
  label: Origin of death
  proposed_tier: reconstructed
  status: confirmed
  rationale: "Gilgamesh's failure to stay awake implicitly enacts the mythological principle that mortality is the inescapable condition of humankind, contrasted with the immortality of the gods. Utnapishtim's rhetorical question at the outset — which god would admit you so you could find immortality? — and Gilgamesh's subsequent lament ('death dwells in my chambers, wherever I turn, death is everywhere') together articulate the Mesopotamian theological boundary between mortal and divine: humans must die. The sleep-failure episode is the narrative proof of this cosmological fact."
  evidence_citations:
  - Dyakonov 1961, Tablet XI ('in my chambers death dwells, wherever I look — death everywhere')
  - Gumilev 1919, Tablet XI ('in whose bedroom destruction lurks')
  - George 2003, SB XI 196–209, SB X 301–322 (broader mortal-lot speeches)
  methodology_fit_warning: false
  ai_generated: true
  generated_by_model: claude-sonnet-4-6
- code: TMI-D965.1
  label: Plant of rejuvenation
  proposed_tier: reconstructed
  status: confirmed
  rationale: In the closing lines of the segment, Utnapishtim reveals to Gilgamesh the secret of a plant lying at the bottom of the ocean, described as having thorns like a thornbush that will pierce the hand of whoever grasps it. This is the plant of rejuvenation/immortality whose retrieval launches the next episode. The Gumilev text introduces the plant explicitly as a 'sacred word' and 'hidden secret,' framing it as a supernatural botanical object consistent with TMI-D965.1.
