- code: TMI-H1376.3
  label: Quest for immortality
  proposed_tier: reconstructed
  status: confirmed
  rationale: The sleep challenge issued by Utnapishtim functions as a surrogate test for Gilgamesh's worthiness to receive immortality. Utnapishtim's opening rhetorical question — 'Who among the gods will admit you to their assembly so that you may find the immortality you seek?' — frames the seven-night vigil explicitly as the condition Gilgamesh must meet on his quest for eternal life. Failing it demonstrates his mortal nature and disqualifies him from the boon he has traveled to obtain.
  evidence_citations:
  - Gumilev 1919, Tablet XI (sleep-challenge opening)
  - Dyakonov 1961, Tablet XI ('hero who seeks life')
  - George 2003, SB XI 196–209
