- code: TMI-Q2
  label: Kind and unkind
  proposed_tier: contested
  status: confirmed
  rationale: "Utnapishtim's wife intercedes on Gilgamesh's behalf twice in this segment: first urging her husband to wake him gently so he may return home safely, and second prompting Utnapishtim to give Gilgamesh a parting gift (leading to the plant revelation). Utnapishtim himself responds with a morally ambivalent observation — 'humankind is wicked and repays good with evil' — yet still provides the bread-evidence and ultimately the plant secret. The contrast between Utnapishtim's weary cynicism and his wife's compassion could map onto TMI-Q2, but the fit is loose since neither character is 'punished' for unkindness; the motif is therefore contested."
  evidence_citations:
  - Gumilev 1919, Tablet XI ('mankind is wicked and repays good with evil')
  - Dyakonov 1961, Tablet XI ('Man is a liar! He will deceive you')
  - George 2003, SB XI 205–208
  methodology_fit_warning: true
  methodology_fit_note: TMI-Q2 requires a consequential contrast between kind and unkind treatment. Here the contrast is attitudinal (wife compassionate, Utnapishtim cynical) rather than structurally determinative of plot reward/punishment, making the application imprecise. Annotated as 'contested' accordingly.
