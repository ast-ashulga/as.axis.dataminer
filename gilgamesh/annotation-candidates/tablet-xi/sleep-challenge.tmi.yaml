- code: TMI-H900
  label: Tasks and quests
  proposed_tier: reconstructed
  status: confirmed
  rationale: 'Utnapishtim sets Gilgamesh a concrete, enumerable task — staying awake for six days and seven nights — as a condition implicitly tied to the possibility of immortality. The challenge has the structural form of a TMI-H900 task: it is formally assigned by a figure of authority, has clear success/failure criteria, and Gilgamesh fails it, with the failure demonstrated through physical evidence (the deteriorating loaves). This task-structure is consistent with quest-narrative paradigms across the Thompson index.'
  evidence_citations:
  - Gumilev 1919, Tablet XI ('six days, seven nights, try not to sleep')
  - Dyakonov 1961, Tablet XI ('six days and seven nights, do not sleep')
  - George 2003, SB XI 196–240
  methodology_fit_warning: false
  ai_generated: true
  generated_by_model: claude-sonnet-4-6
- code: TMI-D1810
  label: Magic knowledge through dreams
  proposed_tier: contested
  status: confirmed
  rationale: "While Gilgamesh sleeps, Utnapishtim's wife bakes loaves and places them at his head; in the Gumilev version an explicit phrase states 'while he slept, she revealed knowledge to him' ('ему поведала знанье'), suggesting that the passage of days is communicated to Gilgamesh through his sleep-state rather than purely through waking observation of the loaves. This is a marginal application: the primary function of the loaves is evidentiary rather than oneiric revelation, and the dream-knowledge framing appears more clearly in Gumilev's literary elaboration than in the cuneiform text itself, raising a methodology-fit concern about whether the Russian translation projects a motif not present in the Akkadian."
  evidence_citations:
  - Gumilev 1919, Tablet XI ('while he slept, she revealed knowledge to him')
  - George 2003, SB XI 209–223 (bread-loaf sequence without explicit dream-knowledge phrase)
  methodology_fit_warning: true
  methodology_fit_note: The phrase 'ему поведала знанье' (she revealed knowledge to him while he slept) appears to be Gumilev's poetic interpolation and lacks a direct Akkadian parallel in George 2003. Applying TMI-D1810 on this basis risks annotating a translation artefact rather than the source tradition; the tier is accordingly marked 'contested'.
