- code: BAKHTIN-UNDERWORLD
  label: Underworld / Netherworld Chronotope
  proposed_tier: contested
  status: confirmed
  rationale: "Gilgamesh's sleep is explicitly coded as a death-analogue: it descends on him 'like a storm' / 'like the mist of the desert' ('сон, словно буря' / 'сон дохнул на него, как мгла пустыни'), imagery that echoes the language of the underworld in the broader epic. The seven-loaf sequence traces the arc of bodily decay — dissolution, cracking, mold, whitening, staleness — mirroring what would happen to a corpse, so that Gilgamesh's sleep enacts a symbolic death from which he is recalled rather than liberated. This application is contested because the scene is not a literal katabasis; it is a metaphoric invocation of underworld logic rather than a crossing of the boundary of death."
  evidence_citations:
  - "Gumilev 1919, Tablet XI: 'Сон, словно буря, на него повеял'"
  - "Dyakonov 1961, Tablet XI: 'Сон дохнул на него, как мгла пустыни'; 'Первый хлеб его развалился, / Треснул второй, заплесневел третий'"
  - George 2003, SB XI 196–229
  methodology_fit_warning: true
  methodology_fit_note: The Underworld chronotope is most cleanly applicable to literal descent scenes (Tablet XII, or the Bull of Heaven aftermath). Its application here depends on reading the sleep and bread-decay motif as a symbolic underworld analogue, which is defensible given the imagery but remains an interpretive extension of the category. The annotation is marked 'contested' accordingly.
