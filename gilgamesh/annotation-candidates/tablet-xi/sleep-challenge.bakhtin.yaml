- code: BAKHTIN-HEROIC-BODY
  label: Heroic Body Chronotope
  proposed_tier: reconstructed
  status: confirmed
  rationale: "The passage foregrounds Gilgamesh's body as the primary site of narrative meaning in two distinct registers. First, his body's failure — the involuntary collapse into sleep, the 'грязная одежда' and animal skins that cover him — marks the temporal and physical toll of his quest, inscribing the journey's suffering directly onto his person. Second, Utnapishtim's instructions for ritual cleansing and reclothing ('пусть его дивное тело возбудит в смотрящем зависть') invoke the heroic body's capacity for restoration, recasting it as a public, socially legible sign of status. The body here functions as a chronotopic register: its degradation marks elapsed time, and its renewal marks the transition toward return."
  evidence_citations:
  - "Gumilev 1919, Tablet XI: 'Чье тело прикрыто грязной одеждой / И чью красоту закрывают шкуры'"
  - "Gumilev 1919, Tablet XI: 'Пусть его дивное тело возбудит в смотрящем зависть'"
  - "Dyakonov 1961, Tablet XI: 'Плотью моей овладел Похититель, / В моих покоях смерть обитает'"
