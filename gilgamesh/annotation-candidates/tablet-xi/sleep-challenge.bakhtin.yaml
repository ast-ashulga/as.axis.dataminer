- code: BAKHTIN-THRESHOLD
  label: Threshold Chronotope
  proposed_tier: reconstructed
  status: confirmed
  rationale: "The sleep challenge episode is a quintessential threshold moment: Gilgamesh stands at the boundary between mortal and immortal existence, and the entire scene is structured as a test of his capacity to cross that boundary. Time is simultaneously suspended (Gilgamesh sleeps, unaware of its passage) and hyper-marked (the seven loaves/days serve as a temporal ledger proving he has failed). The moment of waking — 'он тронул его, человек пробудился сразу' / 'в это время его он коснулся, и тот пробудился' — is a decisive turning point that confirms his mortality and closes the possibility of immortality. The threshold is not a spatial doorway here but an existential one, which is characteristic of the chronotope's most concentrated form."
  evidence_citations:
  - "Gumilev 1919, Tablet XI: 'Седьмой!… Он тронул его, человек пробудился сразу!'"
  - "Dyakonov 1961, Tablet XI: 'Седьмой — в это время его он коснулся, и тот пробудился'"
  - George 2003, SB XI 209–228
  methodology_fit_warning: false
