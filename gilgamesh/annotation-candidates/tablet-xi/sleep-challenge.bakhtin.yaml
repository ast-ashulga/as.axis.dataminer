- code: BAKHTIN-ROAD
  label: Road / Journey Chronotope
  proposed_tier: reconstructed
  status: confirmed
  rationale: "The conclusion of the sleep-challenge scene pivots explicitly to the road: Urshanabi is instructed to cleanse Gilgamesh and prepare him for the return journey, with the magical promise that his garment will not wear out 'until the day he reaches his city, until the day he completes the road' ('вплоть до дня, как он в свой города прибудет, / вплоть до дня, как он окончит дорогу'). The road here is a durational measure — the journey home is the temporal container for the gift — and the cleansing ritual marks a transitional moment that reintegrates Gilgamesh into the traveler-hero role after the stasis of sleep. The chance encounter at the far shore and the gift of knowledge about the plant of life also fit the road chronotope's logic of revelation through travel."
  evidence_citations:
  - "Gumilev 1919, Tablet XI: 'Вплоть до дня, как он в свой города прибудет, / Вплоть до дня, как он окончит дорогу, / Платье его не износится, но останется новым'"
  - "Gumilev 1919, Tablet XI: 'Гильгамеш и Ур-Эа взошли на судно, / Судно столкнули на волны они и отплыли'"
  - George 2003, SB XI 243–265
