- code: PROPP-25
  label: Difficult Task
  proposed_tier: contested
  status: confirmed
  rationale: "Ut-napishti challenges Gilgamesh to remain awake for six days and seven nights as a condition implicitly tied to the quest for immortality. This functions structurally as a 'difficult task' set by the donor/threshold figure: if Gilgamesh cannot master sleep, he cannot master death. The challenge is explicitly framed as a test of worthiness ('Who among the gods will bring you into their assembly?'), making it a gating ordeal in Proppian terms. The methodology_fit_warning is noted below, as Ut-napishti occupies an ambiguous role (neither pure donor nor villain) that complicates clean function assignment."
  evidence_citations:
  - Gumilev 1919, Tablet XI
  - Dyakonov 1961, Tablet XI
  - George 2003, SB XI 209-211
  methodology_fit_warning: true
  methodology_fit_note: Ut-napishti is not a canonical donor or villain in strict Proppian terms; he is simultaneously a threshold guardian, a test-setter, and an eventual giver of secret knowledge. The 'difficult task' here is proposed not as a formal ordeal with an expected resolution but as a trap that reveals Gilgamesh's failure. Propp assumes the hero will attempt and ultimately succeed at the task; here Gilgamesh fails, which is structurally atypical. The annotation is defensible as a morphological parallel but the inversion of expected outcome warrants the contested tier.
