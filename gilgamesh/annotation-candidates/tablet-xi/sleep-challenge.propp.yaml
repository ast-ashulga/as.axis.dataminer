  rationale: "Ut-napishti directs the ferryman Ur-Shanabi (Ur-Ea in Gumilev's transliteration) to lead Gilgamesh to the bath-house, wash his filthy garments, discard his animal skins, and clothe him in a garment that will not wear out until he reaches his city. This is a classic transfiguration sequence: Gilgamesh's degraded, grief-worn appearance ('чьё тело прикрыто грязной одеждой') is replaced with restored dignity and divine-quality clothing. The instruction that 'his wondrous body shall arouse envy in those who look upon it' confirms the intent to restore heroic appearance."
