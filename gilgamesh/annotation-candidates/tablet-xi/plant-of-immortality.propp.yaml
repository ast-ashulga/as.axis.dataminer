annotations:
- code: PROPP-8
  label: Villainy / Lack
  proposed_tier: contested
  status: confirmed
  rationale: The serpent's theft of the plant constitutes a renewed act of villainy that reinstates the original lack (mortality/loss of Enkidu's vitality as proxy). The snake 'подползла и растенье утащила' (Gumilev 1919, Tablet XI), directly negating Gilgamesh's acquisition and ensuring immortality remains permanently beyond his reach. This collapse of the hero's gain into renewed lack is structurally pivotal.
  evidence_citations:
  - Gumilev 1919, Tablet XI
  - George 2003, SB XI 304-307
  methodology_fit_warning: true
  methodology_fit_note: Propp's PROPP-8 typically precedes the hero's quest, not recurs within it. Applying it here to a second, terminal act of villainy is a forced extension of the morphological sequence. It is defensible as a 'lack reinstated' reading but the recurrence is not canonical Proppian structure; annotated as contested for this reason.
  ai_generated: true
  generated_by_model: claude-sonnet-4-6
- code: PROPP-19
  label: Liquidation
  proposed_tier: contested
  status: confirmed
  rationale: "The retrieval of the plant briefly enacts a notional liquidation of the lack — Gilgamesh declares his intention to share it in Uruk and eat it to become young again ('Я возьму его в крепкий Урук... Я его съем в Уруке и юношей стану', Gumilev 1919, Tablet XI). However, this liquidation is prospective and immediately negated by the serpent's intervention, meaning it is never actually consummated. The annotation is therefore contested: liquidation is announced but structurally aborted."
  evidence_citations:
  - Gumilev 1919, Tablet XI
  methodology_fit_warning: true
  methodology_fit_note: Propp requires liquidation to be achieved; here it is only momentarily in prospect. Annotating a failed or interrupted liquidation is methodologically non-standard and reflects the deeply tragic divergence of the Gilgamesh epic from Proppian morphology, where the hero typically succeeds.
  ai_generated: true
  generated_by_model: claude-sonnet-4-6
- code: PROPP-20
  label: Return
  proposed_tier: reconstructed
  status: confirmed
  rationale: The Dyakonov passage explicitly anticipates Gilgamesh's return to his city ('Пока идти он в свой город будет'), and the Gumilev passage records his declared intention to bring the plant back to Uruk. Taken together, both passages mark the structural moment of return, even though it ends in failure. The hero is oriented homeward with his prize — however temporarily — fulfilling the directional function of PROPP-20.
  evidence_citations:
  - Gumilev 1919, Tablet XI
  - Dyakonov 1961, Tablet XI
