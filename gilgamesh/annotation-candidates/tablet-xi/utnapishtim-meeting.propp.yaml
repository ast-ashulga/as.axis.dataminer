  label: First Function of Donor
  proposed_tier: contested
  status: confirmed
  rationale: "Utnapishtim in this encounter occupies the structural role of donor: he possesses the knowledge (and indirectly the means) the hero needs, and the hero's question initiates the donor-testing sequence. Gilgamesh's opening speech — sizing up Utnapishtim, noting his ordinariness, then posing the key question — constitutes the first move in the hero-donor exchange that will unfold across Tablet XI. This is, however, only the opening of the donor encounter; the full test has not yet been administered, making the annotation prospective rather than completive."
