- code: PROPP-9
  label: Mediation
  proposed_tier: contested
  status: confirmed
  rationale: "Gilgamesh's direct address to Utnapishtim functions as a moment of mediation in the extended sense: the hero has arrived at the threshold figure who holds the secret to resolving the initial lack (death of Enkidu, fear of mortality). His question — 'how did you attain immortality among the gods?' — makes the misfortune/lack explicit and frames the encounter as the axis on which counter-action turns. However, classical Propp mediation involves a third-party dispatcher, not the hero himself articulating the lack, which makes this mapping contested."
  evidence_citations:
  - "Gumilev 1919, Tablet XI: 'Почему ж ты так вознесен, добыл жизнь в собранье бессмертных?'"
  - "Dyakonov 1961, Tablet XI: 'Скажи, как ты, выжив, в собранье богов был принят и жизнь обрел в нем?'"
  methodology_fit_warning: true
  methodology_fit_note: Propp's PROPP-9 presupposes a dispatcher external to the hero who announces the misfortune. Here Gilgamesh himself voices the lack, collapsing seeker, hero, and dispatcher into a single figure. The function is partially present in spirit but structurally displaced; annotation is defensible as the moment the lack is formally named, but the fit is not clean.
