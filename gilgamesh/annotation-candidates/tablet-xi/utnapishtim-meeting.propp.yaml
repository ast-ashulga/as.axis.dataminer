- code: PROPP-8
  label: Villainy / Lack
  proposed_tier: reconstructed
  status: confirmed
  rationale: "Gilgamesh's question to Utnapishtim — how did you gain immortal life among the gods? — crystallises the central lack that has driven the second half of the epic: Gilgamesh lacks immortality and, by implication, has lost Enkidu to death. The observation that Utnapishtim appears physically no different from Gilgamesh sharpens this lack: if he is an ordinary man yet immortal, the lack is contingent, not absolute, heightening its narrative urgency. Both translations make this explicit through the contrast between Utnapishtim's ordinary appearance and his extraordinary status."
  evidence_citations:
  - "Gumilev 1919, Tablet XI: 'Твой облик не страшен, ты мне подобен [...] Почему ж ты так вознесен, добыл жизнь в собранье бессмертных?'"
  - "Dyakonov 1961, Tablet XI: 'Не чуден ты ростом - таков, как и я, ты [...] Скажи, как ты, выжив, в собранье богов был принят и жизнь обрел в нем?'"
