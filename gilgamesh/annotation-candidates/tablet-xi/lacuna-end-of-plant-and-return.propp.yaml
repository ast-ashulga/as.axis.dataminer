  rationale: The plant-of-immortality episode, attested in canonical SBV Tablet XI (George 2003, SB XI 266–289), represents a partial liquidation of the initial lack (immortality sought by Gilgamesh after Enkidu's death). However, because the plant is immediately stolen by the serpent before Gilgamesh can use it, the liquidation is structurally incomplete — the lack is only momentarily resolved and then re-imposed. The lacuna in this witness means this function can only be inferred from the canonical tradition rather than read directly from the provided source text, making the annotation reconstructed at best and contested given the narrative's failure to complete the function.
