  methodology_fit_warning: true
  methodology_fit_note: The serpent episode is not present in this witness; annotation is entirely reconstructed from canonical SBV tradition. The Propp morphology framework assumes a single dominant villain (Propp's 'Villain' sphere), but in Gilgamesh the adversarial roles are distributed (Humbaba, the Bull of Heaven, the serpent, death itself). Applying PROPP-8 to the serpent risks over-systematising what is a motif-level episode rather than a structurally villain-defined function. This annotation is contested accordingly.
