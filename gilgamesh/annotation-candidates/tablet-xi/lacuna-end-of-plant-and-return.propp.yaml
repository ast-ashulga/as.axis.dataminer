  rationale: Gilgamesh's return to Uruk carries a latent resonance with PROPP-23 in that he returns transformed by grief and the quest, yet without the immortality that would have marked a triumphant homecoming. His identity as a successful hero-seeker is in some sense unrecognised by the narrative outcome — he arrives as a man who failed to secure immortality. However, this is a thematic rather than structural application of PROPP-23, which conventionally requires literal non-recognition by characters within the story world. No such episode is attested in canonical SBV Tablet XI.
