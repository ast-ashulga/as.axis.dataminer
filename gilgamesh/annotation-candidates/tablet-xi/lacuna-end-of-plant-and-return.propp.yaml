- code: PROPP-8
  label: Villainy / Lack
  proposed_tier: contested
  status: confirmed
  rationale: The serpent's theft of the plant of immortality (canonical SBV Tablet XI, George 2003, SB XI 287–289) constitutes a villainous act that reinstates the original lack — Gilgamesh is deprived of the means to overcome death just as he had obtained them. This maps to PROPP-8 as a secondary or re-emergent villainy within the narrative arc. The function is absent from the provided witness due to lacuna and must be reconstructed from the canonical tradition. The serpent as 'villain' is an unusual Proppian mapping in a non-folktale epic context.
  evidence_citations:
