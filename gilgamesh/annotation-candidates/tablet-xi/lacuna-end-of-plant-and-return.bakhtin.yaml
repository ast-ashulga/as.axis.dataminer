  label: Threshold Chronotope
  proposed_tier: contested
  status: confirmed
  rationale: "The moment of the serpent's theft of the plant of immortality — reconstructed from canonical SBV XI — functions as a supreme threshold chronotope: time is suspended at the boundary between the possibility of restored youth and its permanent loss. Gilgamesh stands at the liminal divide between mortal and potentially renewed life, and the theft forecloses that crossing irrevocably. The threshold here is not a spatial gate but an existential boundary. Because this episode is wholly absent from the present witness, application is contested rather than merely reconstructed."
