- code: TMI-F110
  label: Journey to earthly paradise
  proposed_tier: reconstructed
  status: confirmed
  rationale: Gilgamesh has journeyed to the ends of the earth to reach Utnapishtim, who dwells in a remote, paradisiacal realm beyond the waters of death. The passage opens with Gilgamesh's direct address to Utnapishtim upon arrival, marking the culmination of this journey to an otherworldly location at the edge of the mortal world. The hero's astonishment that Utnapishtim appears physically ordinary underscores the extraordinary, semi-divine nature of the place and its sole immortal inhabitant.
