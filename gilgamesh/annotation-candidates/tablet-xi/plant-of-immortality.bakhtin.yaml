- code: BAKHTIN-THRESHOLD
  label: Threshold Chronotope
  proposed_tier: reconstructed
  status: confirmed
  rationale: "The moment when the serpent steals the plant constitutes a quintessential threshold chronotope: Gilgamesh stands at the absolute boundary between immortality and mortal limitation, and the narrative pivots irrevocably at this instant. Time is effectively suspended in the text — marked by the weeping, the tears rolling down his cheek — as Gilgamesh crosses from the state of near-triumph back into irremediable loss. The passage 'Sel potom i zaplakal' (he sat and wept) is the classic Bakhtinian threshold gesture of suspended, crisis-laden time. The serpent's intervention is not merely a plot event but a liminal catastrophe that determines Gilgamesh's entire human condition."
  evidence_citations:
  - Gumilev 1919, Tablet XI ('Gilgamesh vozvratilas', kriknul proklyat'e / Sel potom i zaplakal')
  - George 2003, SB XI 303-307
