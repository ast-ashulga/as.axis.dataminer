- code: BAKHTIN-ROAD
  label: Road / Journey Chronotope
  proposed_tier: reconstructed
  status: confirmed
  rationale: "The passage frames the entire plant-retrieval episode within the broader journey-return arc: Gilgamesh explicitly names the destination ('Ya vozmu ego v krepkiy Uruk'), positions the ferryman Ur-Ea/Urshanabi as travel-companion, and the closing lines invoke the road's end ('time to moor, time to leave the boat at the bank'). Chance and fatality govern this road-space — the chance encounter with the well, the chance approach of the serpent — which are hallmarks of the road chronotope where contingency and revelation converge. The Dyakonov fragment reinforces this with Utnapishthi's instructions about Gilgamesh's bodily renewal before resuming the journey homeward."
