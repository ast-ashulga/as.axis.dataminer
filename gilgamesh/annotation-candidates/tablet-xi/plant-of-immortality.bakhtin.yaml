- code: BAKHTIN-HEROIC-BODY
  label: Heroic Body Chronotope
  proposed_tier: contested
  status: confirmed
  rationale: Both source passages focus conspicuously on Gilgamesh's body as the site where the narrative stakes are inscribed. In Gumilev, his hands suffer fatigue ('moi ruki terpeli ustalost''), blood pours from his heart, and the plant physically wounds him ('ono yemu ruku pronzilo'). In Dyakonov, Utnapishthi's instructions centre on washing, reclothing, and restoring the beauty of the hero's body after the journey's degradation. The body is simultaneously the instrument of heroic action and the visible register of its cost. This is contested rather than reconstructed because the body-focus here is partly ritual purification (a separate cultural logic) rather than purely the Bakhtinian inscription of world-narrative on the heroic physique.
  evidence_citations:
  - Gumilev 1919, Tablet XI ('ono yemu ruku pronzilo'; 'moi ruki terpeli ustalost'')
  - Dyakonov 1961, Tablet XI ('Prekrasnym pust' stanet yego telo')
  - George 2003, SB XI 266, 303
  methodology_fit_warning: true
  methodology_fit_note: The body-focus in the Dyakonov fragment overlaps with ritual purification logic native to Mesopotamian tradition, which does not map cleanly onto Bakhtin's conception of the heroic body as a narrative-spatial marker. The annotation is defensible for the wounding and fatigue motifs in Gumilev but should be held lightly for the re-clothing passage, where the cultural framework diverges from the Bakhtinian model.
