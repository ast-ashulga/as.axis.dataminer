  label: Underworld / Netherworld Chronotope
  proposed_tier: reconstructed
  status: confirmed
  rationale: "Gilgamesh's descent into the ocean floor to retrieve the plant of immortality enacts a classic underworld-chronotope structure: the hero crosses the boundary of the living world (here, the cosmic deep/Apsu rather than a literal land of the dead), time is suspended during the submersion, and the stakes are life versus death. The weighted stones that pull him down and the upward return with his 'dobychey' (prize) mirror the descent-and-return pattern of underworld journeys. This follows directly from the Waters of Death crossing in Tablet X and maintains the same chronotopic zone."
