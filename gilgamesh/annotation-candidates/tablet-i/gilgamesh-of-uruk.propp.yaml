- code: PROPP-8
  label: Villainy / Lack
  proposed_tier: contested
  status: confirmed
  rationale: "The passage describes Gilgamesh's tyrannical behavior over the people of Uruk — denying sons to fathers, brides to grooms, wives to husbands — which constitutes a state of harm or oppression inflicted upon the community. This functions as the initial 'villainy' or socially recognized 'lack' that sets the narrative in motion. The harm is not caused by an external villain but by the hero himself acting as oppressor, which is an inversion of the typical Propp schema yet functionally analogous. Both Gumilev and Dyakonov renderings confirm this: 'Гильгамеша, не оставит он матери сына, / Не оставит он жениху невесты' (Gumilev 1919, Tablet I) and 'Отцу Гильгамеш не оставит сына! / Днем и ночью буйствует плотью' (Dyakonov 1961, Tablet I)."
  evidence_citations:
  - Gumilev 1919, Tablet I
  - Dyakonov 1961, Tablet I
  - George 2003, SB I 70–79
  methodology_fit_warning: true
  methodology_fit_note: In standard Propp morphology, PROPP-8 villainy is committed by an antagonist against a victim external to the hero. Here the hero himself is the source of harm to his own community, which inverts the typical triadic structure. The mapping is defensible functionally — the harm triggers the plot — but the role conflation (hero-as-villain) is a genuine schema misfit. Annotated as 'contested' rather than defaulting to 'reconstructed' given this structural ambiguity.
