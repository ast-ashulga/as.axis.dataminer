- code: PROPP-10
  label: Beginning Counter-Action
  proposed_tier: reconstructed
  status: confirmed
  rationale: Aruru's agreement — implicit in the gods' appeal to her and the subsequent narrative of Enkidu's creation — functions as the decision to counter the identified harm. The gods' repeated address 'К Аруру великой они приступают снова' (Gumilev 1919, Tablet I) and 'Теперь создай ему подобье!' (Dyakonov 1961, Tablet I) signals a resolved intent to act, analogous to the Propp moment where the counter-force agrees to engage. Aruru here occupies the role of an empowered agent who accepts the commission.
  evidence_citations:
  - Gumilev 1919, Tablet I
  - Dyakonov 1961, Tablet I
  - George 2003, SB I 92–95
  methodology_fit_warning: true
  methodology_fit_note: The 'seeker' or counter-hero in Propp is normally the protagonist. Here the counter-action is taken by Aruru (a divine creator figure) rather than a human hero, and Enkidu — not yet introduced — is the intended countermeasure. The mapping relies on treating the divine commission as functionally equivalent to the hero's resolve. This is a moderate schema stretch but defensible given the epic's divine-human narrative structure.
