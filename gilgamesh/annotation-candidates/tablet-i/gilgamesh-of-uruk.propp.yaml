- code: PROPP-9
  label: Mediation
  proposed_tier: reconstructed
  status: confirmed
  rationale: "The misfortune (Gilgamesh's oppression) becomes known to the gods when the people's prayers ascend to heaven: 'Мольба их достигла высокого неба, / Небесные боги, владыки Урука, сказали Аруру' (Gumilev 1919, Tablet I). The gods' assembly and their address to Aruru constitutes a divine mediation — the complaint is heard and action is dispatched. This parallels the Propp function where the hero's (or here, the community's) plight is recognized and a corrective response is set in motion, in this case the creation of Enkidu."
  evidence_citations:
  - Gumilev 1919, Tablet I
  - Dyakonov 1961, Tablet I
  - George 2003, SB I 84–91
