  generated_by_model: claude-sonnet-4-6
- code: TMI-A1335
  label: Origin of death
  proposed_tier: contested
  status: confirmed
  rationale: "The moment of Enkidu's civilizing — when the animals abandon him and he gains reason but loses his animal speed and belonging — implicitly encodes the myth of the Fall: the acquisition of knowledge or civilization correlates with the loss of immortal, animal vitality and marks the beginning of Enkidu's mortal trajectory. However, TMI-A1335 is more properly applied to later passages (e.g., Tablet X–XI) where the origin of death is explicitly thematized. Applying it here is structurally suggestive but methodologically contested."
  evidence_citations:
  - "Gumilev 1919, Tablet I: 'Устыдился себя Эабани, его тело стало тяжелым, / Останавливались колени, когда он гнался за стадом'"
  - "Dyakonov 1961, Tablet I: 'Вскочил Энкиду,-- ослабели мышцы, / Остановились ноги,-- и ушли его звери'"
  - George 2003, SB I 182–198
  methodology_fit_warning: true
  methodology_fit_note: TMI-A1335 is most precisely applicable to passages that explicitly address the origin of human mortality. Its application here relies on structural and thematic inference — the civilizing event as a 'fall' inaugurating mortality — rather than direct textual statement. This reading is well-supported in Gilgamesh scholarship (e.g., Tigay 1982) but remains an interpretive imposition on this specific segment.
