- code: TMI-B601.7
  label: Woman civilizes wild man
  proposed_tier: reconstructed
  status: confirmed
  rationale: Shamhat, functioning as a sacred prostitute or harlot, draws Enkidu away from his animal existence through sexual encounter. After their union of six days and seven nights, Enkidu finds that the animals flee from him, his body is heavy, his legs slow — but he has gained new understanding and reason. Shamhat then explicitly leads him toward civilized urban life (Uruk). This is the paradigmatic TMI-B601.7 scenario, and the Enkidu episode is indeed the archetype from which the motif is largely derived.
  evidence_citations:
  - "Gumilev 1919, Tablet I: 'Но теперь ощущает он новый разум, / Возвращается и садится у ног блудницы'"
  - "Dyakonov 1961, Tablet I: 'Но стал он умней, разуменьем глубже, / Вернулся и сел у ног блудницы'"
  - George 2003, SB I 182–198
  methodology_fit_warning: false
  ai_generated: true
  generated_by_model: claude-sonnet-4-6
- code: TMI-H900
  label: Tasks and quests
  proposed_tier: contested
  status: confirmed
  rationale: 'Gilgamesh assigns the hunter a specific task — to bring Shamhat to the watering place and deploy her to tame Enkidu — framing this as a condition or quest that initiates the larger narrative chain. However, the assignment is instrumental rather than a formal heroic quest in the canonical TMI-H900 sense, making this application somewhat debatable. The fit is partial: it is better understood as a delegated stratagem than a quest proper.'
  evidence_citations:
  - "Gumilev 1919, Tablet I: 'Возвратись, мой охотник, и возьми с собою блудницу'"
  - "Dyakonov 1961, Tablet I: 'Иди, мой охотник, блудницу Шамхат приведи с собою'"
  - George 2003, SB I 95–105
  methodology_fit_warning: true
  methodology_fit_note: TMI-H900 is designed for heroic quest assignments rather than tactical commissions of this kind. The application is defensible as a structural precursor to the larger Gilgamesh quest narrative but should not be treated as a primary coding for this segment.
