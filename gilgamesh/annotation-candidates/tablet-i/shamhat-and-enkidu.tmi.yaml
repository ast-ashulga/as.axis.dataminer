- code: TMI-F567.2
  label: Wild man
  proposed_tier: reconstructed
  status: confirmed
  rationale: Enkidu (Eabani in the Gumilev translation) is depicted as a man raised apart from civilization, living among and behaving as animals — drinking at watering holes with gazelles and cattle, grazing on grass, and running with the wild herds. This matches the TMI definition of a superhuman figure untamed by civilization, living among animals in the wilderness. Both source translations make this condition explicit before the civilizing encounter with Shamhat.
  evidence_citations:
  - "Gumilev 1919, Tablet I: 'И он, Эабани — его родина горы — / С газелями вместе щиплет травы, / Со скотому идет к водопою, / С водяными тварями веселится сердцем'"
  - "Dyakonov 1961, Tablet I: 'Степное зверье избегало его тела'"
  - George 2003, SB I 105–112
  methodology_fit_warning: false
