- code: TMI-F567.2
  label: Wild man
  proposed_tier: reconstructed
  status: confirmed
  rationale: The gods' complaint and the invocation of Aruru to create a double or counterpart for Gilgamesh anticipates the introduction of Enkidu, who in subsequent tablets is explicitly described as living among animals, untamed and apart from civilization. The passage establishes the narrative logic requiring his creation as a wild equal. Although Enkidu himself does not appear in this segment, the structural setup for TMI-F567.2 is fully instantiated here through the divine command to Aruru.
  evidence_citations:
  - "Gumilev 1919, Tablet I: 'Ты сумеешь создать и его подобье, Пусть они состязаются в силе'"
  - "Dyakonov 1961, Tablet I: 'Теперь создай ему подобье! Когда отвагой с Гильгамешем он сравнится'"
  - George 2003, SB I 94–99
  methodology_fit_warning: true
  methodology_fit_note: The wild-man motif is only prospectively activated in this segment; Enkidu's actual wild nature is described in later tablets. Applying TMI-F567.2 here annotates the structural premise rather than a fully realized narrative instance. The annotation remains defensible as an incipit marker, but interpreters should note the motif is not yet dramatized in this passage.
