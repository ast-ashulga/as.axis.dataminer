- code: TMI-D1840
  label: Magic invulnerability
  proposed_tier: contested
  status: rejected
  rationale: The text's characterization of Gilgamesh as two-thirds divine and one-third human, with a body 'bright as a great star,' implies a superhuman constitution that approaches the concept of magical invulnerability as encoded in TMI-D1840. However, the passage does not specify immunity to harm as such, and the subsequent narrative makes clear that Gilgamesh is in fact mortal and ultimately cannot escape death. The divine fraction is a marker of exceptional nature rather than a straightforward invulnerability motif.
  evidence_citations:
  - "Gumilev 1919, Tablet I: 'Божество он двумя третями, человек лишь одною, Его тело светло, как звезда большая'"
  - "Dyakonov 1961, Tablet I: 'На две трети он бог, на одну -- человек он, Образ его тела на вид несравненен'"
  methodology_fit_warning: true
  methodology_fit_note: TMI-D1840 requires a clear instantiation of magical protection from harm, which is not explicitly present in this segment. The divine composition of Gilgamesh is better understood as a heroic-status marker than a vulnerability motif. Applying TMI-D1840 here risks conflating the theological concept of divine origin with the folkloric motif of magical invulnerability. The annotation is proposed as 'contested' accordingly.
