- code: TMI-H900
  label: Tasks and quests
  proposed_tier: reconstructed
  status: confirmed
  rationale: The prologue frames the entire epic as the account of one who undertook supreme exertions — travelling to the ends of the world, enduring fatigue, and returning to inscribe his deeds. This functions as a retrospective framing of the quest-structure that underlies the narrative. While no explicit task-assignment occurs in this segment, the passage establishes the quest trajectory as the defining condition of Gilgamesh's existence, consistent with TMI-H900's concept of the hero defined by assigned endeavor.
  evidence_citations:
  - "Gumilev 1919, Tablet I: 'Ходил он далеко, и устал, и вернулся, И выбил на камне свои труды'"
  - "Dyakonov 1961, Tablet I: 'В дальний путь ходил, но устал и смирился, Рассказ о трудах на камне высек'"
  methodology_fit_warning: true
  methodology_fit_note: TMI-H900 strictly denotes a task or quest assigned as a condition upon the hero by another agent. The prologue's framing is retrospective and self-referential rather than depicting an assignment scene. The code is applicable in a broad structural sense but risks over-extension; the annotation is best understood as mapping the epic's quest-topology from its prologue, not a discrete narrative event.
