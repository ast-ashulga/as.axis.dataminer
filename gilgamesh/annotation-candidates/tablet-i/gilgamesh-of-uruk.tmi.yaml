- code: TMI-H1376.3
  label: Quest for immortality
  proposed_tier: reconstructed
  status: confirmed
  rationale: The prologue's description of Gilgamesh as one who 'saw everything to the edge of the universe,' 'fathomed the depths of wisdom,' and brought back knowledge from before the flood functions as a forward-referencing frame for the immortality quest that drives the epic's second half. The encyclopedic scope attributed to him in the opening lines directly indexes his later journey to Utnapishtim. This is a prologue-level instantiation of the motif rather than the quest episode itself.
