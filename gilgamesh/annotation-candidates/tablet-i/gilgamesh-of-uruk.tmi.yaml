- code: TMI-A1335
  label: Origin of death
  proposed_tier: reconstructed
  status: confirmed
  rationale: The prologue implicitly encodes the mortal/immortal tension that drives the epic's thematic core by describing Gilgamesh as two-thirds divine yet destined to tire and return — a being of partial divinity who nonetheless endures mortal exhaustion. This participates in the broader mythological framework of TMI-A1335, which addresses the structural separation between divine immortality and human mortality. The motif is thematically present in the framing even though the explicit origin-of-death narrative appears in later tablets.
  evidence_citations:
  - "Gumilev 1919, Tablet I: 'Ходил он далеко, и устал, и вернулся'"
  - "Dyakonov 1961, Tablet I: 'В дальний путь ходил, но устал и смирился'"
  - George 2003, SB I 1–28
  methodology_fit_warning: true
  methodology_fit_note: TMI-A1335 is conventionally applied to etiological narratives that explicitly explain why humans die. The prologue does not narrate such an origin; it merely thematizes the mortal condition of an exceptional hero. The code is proposed here as a structural-thematic annotation flagging the motif's presence at the level of the epic's framing ideology, but interpreters should not read this as a claim that the origin-of-death myth is directly instantiated in Tablet I's opening.
