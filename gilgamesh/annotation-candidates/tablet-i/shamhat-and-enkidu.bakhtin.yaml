- code: BAKHTIN-ROAD
  label: Road / Journey Chronotope
  proposed_tier: reconstructed
  status: confirmed
  rationale: "The hunter and Shamhat travel a direct road to the watering hole over three days, fusing time and space in purposeful motion. The journey is not incidental but structurally necessary: arrival at the road's terminus is the precondition for the fateful encounter with Enkidu. Chance and destiny converge at the journey's end in the classic road-chronotope pattern Bakhtin describes."
