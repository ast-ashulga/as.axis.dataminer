- code: BAKHTIN-HEROIC-BODY
  label: Heroic Body Chronotope
  proposed_tier: reconstructed
  status: confirmed
  rationale: "Enkidu's body is the primary site on which the narrative transformation is inscribed: his physical prowess (running with gazelles, his 'wildness') is the precondition for Shamhat's seduction and Gilgamesh's interest. The weakening of his legs, the heaviness of his limbs, and the flight of the animals are bodily markers that externalize an inner chronotopic shift — the world is reorganized around what his body can and can no longer do. Shamhat's subsequent speech frames Enkidu's body explicitly as godlike, echoed in both translations, establishing the heroic body as a narrative reference point for the journey to Uruk."
  evidence_citations:
  - "Gumilev 1919, Tablet I: 'Ты силен и прекрасен, ты — как бог, Эабани'"
  - "Dyakonov 1961, Tablet I: 'Ты красив, Энкиду, ты богу подобен'"
