- code: BAKHTIN-HEROIC-BODY
  label: Heroic Body Chronotope
  proposed_tier: reconstructed
  status: confirmed
  rationale: "Enkidu's body is explicitly the medium through which his narrative identity and cosmological status are established: his hair-covered form, his woman-like locks dense as ripe grain, and his strength compared to the host of Anu inscribe the world onto his physique before he has performed a single deed. The hunter's fear is triggered entirely by the body's visible power, and the father's counsel to Gilgamesh likewise frames Enkidu's threat through bodily attributes. The body here functions as a chronotopic marker — its description locates Enkidu at the boundary between divine creation and wild nature."
  evidence_citations:
  - "Gumilev 1919, Tablet I: 'В волосах его тело, он носит, как женщины, косу, / Пряди кудрей ниспадают, подобно спелым колосьям'"
  - "Dyakonov 1961, Tablet I: 'Шерстью покрыто все его тело, / Подобно женщине, волосы носит, / Пряди волос как хлеба густые'"
  - "Gumilev 1919, Tablet I: 'Велика его сила, как воинство Ану'"
  - George 2003, SB I 105–108
  methodology_fit_warning: false
  ai_generated: true
