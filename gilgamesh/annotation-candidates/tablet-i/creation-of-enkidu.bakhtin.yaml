- code: BAKHTIN-ROAD
  label: Road / Journey Chronotope
  proposed_tier: contested
  status: confirmed
  rationale: "The hunter's journey from the watering hole to his father's house, and then from his home to Uruk to stand before Gilgamesh, carries the structural logic of the road chronotope: travel as the mechanism by which information, crisis, and encounter are transmitted across space and time. The road brings the wild world of Enkidu into contact with the royal world of Gilgamesh through the mediation of the hunter's body in motion. However, the journey is brief and instrumental rather than richly developed as a zone of revelation in its own right, making this application somewhat marginal."
  evidence_citations:
  - "Gumilev 1919, Tablet I: 'Отцовскому слову внимает охотник, / Пускается в путь, шаги замедляет в Уруке, / Приходит на пир, говорит Гильгамешу'"
  - "Dyakonov 1961, Tablet I: 'Охотник отправился к Гильгамешу, / Пустился в путь, стопы обратил к Уруку, / Пред лицом Гильгамеша промолвил слово'"
  - George 2003, SB I 140–145
  methodology_fit_warning: true
  methodology_fit_note: The road chronotope is proposed here at 'contested' tier because the journey is narratively compressed and functions primarily as a plot conveyance rather than a developed chronotopic space. Bakhtin's road chronotope typically requires the road itself to be a site of meaningful encounter or revelation; here the meaningful encounters occur at the watering hole and at Uruk's court, with the road as connective tissue only. Annotation is still defensible as a minor or embedded chronotope.
