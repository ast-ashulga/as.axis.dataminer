- code: PROPP-8
  label: Villainy / Lack
  proposed_tier: contested
  status: confirmed
  rationale: "Enkidu's presence in the wilderness constitutes a form of harm or disruption: he destroys the hunter's traps, tears up his nets, and drives away the game animals, preventing the hunter from working. This maps to the Proppian function of villainy — an agent causes damage to a member of the community. Both translations make this disruption explicit, with the hunter lamenting his inability to labor in the steppe."
  evidence_citations:
  - "Gumilev 1919, Tablet I: 'Я вырыл ловушки, он их засыпал, / Я сети поставил, он их вырвал, / Угнал от меня он зверей пустыни, / Он не дает мне трудиться в пустыне'"
  - "Dyakonov 1961, Tablet I: 'Я вырою ямы -- он их засыплет, / Я поставлю ловушки -- он их вырвет, / Из рук моих уводит зверье и тварь степную'"
  - George 2003, SB I 110–120
  methodology_fit_warning: true
  methodology_fit_note: Enkidu is not a conventional villain in the Proppian sense — he acts out of wild innocence rather than malicious intent. The 'harm' he causes is structural rather than antagonistic. Applying PROPP-8 here is defensible as a functional mapping but should be understood as a contested fit, since Propp's morphology presupposes a morally charged villain, which Enkidu does not represent at this stage.
