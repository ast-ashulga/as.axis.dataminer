- code: PROPP-9
  label: Mediation
  proposed_tier: reconstructed
  status: confirmed
  rationale: "The misfortune — Enkidu's disruption of the hunter's livelihood and the threat he poses to ordered human activity — is communicated to Gilgamesh, who as king and hero is the appropriate agent to respond. In the Gumilev version the father explicitly directs the hunter to Gilgamesh as the source of counsel and power, framing this as the moment the crisis is formally made known to the hero. This constitutes the mediation function: the misfortune or lack is announced and the hero is implicitly called upon."
  evidence_citations:
