- code: PROPP-4
  label: Reconnaissance
  proposed_tier: contested
  status: confirmed
  rationale: The hunter observes Enkidu repeatedly at the watering hole over multiple days, gathering information about the mysterious wild man. This systematic observation functions as reconnaissance — the accumulation of knowledge about a powerful, unknown figure that will subsequently be reported to a higher authority. The repetition ('first day, second day, third day') underscores the deliberate nature of the observation.
  evidence_citations:
  - "Dyakonov 1961, Tablet I: 'Первый день, и второй, и третий / Перед водопоем его встречает'"
  - "Gumilev 1919, Tablet I: 'Еще и еще раз у водопоя'"
  methodology_fit_warning: true
  methodology_fit_note: "In the Proppian schema PROPP-4 is typically performed by the villain seeking information about the hero or victim. Here the function is inverted: it is a morally neutral human agent gathering information about the future hero-companion Enkidu. The application is defensible structurally but the role assignments do not align cleanly with Propp's original schema, hence the methodology fit warning."
