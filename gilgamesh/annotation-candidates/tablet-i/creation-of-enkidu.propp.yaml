- code: PROPP-5
  label: Delivery
  proposed_tier: contested
  status: confirmed
  rationale: The hunter delivers the information about Enkidu first to his father and then directly to Gilgamesh, completing the transmission of reconnaissance. In the Gumilev version this two-stage delivery is explicit — the father counsels the hunter to seek Gilgamesh, after which the hunter travels to Uruk and reports. In Dyakonov's version the hunter goes directly to Gilgamesh. Either way, the information about the powerful wild man reaches the figure with the authority to act on it.
  evidence_citations:
  - "Gumilev 1919, Tablet I: 'Уста отверзает охотник, отцу возвещает... Приходит на пир, говорит Гильгамешу'"
  - "Dyakonov 1961, Tablet I: 'Охотник отправился к Гильгамешу... Пред лицом Гильгамеша промолвил слово'"
  methodology_fit_warning: true
  methodology_fit_note: "As with PROPP-4, the role assignments are non-standard: delivery in Propp's schema typically serves the villain's intelligence-gathering operation. Here the delivery serves the community's effort to neutralize a disruption. The structural parallel is clear but the moral valence is reversed, making this a reconstructed rather than straightforward mapping."
