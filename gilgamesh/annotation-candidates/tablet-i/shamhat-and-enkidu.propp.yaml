- code: PROPP-8
  label: Villainy / Lack
  proposed_tier: reconstructed
  status: confirmed
  rationale: "After the union with Shamhat, Enkidu finds himself alienated from the animal world — the gazelles flee, the steppe creatures avoid him, and his physical prowess in the wild is diminished. This constitutes a 'lack': Enkidu has lost his original nature and belonging. Simultaneously it marks the initial condition requiring resolution through his integration into human society. Both the 'harm' (loss of wild community) and 'lack' (absence of civilised identity and a companion) sub-functions are operative here."
  evidence_citations:
  - "Gumilev 1919, Tablet I: 'Увидали его, Эабани, и умчались газели, / От него отпрянули звери его пустыни. / Устыдился себя Эабани, его тело стало тяжелым'"
  - "Dyakonov 1961, Tablet I: 'Увидав Энкиду, убежали газели, / Степное зверье избегало его тела'"
  methodology_fit_warning: false
  ai_generated: true
  generated_by_model: claude-sonnet-4-6
- code: PROPP-9
  label: Mediation
  proposed_tier: reconstructed
  status: confirmed
  rationale: "Shamhat's speech to the now-transformed Enkidu functions as a mediation: she names the misfortune (his isolation from the human world), presents the alternative (Uruk, Gilgamesh), and effectively dispatches him toward the resolution of the lack. She calls out the hero's potential and frames the mission, which is structurally equivalent to the misfortune becoming known and the hero being called to act."
  evidence_citations:
  - "Gumilev 1919, Tablet I: 'Я тебя поведу в Урук высокий, / В дом священный, жилище Иштар и Ану, / Где живет Гильгамеш, совершенный силой'"
  - "Dyakonov 1961, Tablet I: 'Давай введу тебя в Урук огражденный, / К светлому дому, жилищу Ану'"
  methodology_fit_warning: false
