- code: PROPP-2
  label: Interdiction
  proposed_tier: reconstructed
  status: confirmed
  rationale: "Gilgamesh issues a directive to the hunter with specific instructions: bring the harlot Shamhat, have her expose herself at the watering hole, and thereby lure Enkidu away from the wild animals. This functions as a command structuring the subsequent action, analogous to Propp's interdiction/command issued to an agent. The fit is partial since it is a command to an intermediary rather than a prohibition to the hero, warranting a methodology note."
  evidence_citations:
  - "Gumilev 1919, Tablet I: 'Возвратись, мой охотник, и возьми с собою блудницу'"
  - "Dyakonov 1961, Tablet I: 'Иди, мой охотник, блудницу Шамхат приведи с собою'"
  methodology_fit_warning: true
  methodology_fit_note: Propp's interdiction typically addresses the hero directly; here it is a command from Gilgamesh to the hunter-intermediary. The function is present in structural spirit but the addressee is not the primary hero figure, making this a forced mapping.
  ai_generated: true
  generated_by_model: claude-sonnet-4-6
- code: PROPP-6
  label: Trickery
  proposed_tier: contested
  status: confirmed
  rationale: Shamhat's deliberate exposure of her body at the watering hole constitutes a form of trickery or enticement deployed against Enkidu, who is the 'victim' of civilisation's lure. The plan is premeditated by Gilgamesh and executed by Shamhat precisely to deceive Enkidu's wild nature and draw him away from the steppe animals. This maps reasonably to the villain/agent attempting to deceive or beguile the victim, though Shamhat is not a villain in the moral sense.
  evidence_citations:
  - "Gumilev 1919, Tablet I: 'Обнажила груди блудница и лоно открыла, / Не стыдилась она, вдохнула его дыханье'"
  - "Dyakonov 1961, Tablet I: 'Пусть сорвет она одежду, красы свои откроет'"
  - George 2003, SB I 182–195
  methodology_fit_warning: true
  methodology_fit_note: Shamhat is not a villain in the Proppian sense; she is an agent of civilisation and of Gilgamesh. The 'trickery' here is structural — a planned lure — rather than malicious villainy. The function is defensible as a morphological parallel but the ethical valence is inverted relative to Propp's framework.
  ai_generated: true
  generated_by_model: claude-sonnet-4-6
- code: PROPP-7
  label: Complicity
  proposed_tier: contested
  status: confirmed
  rationale: Enkidu submits fully to Shamhat's seduction, spending six days and seven nights with her. His submission is the mechanism by which his wild nature is broken and the civilising transformation initiated. This maps to the victim yielding to the deceiver's stratagem, completing the trickery sequence.
  evidence_citations:
