- code: PROPP-10
  label: Beginning Counter-Action
  proposed_tier: reconstructed
  status: confirmed
  rationale: Enkidu agrees to Shamhat's proposal and expresses his willingness to be led to Uruk and to confront Gilgamesh. His declaration constitutes the hero's decision to act — the moment of counter-action against the state of lack — which Propp identifies as the seeker agreeing or resolving to act. The passage in Gumilev is particularly explicit with Enkidu's first-person consent.
  evidence_citations:
