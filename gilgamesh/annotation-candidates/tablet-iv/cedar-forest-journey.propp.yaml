- code: PROPP-10
  label: Beginning Counter-Action
  proposed_tier: reconstructed
  status: confirmed
  rationale: "Gilgamesh's repeated exhortations to Enkidu culminate in a clear declaration of resolve: he offers to go alone if necessary, reframes the quest in terms of eternal fame, and explicitly calls on Enkidu to abandon fear and join him. This constitutes the hero's conscious decision to act against the identified threat, which is the core of Propp's function. The rhetorical structure — dismissal of fear, appeal to glory, restatement of collective strength — is consistent across both translations."
  evidence_citations:
  - "Gumilev 1919, Tablet IV: 'Твое сердце хотело битвы: забудь про смерть и не бойся! / Человек осторожный, решительный, сильный / Сохраняет себя в сраженье'"
  - "Dyakonov 1961, Tablet IV: 'Забудь о смерти,-- достигнешь жизни! / Человек осторожный и неустрашимый, / Идя впереди, себя сохранил бы и товарища спас бы'"
