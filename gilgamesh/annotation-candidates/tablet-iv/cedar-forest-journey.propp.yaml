- code: PROPP-11
  label: Departure
  proposed_tier: reconstructed
  status: confirmed
  rationale: After overcoming both popular resistance and Enkidu's reluctance, Gilgamesh and Enkidu set out together toward the Cedar Forest of Humbaba. The passage explicitly marks the transition from the urban world of Uruk to the open field and then toward the mountain and forest, fulfilling the morphological function of the hero leaving his home domain. Both translations confirm the spatial and narrative transition.
  evidence_citations:
  - "Gumilev 1919, Tablet IV: 'Вот Гильгамеш с Эабани в поле, / Вместе идут они к лесу Хумбабы'"
  - "Dyakonov 1961, Tablet IV: 'Если бы в лес мы с тобою спустились'"
  methodology_fit_warning: false
  ai_generated: true
