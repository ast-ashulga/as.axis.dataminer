annotations:
- code: PROPP-2
  label: Interdiction
  proposed_tier: contested
  status: confirmed
  rationale: The people of Uruk and then Enkidu himself attempt to prevent Gilgamesh from departing toward the Cedar Forest, functioning as a prohibition against the hero's journey. The crowd blocks the gates and Enkidu bars the field-gates, constituting a collective command/restraint issued against the hero's intended action. However, this is an inverted form — the interdiction comes not from a superior authority but from the hero's own people and companion, making the mapping somewhat forced relative to Propp's standard formulation.
  evidence_citations:
  - "Gumilev 1919, Tablet IV: 'Не пускает уйти царя Гильгамеша' (repeated); 'Запер ворота, ведущие в поле, / Выйти из них не дает Гильгамешу'"
  methodology_fit_warning: true
  methodology_fit_note: The interdiction here is collective and socially motivated rather than issued by a donor-figure or elder authority figure as Propp envisages. The function is recognizable but structurally inverted; confidence is accordingly reduced to 'contested'.
  ai_generated: true
  generated_by_model: claude-sonnet-4-6
- code: PROPP-3
  label: Violation
  proposed_tier: reconstructed
  status: confirmed
  rationale: "Gilgamesh explicitly breaks through the prohibition: he leaps upon the crowd 'like a wild aurochs,' knocks down those blocking his exit, and forces his way out. The violation is deliberate and physically enacted, matching Propp's function of the hero transgressing the interdiction. The narrative consequence — the departure toward the Cedar Forest — confirms that the violation is structurally complete."
  evidence_citations:
  - "Gumilev 1919, Tablet IV: 'Но он прыгнул на них, как дикий буйвол, / Опрокинул людей, заградивших выход'"
  methodology_fit_warning: false
