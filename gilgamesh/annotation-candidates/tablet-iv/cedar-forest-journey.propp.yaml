- code: PROPP-8
  label: Villainy / Lack
  proposed_tier: contested
  status: confirmed
  rationale: Enkidu's description of Humbaba — whose voice is a storm, whose breath is death, and whose very presence causes 'weakness' (nemoch') to overcome all who enter the cedar forest — constitutes a narrative articulation of the threat or lack that motivates the quest. The identification of Humbaba as the divinely appointed guardian who causes harm defines the villain-function structurally, even if the full harm has not yet been enacted in this tablet.
  evidence_citations:
  - "Gumilev 1919, Tablet IV: 'Предназначил Хумбабу, чей голос, как буря... / И всех, кто в чащу его приходит, / Кто входит под кедры, постигает немочь'"
  - George 2003, SB IV (general reference to Humbaba as divinely appointed guardian)
  methodology_fit_warning: true
  methodology_fit_note: The 'villainy' here is prospective rather than accomplished — Humbaba has not yet acted against the heroes in this segment. The function is structurally present as a narrative motivation for the quest (the lack of access to cedar, the threat to the world), but it does not conform cleanly to Propp's formulation of villainy as a completed harmful act. Rated 'reconstructed' rather than 'contested' because the motivational logic is unambiguous even if the temporal form differs.
  ai_generated: true
  generated_by_model: claude-sonnet-4-6
- code: PROPP-9
  label: Mediation
  proposed_tier: contested
  status: confirmed
  rationale: Enkidu's fearful description of Humbaba's power and the danger of the Cedar Forest functions as a moment of mediation in which the misfortune/threat becomes clearly articulated and the stakes of the counter-action are made explicit to both heroes. This is a weak form of the function — it is not a third-party dispatcher but the companion himself who voices the peril — yet it serves the morphological role of making the challenge known so that the counter-action can be consciously chosen.
  evidence_citations:
  - "Gumilev 1919, Tablet IV: 'Отверзает уста, говорит Гильгамешу: / «Чтоб хранить невредимыми кедры... / Предназначил Хумбабу»'"
  methodology_fit_warning: true
  methodology_fit_note: Propp's Mediation typically involves a separate figure (a herald, a crying parent) who summons the hero. Here the companion/quasi-donor performs this role, collapsing functions in a way characteristic of non-folktale epics. The annotation is defensible as a functional analog but the fit is weak enough to warrant 'contested'.
