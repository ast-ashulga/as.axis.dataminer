- code: TMI-A1335
  label: Origin of death
  proposed_tier: contested
  status: confirmed
  rationale: "Gilgamesh's exhortation 'Забудь о смерти,-- достигнешь жизни!' ('Forget death — you will reach life!') and the paired phrase in Gumilev ('Твое сердце хотело битвы: забудь про смерть и не бойся!') gesture toward the epic's overarching thematic concern with the mortality of humans versus the immortality of gods, which is the subject of TMI-A1335. However, in this specific passage the motif is thematically implicit rather than narratively enacted — death is not explained or originated here but alluded to as the unavoidable mortal condition. The annotation is therefore contested as a thematic resonance rather than a direct instantiation."
  evidence_citations:
  - "Gumilev 1919, Tablet IV: 'Твое сердце хотело битвы: забудь про смерть и не бойся!'"
  - "Dyakonov 1961, Tablet IV: 'Забудь о смерти,-- достигнешь жизни!'"
  methodology_fit_warning: true
  methodology_fit_note: TMI-A1335 is most properly applied to the Tablet X–XI sections where Gilgamesh explicitly confronts Enkidu's death and the divine decree separating mortal and immortal lots. Applying it to Tablet IV is a thematic extension rather than a structural match, and analysts should note the risk of over-extending the motif beyond its narrative instantiation.
