- code: TMI-H900
  label: Tasks and quests
  proposed_tier: reconstructed
  status: confirmed
  rationale: The passage depicts Gilgamesh and Enkidu undertaking the journey to the Cedar Forest to confront Humbaba, a quest explicitly framed as a dangerous mission assigned by heroic ambition and divine sanction. Gilgamesh frames the enterprise as a test of courage and a means of securing lasting fame, fitting the TMI-H900 pattern of a hero assigned or self-imposing a perilous task. The quest structure is reinforced by the repeated encouragement and the explicit goal of 'nарубим кедра' (felling the cedar).
