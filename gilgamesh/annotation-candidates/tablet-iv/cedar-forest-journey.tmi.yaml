- code: TMI-Q2
  label: Kind and unkind
  proposed_tier: contested
  status: confirmed
  rationale: The contrasting characterization of Gilgamesh as courageous and resolute versus Enkidu as fearful and physically weakened in this passage evokes a kind/unkind or brave/cowardly contrast used to distinguish heroic worth. Gilgamesh explicitly shames Enkidu's hesitation while affirming his own resolve. However, TMI-Q2 is most classically applied to social or moral contrasts between two characters treated differently by fate or a supernatural agent, rather than to internal psychological contrast between two heroes; the fit is therefore contested.
  evidence_citations:
  - "Gumilev 1919, Tablet IV: 'Друг мой, как малый ребенок, ты плачешь'"
  - "Dyakonov 1961, Tablet IV: 'Друг мой, ужели мы будем так жалки?'"
  methodology_fit_warning: true
  methodology_fit_note: TMI-Q2 is structurally designed for contrasting pairs judged by an external agent. Its application here to an internal heroic dynamic is a secondary or analogical use, and the annotation should be marked contested to flag this methodological stretch.
