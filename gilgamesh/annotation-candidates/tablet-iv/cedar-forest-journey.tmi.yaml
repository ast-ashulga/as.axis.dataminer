- code: TMI-F567.2
  label: Wild man
  proposed_tier: reconstructed
  status: confirmed
  rationale: Enkidu (Эабани) is explicitly described in this passage as one 'who was born in the wilderness' ('Ты родился в пустыни'), and his fear and physical debilitation upon approaching the Cedar Forest are presented as residual traits of his untamed origin. His hesitation, trembling, and weeping contrast with Gilgamesh's civilized heroic resolve, marking the tension between his wild nature and his partially civilized state. This motif echoes his earlier characterization in Tablets I–II as a wild man raised among animals.
  evidence_citations:
  - "Gumilev 1919, Tablet IV: 'Он родился в пустыне и боится пустыни'"
  - "Dyakonov 1961, Tablet IV: 'Ослабеет тело, онемеют мои руки'"
  - George 2003, SB IV 1–40 (Enkidu's weakness before the forest)
  methodology_fit_warning: false
  ai_generated: true
