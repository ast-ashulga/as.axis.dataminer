- code: TMI-D1840
  label: Magic invulnerability
  proposed_tier: contested
  status: rejected
  rationale: Gilgamesh invokes Enkidu's battlefield invulnerability as a counter to his fear, suggesting a tradition in which Enkidu possesses a form of supernatural hardiness ('Натирался ты зельем и смерти не страшишься' — 'You rubbed yourself with an unguent and did not fear death'). This reference to a protective substance or ritual that renders the hero resistant to death in combat aligns with TMI-D1840. However, the motif is only obliquely present here and the 'зелье' (unguent/herb) may refer to mundane battle preparation rather than magic, making the application contested.
  evidence_citations:
  - "Dyakonov 1961, Tablet IV: 'Натирался ты зельем и смерти не страшишься'"
  - George 2003, SB IV (Gilgamesh's exhortation to Enkidu)
  methodology_fit_warning: true
  methodology_fit_note: The reference to 'зелье' (unguent) in the Dyakonov translation may be a loose rendering and does not correspond to a well-established philological detail of invulnerability in the standard cuneiform text. The TMI-D1840 annotation is therefore tentative and should be treated as contested pending verification against the Akkadian source.
