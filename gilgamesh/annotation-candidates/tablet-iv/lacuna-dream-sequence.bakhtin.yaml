- code: BAKHTIN-THRESHOLD
  label: Threshold Chronotope
  proposed_tier: contested
  status: confirmed
  rationale: "The dream episodes of Tablet IV function as threshold moments: Gilgamesh stands repeatedly at the boundary between waking and prophetic sleep, between courage and terror, and between the known world and the Cedar Forest domain of Humbaba. Each dream interpretation by Enkidu reframes the omen as a sign of crossing over into a new state. The threshold character is contested here because (a) the source text is absent, and (b) Bakhtin's threshold chronotope emphasizes suspended biographical time at a crisis point, whereas the Tablet IV dreams are iterative rather than singular — a pattern that somewhat diffuses the threshold's definitional sharpness."
  evidence_citations:
  - George 2003, SB IV (dream series, reconstructed)
  - George 2003, SB IV 102–116 (Enkidu's reinterpretation of ill omen as favorable)
  methodology_fit_warning: true
  methodology_fit_note: "Doubly contested application: first, the passage is a lacuna so no source text is analyzed; second, the iterative, serial structure of the Tablet IV dreams (five dreams, each interpreted) distributes the threshold moment across multiple instances rather than concentrating it at a single biographical crisis, which creates tension with Bakhtin's formulation of the threshold as a unique, suspended liminal instant. The annotation is proposed as 'contested' to reflect both the textual and theoretical uncertainties."
