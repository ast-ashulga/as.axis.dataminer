  rationale: "The battle with Humbaba is narrated almost entirely through the bodies of the combatants: blows land on specific anatomical sites (затылок, грудь), limbs go still (замерли его буйные члены), and the severed head of Humbaba becomes the culminating time-space marker of heroic triumph. The body of the defeated monster literalizes the narrative's turning point, while the dual heroic bodies of Gilgamesh and Enkidu function as the joint axis around which the combat's temporal sequence is organized. This is characteristic of the heroic body chronotope, where physical acts inscribe cosmological and narrative significance."
