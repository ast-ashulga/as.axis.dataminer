- code: BAKHTIN-THRESHOLD
  label: Threshold Chronotope
  proposed_tier: reconstructed
  status: confirmed
  rationale: "The killing of Humbaba represents a decisive liminal moment: before this point the heroes are mortal adventurers who have penetrated the Cedar Forest; after it, they have transgressed a sacred boundary set by the gods, a transgression that will lead directly to Enkidu's death and Gilgamesh's grief. Time is suspended in the crisis of combat itself — three blows, the third being fatal — and the passage marks an irreversible crossing from one existential state to another. The threshold quality is reinforced by Humbaba's role as guardian of a boundary zone between the human world and divine/cosmic forest."
  evidence_citations:
