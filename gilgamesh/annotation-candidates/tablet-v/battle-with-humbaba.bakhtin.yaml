- code: BAKHTIN-DIVINE
  label: Divine / Cosmic Chronotope
  proposed_tier: contested
  status: confirmed
  rationale: "The aftermath of Humbaba's defeat opens onto a cosmic register: the cedars groan for two leagues, Lebanon and Saria (Saria = Mount Hermon) fall silent, and the secret dwelling of the Anunnaki is revealed. These details position the killing not merely as a heroic deed but as an event that reverberates through cosmological space and impinges on divine geography. The phrase 'жилище Ануннаков тайное открыл он' is particularly striking — it implies that the heroes' act has breached a boundary maintained by divine order. However, the annotation is marked contested because this cosmological framing is subordinate to heroic narrative here and may better belong to the threshold chronotope; the divine-cosmic dimension is implicit rather than foregrounded through a divine council or mythic time perspective."
  evidence_citations:
