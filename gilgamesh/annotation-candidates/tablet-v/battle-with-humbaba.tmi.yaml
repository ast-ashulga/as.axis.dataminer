- code: TMI-Q2
  label: Kind and unkind
  proposed_tier: contested
  status: confirmed
  rationale: "The passage hints at a moral-cosmological contrast: Humbaba is portrayed as a divinely appointed guardian whose authority was recognised by Lebanon and Mount Saria, yet he is slain. The destruction of the cedar forest guardian and the cedars themselves ('S nim vmeste ubil Enkidu lesa i kedry') suggests a transgressive act against a divinely sanctioned order. This inverts the TMI-Q2 structure — the 'unkind' act (slaying the guardian, felling the sacred forest) is performed by the heroes — making this a contested and methodologically complex application."
  evidence_citations:
  - "Dyakonov 1961, Tablet V: 'Чье слово чтили Ливан и Сариа'"
  - "Dyakonov 1961, Tablet V: 'С ним вместе убил Энкиду леса и кедры'"
  methodology_fit_warning: true
  methodology_fit_note: TMI-Q2 traditionally contrasts kind versus unkind human characters and their differential outcomes. Applying it to the ambiguous moral register of the Humbaba episode — where the heroes' transgression is celebrated yet ultimately contributes to divine punishment — stretches the motif beyond its typical scope. The annotation is defensible as a structural parallel but should be treated as contested.
