- code: TMI-D1840
  label: Magic invulnerability
  proposed_tier: contested
  status: confirmed
  rationale: The passage in Dyakonov refers to Humbaba's 'razbitye luchi' (разбитые лучи — broken rays/auras), referencing his seven divine 'terrifying radiances' (melammu/puluḫtu). These supernatural auras functioned as a form of magical protection or invulnerability for Humbaba. The heroes' ability to overcome this protection is narratively significant, though the motif applies more strictly to Humbaba than to the heroes themselves, making this a contested application of the code.
  evidence_citations:
  - "Dyakonov 1961, Tablet V: 'Разбитые лучи Хумбабы. Когда их всех семерых убил он'"
  - George 2003, SB V 88–90 (the seven splendours/terrors of Humbaba)
  methodology_fit_warning: true
  methodology_fit_note: The TMI-D1840 code is designed for hero invulnerability rather than monster-guardian auras. Applying it to Humbaba's melammu requires analogical extension of the framework category, which introduces a methodology-fit concern. The annotation remains defensible insofar as the 'luchi' (radiances) function structurally as a magical protective force that must be neutralised before the monster can be slain.
