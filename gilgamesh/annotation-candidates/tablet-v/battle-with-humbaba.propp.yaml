  rationale: Dyakonov describes Gilgamesh and Enkidu stripping Humbaba's body of his war-net and a massive seven-talent dagger ('Боевую сеть и кинжал в семь талантов... снял с его тела'), and the unlocking of the secret dwelling of the Anunnaki ('Жилище Ануннаков тайное открыл он'). These spoils — especially the supernaturally potent weapons and the revealed hidden sanctuary — function analogously to the acquisition of a magical agent following the defeat of a donor-antagonist. The mapping is contested because the objects are war-trophies rather than gifts from a helper-donor; Propp's function normally involves a donor who tests and then bestows, whereas here acquisition follows violence.
