  rationale: In Gumilev's version, Enkidu's fate aids the heroes twice during the battle ('Дважды судьба помогла Эабани'), and the act of Gilgamesh wielding Humbaba's severed head can be read as a marking event — the hero is distinguished by the trophy of his deed. More concretely, the cosmic trembling of the cedar forest for two leagues (Dyakonov) marks the landscape itself as transformed by the heroes' action, leaving a permanent sign. The mapping is admittedly oblique; Proppian branding typically involves a physical wound or mark on the hero's body, which the text does not explicitly record here.
