  status: confirmed
  rationale: "Enkidu's words — 'Друг мой, Гильгамеш! Мы кедр убили' — mark a liminal moment: the killing of Humbaba and the felling of the sacred cedar are complete, but the heroes have not yet departed the forbidden zone. This is a threshold between the transgressive act in the Cedar Forest and the return to the human world; the ritual libation to Shamash ('Возлей перед Шамашем возлиянье') signals an attempt to re-sanctify and cross back over the boundary. The application is contested because the passage does not dramatize the crisis of crossing — it moves quickly toward practical logistics — so the threshold quality is implicit rather than foregrounded."
