- code: PROPP-19
  label: Liquidation
  proposed_tier: reconstructed
  status: confirmed
  rationale: "The harvesting and transport of the cedar timber — 'На берег Евфрата доставим кедры' — represents the liquidation of the initial lack that motivated the quest: Gilgamesh sought glory and lasting renown through a great deed, which required obtaining the cedars of the forbidden forest. Enkidu's instruction to make libation before Shamash and to carry the logs to the Euphrates marks the practical resolution of this lack, moving the heroes toward return."
  evidence_citations:
  - Dyakonov 1961, Tablet V
  - George 2003, SB V 295–302
  methodology_fit_warning: true
  methodology_fit_note: The 'lack' in Gilgamesh does not conform neatly to Propp's domestic-structural model. The quest is driven by existential desire for glory rather than a concrete object of lack as in folk morphology. PROPP-19 is defensible as an analogue but should be flagged as a reconstructed mapping rather than a direct structural parallel.
  ai_generated: true
  generated_by_model: claude-sonnet-4-6
- code: PROPP-20
  label: Return
  proposed_tier: reconstructed
  status: confirmed
  rationale: Enkidu's directive to transport the cedars to the banks of the Euphrates — 'На берег Евфрата доставим кедры' — initiates the return journey from the Cedar Forest to the civilised world of Uruk. This constitutes the beginning of the hero's spatial return, completing the arc of departure (PROPP-11) from Uruk that opened the Cedar Forest episode. The instruction to sheathe weapons and make offerings to Shamash further signals the close of the active quest phase.
  evidence_citations:
  - Dyakonov 1961, Tablet V
