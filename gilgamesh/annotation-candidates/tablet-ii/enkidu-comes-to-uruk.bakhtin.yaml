- code: BAKHTIN-THRESHOLD
  label: Threshold Chronotope
  proposed_tier: reconstructed
  status: confirmed
  rationale: "Two threshold moments crystallize in this segment. First, Enkidu's transformation from wild creature to socialized human — eating bread, drinking beer, anointing himself with oil, donning clothing — marks an irreversible liminal crossing from animal to human identity. Second, Enkidu blocking the door of the bridal chamber with his foot ('В брачный покой Энкиду дверь заградил ногою') is spatially and symbolically a threshold in the most literal sense: he stands at the boundary point that will trigger the confrontation with Gilgamesh and the decisive turn in both heroes' lives. Time is suspended at these doorways of transformation."
  evidence_citations:
