- code: BAKHTIN-HEROIC-BODY
  label: Heroic Body Chronotope
  proposed_tier: reconstructed
  status: confirmed
  rationale: "Both heroes' bodies function as narrative-spatial markers throughout this segment. Gilgamesh's body is described with royal luminosity ('его очи сияют, его вид благороден, / его тело возбуждает желанья') and superhuman stamina ('он, что не ложится ни днем, ни ночью'). Enkidu's body is the site of civilizational inscription: the shepherds read his identity from his physique ('ростом пониже, но костью крепче'), he self-discovers his transformation by touching his own hairy body, and his physical exploits against lions and wolves mark the time-space of the pastoral. The wrestling dream further encodes the bodies of both heroes as the axis around which the narrative world pivots."
