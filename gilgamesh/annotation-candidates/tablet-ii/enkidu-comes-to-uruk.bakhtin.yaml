  rationale: "Enkidu and the harlot's entry into Uruk enacts the classic road chronotope: movement through space precipitates a decisive encounter with strangers in fine clothing, and the arrival before Gilgamesh's palace is the culminating chance meeting that fuses travel with revelation. The road here is the mechanism by which two worlds — wilderness and city — collide and produce narrative transformation."
