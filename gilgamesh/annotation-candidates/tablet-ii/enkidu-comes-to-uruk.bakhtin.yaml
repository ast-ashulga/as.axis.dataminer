- code: BAKHTIN-CASTLE
  label: Castle / Palace Chronotope
  proposed_tier: reconstructed
  status: confirmed
  rationale: "The palace of Gilgamesh is presented as a site where historical and legendary power is concretized in place: it is 'the place where the feast never ends,' a perpetual ceremonial space that embodies Gilgamesh's sovereignty and divine lineage. The description of the palace as a locus of unceasing festivity, presided over by a king whose legitimacy derives from Anu, Bel, and Ea, matches Bakhtin's castle chronotope in which historical time adheres to and saturates a physical structure."
