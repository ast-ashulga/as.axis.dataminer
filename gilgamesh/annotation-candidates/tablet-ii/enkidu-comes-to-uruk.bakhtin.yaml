  label: Idyllic / Rural Chronotope
  proposed_tier: reconstructed
  status: confirmed
  rationale: "The pastoral interlude at the shepherds' camp in the Dyakonov passage exhibits the idyllic chronotope: cyclical, bounded community life centered on animal husbandry, collective domestic rhythms (sleeping herdsmen, guarded flocks), and Enkidu's socialization into human foodways through bread and beer. The gathering of shepherds who study Enkidu, their whispering commentary, and the nocturnal protection he offers all encode the unity of place, generation, and natural cycle characteristic of Bakhtin's idyll."
