- code: TMI-B601.7
  label: Woman civilizes wild man
  proposed_tier: reconstructed
  status: confirmed
  rationale: The harlot (блудница) takes Enkidu by the hand, leads him to the shepherd's camp, teaches him to eat bread and drink beer, and anoints him with oil so that he 'resembles men.' This sequence of civilizing acts — dressing him, teaching human food customs, integrating him into human society — directly instantiates the motif of a woman drawing a wild man into civilization. The Dyakonov passage records these steps in sequential narrative detail.
  evidence_citations:
  - Dyakonov 1961, Tablet II ('За руку взяв, повела, как ребенка... Умастился елеем, уподобился людям, Одеждой оделся, стал похож на мужа')
  - George 2003, SB II 37–51
