- code: TMI-D1810
  label: Magic knowledge through dreams
  proposed_tier: reconstructed
  status: confirmed
  rationale: Gilgamesh recounts to his mother Ninsun a prophetic dream in which a star-like man falls upon him with the force of Anu's army; the dream is interpreted by the divine mother as a prophecy of the future companion Enkidu. The dream thus functions as a divinely conveyed foreknowledge of events, matching the TMI definition of prophetic or divine knowledge transmitted through a dream sequence. The Gumilev passage records both the dream and its authoritative maternal interpretation.
  evidence_citations:
