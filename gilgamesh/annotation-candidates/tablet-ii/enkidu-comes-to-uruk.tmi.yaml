  rationale: Enkidu is explicitly described as a being raised apart from civilization, living among animals, having suckled animal milk and lacking knowledge of bread or beer. The pастухи (shepherds) identify him as 'порожденье степи' (offspring of the steppe) and remark on his animal-like origins. His superhuman physical strength and untamed nature prior to civilizing contact are consistent markers of the wild-man motif.
