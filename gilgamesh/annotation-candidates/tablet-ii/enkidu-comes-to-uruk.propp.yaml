- code: PROPP-14
  label: Provision / Receipt of Magical Agent
  proposed_tier: reconstructed
  status: confirmed
  rationale: "Following his consumption of bread and beer and his anointing with oil ('умастился елеем'), Enkidu receives a transformed identity: he 'уподобился людям' (became like men), dressed in clothing, and took up weapons. This civilizing transformation functions structurally as the receipt of a magical agent — not a physical talisman, but the capacity for human social life and combat that will enable his role as Gilgamesh's companion and protector."
  evidence_citations:
  - "Dyakonov 1961, Tablet II: 'Умастился елеем, уподобился людям, одеждой оделся, стал похож на мужа. Оружие взял, сражался со львами'"
  methodology_fit_warning: true
  methodology_fit_note: The 'magical agent' here is not a discrete object but a civilizational transformation (clothing, oil, food, weaponry). Propp's framework anticipates tangible magical gifts; applying it to an identity transformation is interpretively defensible but represents a meaningful adaptation of the function.
