- code: PROPP-16
  label: Struggle
  proposed_tier: contested
  status: confirmed
  rationale: The prophetic dream narrated by Gilgamesh to his mother in Gumilev 1919 describes a wrestling/combat encounter between Gilgamesh and a figure 'born on the mountain' — identifiable as Enkidu. The dream struggle ('Я схватил его, но был он сильнее, я швырнул его, но он не качнулся') prefigures the physical contest that historically precedes their friendship. This is a proleptic or dream-mediated instance of the Struggle function.
  evidence_citations:
  - "Gumilev 1919, Tablet II: 'Я схватил его, но был он сильнее, я швырнул его, но он не качнулся, на него поднялась вся область Урука'"
  methodology_fit_warning: true
  methodology_fit_note: This struggle occurs within a reported dream, not as a direct narrative event in this passage. Propp's PROPP-16 envisions direct combat in the narrative present. Applying it to a prophetically reported dream-combat raises methodological concerns about the temporal and modal displacement of the function. The annotation is defensible as proleptic encoding but should be marked contested in a stricter reading.
