- code: PROPP-12
  label: First Function of Donor
  proposed_tier: reconstructed
  status: confirmed
  rationale: "The shepherd's camp episode in Dyakonov 1961 functions as a donor encounter: Enkidu is tested by exposure to human food and drink (bread and sикера/beer), which he initially does not know how to consume. The harlot Shamhat acts as donor-figure, instructing him and facilitating his transformation. The narrative emphasis on his confusion before the food ('смутившись, он глядит и смотрит') underscores the liminal, trial-like quality of this moment."
  evidence_citations:
  - "Dyakonov 1961, Tablet II: 'На хлеб, что перед ним положили, смутившись, он глядит и смотрит'"
  - "Dyakonov 1961, Tablet II: 'Блудница уста открыла, вещает Энкиду. Ешь хлеб, Энкиду -- то свойственно жизни'"
  methodology_fit_warning: true
  methodology_fit_note: Propp's donor function is designed around the hero being tested. Here it is Enkidu who undergoes the test, and he occupies an ambiguous role — simultaneously protagonist of his own arc and future helper to Gilgamesh. Applying PROPP-12 to Enkidu's civilizing arc is a recognized interpretive strategy in Gilgamesh scholarship but remains a structural stretch relative to the canonical function.
