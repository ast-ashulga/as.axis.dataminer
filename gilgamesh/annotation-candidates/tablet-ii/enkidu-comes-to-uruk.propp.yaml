- code: PROPP-9
  label: Mediation
  proposed_tier: reconstructed
  status: confirmed
  rationale: In the Gumilev 1919 passage, the harlot mediates between Enkidu and Gilgamesh by narrating Gilgamesh's prophetic dream to Enkidu, framing the coming encounter and urging Enkidu toward Uruk. She functions as a connective figure who makes the misfortune/lack (Gilgamesh's lack of a true companion, foretold in the dream) known to the relevant party and dispatches Enkidu toward resolution. The dream recounting ('Гильгамеш в Уруке во сне тебя видел') serves as the mediation mechanism.
  evidence_citations:
