- code: PROPP-15
  label: Spatial Translocation
  proposed_tier: reconstructed
  status: confirmed
  rationale: "Enkidu, accompanied by the harlot, journeys from the wilderness/steppe into the civilized city of Uruk, representing a fundamental spatial transition from one realm (the wild) to another (the urban). This translocation is not merely geographical but ontological — Enkidu crosses from the animal world into the human world. The passage in Gumilev 1919 explicitly marks their entry: 'Эабани с блудницей в Урук вступают' ('Eabani and the harlot enter Uruk'). The Dyakonov 1961 passage supports this with the prior civilizing stages at the shepherd's camp as intermediate translocational steps."
  evidence_citations:
  - "Gumilev 1919, Tablet II: 'Эабани с блудницей в Урук вступают'"
  - "Dyakonov 1961, Tablet II: 'За руку взяв, повела, как ребенка, к стану пастушьему'"
  - George 2003, SB II 1–30
  methodology_fit_warning: true
  methodology_fit_note: In canonical Propp morphology, spatial translocation (PROPP-15) conveys the hero to the villain's realm, guided by a magical agent. Here, it is Enkidu (arguably the future helper/companion, not the hero per se) who is translocated, and the harlot Shamhat functions as guide rather than a conventional magical agent. The function is broadly applicable but the role assignments do not align neatly with Propp's scheme.
