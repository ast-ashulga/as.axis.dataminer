- code: PROPP-8
  label: Villainy / Lack
  proposed_tier: contested
  status: confirmed
  rationale: Two instances of 'lack' are identifiable in this passage. First, the Dyakonov 1961 passage concludes with Enkidu blocking the bridal chamber door against Gilgamesh ('В брачный покой Энкиду дверь заградил ногою, Гильгамешу войти он не дал'), representing an immediate narrative lack/disruption. Second, the prophetic dream in Gumilev 1919 encodes Gilgamesh's lack of a companion — the dream announces a coming equal. The companion-lack is the deeper structural lack driving the narrative arc.
  evidence_citations:
  - "Dyakonov 1961, Tablet II: 'В брачный покой Энкиду дверь заградил ногою, Гильгамешу войти он не дал'"
  - "Gumilev 1919, Tablet II: 'Честный и сильный товарищ, всегда выручающий друга'"
  methodology_fit_warning: true
  methodology_fit_note: "The 'villain' role is structurally ambiguous here: Enkidu blocks Gilgamesh's access to the bride, yet Enkidu is simultaneously the future hero-companion, not a villain. The Lack sub-function (absence of a companion) fits better than the Villainy sub-function, but neither maps cleanly because the narrative is introducing a helper through apparent opposition. This application is contested and should not be treated as a straightforward villainy encoding."
