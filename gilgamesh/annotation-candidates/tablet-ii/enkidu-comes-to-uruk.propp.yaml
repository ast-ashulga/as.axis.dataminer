- code: PROPP-31
  label: Wedding
  proposed_tier: contested
  status: confirmed
  rationale: The closing lines of the Gumilev 1919 passage — 'Гильгамеш говорит с Эабани, и садятся они, как братья, рядом' ('Gilgamesh speaks with Enkidu, and they sit side by side, like brothers') — mark the culmination of the Enkidu civilizing arc with a symbolic union. While not a literal wedding, this fraternal bonding structurally parallels the 'wedding' function as the sealing of a social compact that resolves the initial lack (of a companion). The pairing is explicitly framed in terms of equality and mutual recognition.
  evidence_citations:
  - "Gumilev 1919, Tablet II: 'И садятся они, как братья, рядом'"
  methodology_fit_warning: true
  methodology_fit_note: PROPP-31 (Wedding) designates heterosexual marriage and enthronement as narrative closure. Applying it to a homosocial friendship bond is a significant adaptation. The function captures the symbolic closure of the Enkidu arc but diverges substantially from Propp's intended referent. This annotation should be treated as a loose structural analogue, not a direct morphological match, and is therefore marked contested.
