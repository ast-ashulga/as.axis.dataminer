- code: TMI-A1335
  label: Origin of death
  proposed_tier: reconstructed
  status: confirmed
  rationale: "Gilgamesh articulates a mythological axiom distinguishing mortal and divine existence: only the gods dwell with the Sun eternally, while human years are counted and all human action is as wind. This reflects the Mesopotamian cosmological assumption that death is the immutable lot of mortals, foundational to the epic's thematic arc. The speech is not yet a quest for immortality but a philosophical reckoning with its impossibility, which aligns with the etiological function of TMI-A1335."
