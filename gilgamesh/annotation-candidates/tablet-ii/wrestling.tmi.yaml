- code: TMI-H900
  label: Tasks and quests
  proposed_tier: contested
  status: confirmed
  rationale: The wrestling contest between Gilgamesh and Enkidu functions as a trial of strength that precipitates their friendship and sets the stage for future joint quests. Gilgamesh's act of kneeling — submitting rather than annihilating his opponent — resolves the contest in a manner that redefines their relationship and implicitly orients both heroes toward shared heroic tasks. The motif of a strength-trial as a precondition for companionship and adventure is consistent with TMI-H900, though the passage itself does not explicitly frame the contest as an externally assigned quest, making direct application contested.
  evidence_citations:
  - Dyakonov 1961, Tablet II (wrestling scene at the bridal chamber door)
  - George 2003, SB II 104–136
  methodology_fit_warning: true
  methodology_fit_note: TMI-H900 is designed for formally assigned tasks or quests imposed on a hero by an external authority. Here the wrestling bout is not assigned by a third party but arises organically from conflict. The fit is therefore partial; the annotation captures the trial-as-threshold function but does not map cleanly onto the canonical quest-assignment structure the code presupposes.
  ai_generated: true
  generated_by_model: claude-sonnet-4-6
- code: TMI-Q2
  label: Kind and unkind
  proposed_tier: contested
  status: confirmed
  rationale: After the combat Gilgamesh controls his wrath ('он смирил свой гнев, унял свое сердце'), and Enkidu responds with praise rather than enmity, recognising Gilgamesh's singular divine favour ('Над мужами главою ты высоко вознесся'). This contrast between the restraint that leads to mutual recognition and the implied alternative of continued destructive pride loosely maps onto the TMI-Q2 dynamic of contrasting moral responses and their consequences. The application is contested because TMI-Q2 classically involves two distinct characters receiving different rewards; here the transformation is within a single encounter between two protagonists.
  evidence_citations:
  - Dyakonov 1961, Tablet II (Enkidu's speech to Gilgamesh following the wrestling)
  - George 2003, SB II 130–136
  methodology_fit_warning: true
  methodology_fit_note: TMI-Q2 is most robustly applicable when two separate figures — one kind, one unkind — are contrasted and differentially rewarded. In this passage the contrast is between Gilgamesh's prior behaviour (implied hubris, oppressive rule) and his present self-restraint. This internalised moral contrast is a weaker fit for the code, and the annotation should be treated as heuristic rather than structural.
  ai_generated: true
  generated_by_model: claude-sonnet-4-6
- code: TMI-F567.2
  label: Wild man
  proposed_tier: reconstructed
  status: confirmed
  rationale: Enkidu's presence in this wrestling episode is the culmination of his trajectory as the canonical wild man of the epic tradition. Although the passage focuses on the combat's resolution rather than Enkidu's origin, his superhuman physical power ('стена содрогнулась') and his status as a being whose nature Gilgamesh's divine mother Ninsun uniquely matches ('одного тебя мать родила такого') implicitly contrasts Gilgamesh's divine lineage with Enkidu's wild, non-civilised origin. The scene thus marks the transition point at which the wild man enters civic and heroic companionship. TMI-F567.2 is well attested for Enkidu across Tablets I–II and the present passage represents its narrative resolution.
  evidence_citations:
  - Dyakonov 1961, Tablet II (wrestling scene)
  - George 2003, SB I 101–110; SB II 104–136
  methodology_fit_warning: false
  ai_generated: true
  generated_by_model: claude-sonnet-4-6
- code: TMI-B601.7
  label: Woman civilizes wild man
  proposed_tier: reconstructed
  status: confirmed
  rationale: While the harlot Shamhat's civilising encounter with Enkidu occurs earlier in the narrative (Tablet I), its consequence — Enkidu's capacity for speech, reason, and social engagement — is directly demonstrated in this passage when Enkidu delivers an eloquent, theologically sophisticated speech acknowledging Gilgamesh's divine mandate ('Эллиль над людьми судил тебе царство'). The wrestling scene and its verbal aftermath are the proof of Enkidu's civilisation; without Shamhat's prior role, this social and rhetorical competence would be impossible. The annotation is most properly located in Tablet I but remains relevant here as the motif's functional payoff.
  evidence_citations:
  - Dyakonov 1961, Tablet I (Shamhat episode); Tablet II (Enkidu's speech)
  - George 2003, SB I 178–202; SB II 130–136
  methodology_fit_warning: true
