  rationale: "Gilgamesh's speech projects his body as the instrument and memorial of heroic time: 'Если паду я - оставлю имя: Гильгамеш принял бой со свирепым Хумбабой!' The hero's potential death and the preservation of his name through physical combat inscribe his body as the site where narrative time and world-historical meaning converge. However, since the feat is anticipated rather than performed, the heroic body chronotope is here prospective and rhetorical rather than enacted, making the annotation contested."
