  rationale: "The proposed journey to the Cedar Forest is articulated as a spatial-temporal project — 'далеко есть горы Ливана' — in which motion through dangerous space is fused with the heroes' fate and the generation of heroic reputation. The road to the forest is explicitly characterised as perilous and transformative ('тяжек и путь к тому лесу'), establishing the journey as a site of potential encounter and revelation rather than mere transit. The chronotope is prospective here: the road exists as a narrative force even before it is taken."
