  rationale: Enkidu's final speech — praising Gilgamesh's divine birth from the wild cow Ninsun and his elevation above all men by Enlil — functions as a public recognition of the hero's true identity, nature, and legitimacy. This is not a recognition scene in the classic Proppian sense (hero returning from disguise), but structurally it marks the moment when the 'other' acknowledges who the hero truly is, which aligns with the Recognition function's narrative purpose. The speech cites both genealogical identity ('Буйволица Ограды, Нинсун') and cosmological mandate ('Эллиль над людьми судил тебе царство'), reinforcing the hero's status.
