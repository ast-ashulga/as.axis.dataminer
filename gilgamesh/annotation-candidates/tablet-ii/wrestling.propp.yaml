  methodology_fit_warning: true
  methodology_fit_note: Enkidu does not map cleanly onto the Proppian villain role. He is a temporary adversary who becomes the hero's companion, making PROPP-16 applicable in a structural sense but imperfect in a character-function sense. The annotation remains defensible as the episode is the single most explicit agonistic confrontation in the epic prior to any quest.
