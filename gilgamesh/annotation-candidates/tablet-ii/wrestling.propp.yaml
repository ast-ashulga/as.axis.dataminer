  label: Struggle
  proposed_tier: reconstructed
  status: confirmed
  rationale: The passage describes the direct physical combat between Gilgamesh and Enkidu at the threshold of the bridal chamber and on the wide road — a wrestling match that constitutes the central confrontational encounter between the two figures. The text explicitly depicts them grappling, shaking walls, and struggling until Gilgamesh forces Enkidu's knee to the ground, fulfilling the morphological function of hero-villain (or hero-adversary) direct combat. While Enkidu is not a conventional villain in Propp's schema, this wrestling episode is structurally analogous to the Struggle function, serving as the decisive test of strength that precedes the formation of their bond. The methodology_fit_warning is warranted because Enkidu functions simultaneously as adversary and future companion, not a true villain.
