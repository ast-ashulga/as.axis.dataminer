- code: PROPP-4
  label: Reconnaissance
  proposed_tier: contested
  status: confirmed
  rationale: Enkidu's extended description of Humbaba — his divine endowments, his terrifying attributes, the dangers of the path — can be read as a form of reconnaissance information being supplied to Gilgamesh (and the audience) regarding the nature of the antagonist. However, this is inverted from the standard Proppian schema where the villain conducts reconnaissance on the hero; here it is the hero-pair learning about the villain. The mapping is structurally suggestive but methodologically imprecise.
  evidence_citations:
  - Dyakonov 1961, Tablet II
  - George 2003, SB II
  methodology_fit_warning: true
  methodology_fit_note: Standard PROPP-4 requires the villain to seek information about the hero. Here the directionality is reversed — the heroes gather intelligence about the villain through Enkidu's prior knowledge. The annotation is defensible as a functional analogue but should be treated as contested rather than reconstructed with confidence.
  ai_generated: true
  generated_by_model: claude-sonnet-4-6
- code: PROPP-2
  label: Interdiction
  proposed_tier: contested
  status: confirmed
  rationale: Enkidu's speech warning against entering the Cedar Forest ('И кто входит в тот лес, того слабость объемлет') functions structurally as an interdiction — a warning or prohibition urging the hero not to proceed. Although Enkidu is not a formal authority figure issuing a command, his sustained cautionary rhetoric attempts to dissuade Gilgamesh from the quest, mirroring the morphological role of interdiction as a check on the hero's departure.
  evidence_citations:
  - Dyakonov 1961, Tablet II
  methodology_fit_warning: true
  methodology_fit_note: The interdiction here is informal and issued by a companion rather than an authority figure, which stretches the canonical Proppian definition. It is retained as contested because the functional analogy — a voiced prohibition that the hero will soon override — is structurally meaningful even if the agent relationship differs.
  ai_generated: true
  generated_by_model: claude-sonnet-4-6
- code: PROPP-3
  label: Violation
  proposed_tier: contested
  status: confirmed
  rationale: Gilgamesh's defiant dismissal of Enkidu's warnings — 'Ты и сейчас боишься смерти, / Где ж она, сила твоей отваги?' — constitutes a rhetorical violation of the interdiction just issued. By mocking Enkidu's fear and reaffirming his intent to march on Humbaba, Gilgamesh structurally violates the prohibition even before physical departure. The violation is prospective and verbal rather than enacted, which is a slight methodological stretch.
  evidence_citations:
  - Dyakonov 1961, Tablet II
  methodology_fit_warning: true
  methodology_fit_note: Violation typically follows interdiction as a narrative event rather than an immediate verbal counter within the same dialogue scene. The compressed dramatic form of Gilgamesh means both functions occur within a single exchange rather than across narrative episodes, reducing morphological clarity. Annotated as contested accordingly.
