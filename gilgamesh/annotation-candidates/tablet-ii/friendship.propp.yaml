- code: PROPP-10
  label: Beginning Counter-Action
  proposed_tier: reconstructed
  status: confirmed
  rationale: "Gilgamesh explicitly agrees to and declares his intention to undertake the counter-action against Humbaba: 'Я пойду перед тобою' ('I will go before you'). His rhetorical challenge to Enkidu's fear and his proclamation of readiness to sacrifice his life for eternal fame constitute a formal decision to act against the source of threat, matching the morphological function of the hero resolving to respond to the identified lack or villainy."
