  rationale: Gilgamesh responds to Enkidu's expression of distress by naming and articulating the quest objective — the Cedar Forest and Humbaba ('Давай его вместе убьем мы с тобою'). This functions as a mediating moment in which the misfortune/lack becomes the explicit grounds for dispatching or calling the hero(es) to action. Gilgamesh's speech crystallises the task and frames the enemy, mediating between the identified lack and the decision to act.
