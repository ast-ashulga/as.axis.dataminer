- code: BAKHTIN-DIVINE
  label: Divine / Cosmic Chronotope
  proposed_tier: reconstructed
  status: confirmed
  rationale: "The Scorpion-people inhabit a cosmic register that exceeds human scale: their heads touch the vault of heaven and their chests reach the underworld, making them figures of mythic time that encompasses both cosmological poles. The gate they guard regulates the daily solar cycle — a function that belongs to mythic, not historical, time. Gilgamesh's destination, Utnapishtim, 'принятый в собранье богов' (Dyakonov 1961, Tablet IX), further anchors this passage in the divine chronotope: the council of gods and the granting of eternal life represent the cosmological frame within which the hero's mortal crisis is judged. The identification of Gilgamesh as two-thirds divine also places him at the intersection of divine and human temporalities."
  evidence_citations:
  - "Gumilev 1919, Tablet IX: 'Головы их касался свод небесный, / И внизу их грудь доходила до ада'"
  - "Dyakonov 1961, Tablet IX: 'К тому, кто, выжив, в собранье богов был принят и жизнь обрел в нем!'"
  - George 2003, SB IX 40–47
  methodology_fit_warning: false
  ai_generated: true
