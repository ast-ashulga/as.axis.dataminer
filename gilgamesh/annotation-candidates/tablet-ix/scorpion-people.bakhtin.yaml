- code: BAKHTIN-HEROIC-BODY
  label: Heroic Body Chronotope
  proposed_tier: contested
  status: confirmed
  rationale: "The Scorpion-man's immediate recognition of Gilgamesh's body as divine — 'плоть богов — его тело!' (Dyakonov 1961, Tablet IX) and the fractional calculation of his divine/human composition — instantiates the heroic body chronotope: Gilgamesh's physical form is a text that the cosmic gatekeepers read to locate him in the narrative of the world. However, the body itself is not the primary agent of action in this passage; it is assessed rather than deployed. The application is therefore defensible but secondary to the threshold and road chronotopes, and the annotation is contested because Bakhtin's heroic body formulation was developed for Greek romance contexts where the body's feats mark time-space transitions more actively."
  evidence_citations:
  - "Gumilev 1919, Tablet IX: 'Тот, кто подходит к нам, тело его, как тело бога'"
  - "Dyakonov 1961, Tablet IX: 'На две трети он бог, на одну - человек он!'"
  methodology_fit_warning: true
  methodology_fit_note: "The heroic body chronotope as theorised by Bakhtin addresses the hero's physical feats as time-space markers within adventure narrative, a formulation derived primarily from Greek romance. Its application here is analogical rather than direct: the body is interpreted by divine guardians rather than performing feats. The annotation captures a genuine textual function — the body as a legible cosmic text — but the fit is partial and the confidence is accordingly lowered to 'contested'."
