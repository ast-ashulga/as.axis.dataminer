- code: BAKHTIN-UNDERWORLD
  label: Underworld / Netherworld Chronotope
  proposed_tier: reconstructed
  status: confirmed
  rationale: "The tunnel of Mount Mashu through which the sun travels at night is a spatial-temporal zone where ordinary time is inverted or suspended: 'Мрак там глубок, и нет там света / Ни при выходе солнца, ни при его возвращенье' (Gumilev 1919, Tablet IX). The tunnel is structurally equivalent to the underworld — it is where the sun passes through death each night, and entry by a living human is presented as irreversible ('Ты войдешь и больше оттуда не выйдешь!' — Dyakonov 1961, Tablet IX). The Scorpion-people's bodies themselves span heaven and the netherworld ('внизу их грудь доходила до ада' — Gumilev 1919, Tablet IX), literalising the vertical axis of this chronotope. Gilgamesh's motivation — the death of Enkidu and fear of his own death — grounds the netherworld chronotope in the epic's grief narrative."
  evidence_citations:
  - "Gumilev 1919, Tablet IX: 'И внизу их грудь доходила до ада'"
  - "Dyakonov 1961, Tablet IX: 'Темнота густа, не видно света'"
  - "Dyakonov 1961, Tablet IX: 'Ты войдешь и больше оттуда не выйдешь!'"
  - George 2003, SB IX 45–47
  methodology_fit_warning: false
