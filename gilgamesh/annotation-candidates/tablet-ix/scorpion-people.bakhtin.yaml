- code: BAKHTIN-ROAD
  label: Road / Journey Chronotope
  proposed_tier: reconstructed
  status: confirmed
  rationale: "The passage is saturated with the road chronotope: Gilgamesh arrives at Mashu after traversing wilderness and rivers ('Реки переплыл, где трудна переправа' — Dyakonov 1961, Tablet IX), and the encounter with the Scorpion-people is precisely the chance meeting that the road chronotope predicts — strangers converging at a nodal point of travel who reveal information and transform the hero's trajectory. The twelve-league tunnel — 'дорога Шамаша' — is itself a compressed spatial-temporal corridor fusing movement with cosmological time. The road here is not metaphorical but ontological: it is the literal path of the sun through the mountain of the world."
  evidence_citations:
  - "Dyakonov 1961, Tablet IX: 'Дальней дорогой бегу в пустыне' and 'Реки переплыл, где трудна переправа'"
  - "Dyakonov 1961, Tablet IX: 'По дороге Шамаша стопы он направил'"
  - "Gumilev 1919, Tablet IX: 'Нет никого, Гильгамеш, кто прошел бы такою дорогой'"
