- code: BAKHTIN-THRESHOLD
  label: Threshold Chronotope
  proposed_tier: reconstructed
  status: confirmed
  rationale: "The gate of Mount Mashu is the paradigmatic threshold of the epic: Gilgamesh stands at the boundary between the human world and the underworld tunnel of the sun, between mortal life and the quest for immortality. Time is suspended — the Scorpion-people exist precisely to mark the liminal hinge of solar time (sunrise/sunset), and Gilgamesh's passage through the gate is the decisive turning point of his journey. Both translations render this suspension explicitly: the gate is opened and closed with the sun's passage, and Gilgamesh must choose to cross into absolute darkness. The interrogation by the Scorpion-man enacts the threshold drama: identity is tested ('на две трети он бог, на одну — человек он!' — Dyakonov 1961, Tablet IX), the crossing is warned against, and permission is finally granted."
  evidence_citations:
  - "Gumilev 1919, Tablet IX: 'Но иди, Гильгамеш, не медли в горных воротах'"
  - "Dyakonov 1961, Tablet IX: 'Ворота гор для тебя открыты'"
  - George 2003, SB IX 76–79
  methodology_fit_warning: false
