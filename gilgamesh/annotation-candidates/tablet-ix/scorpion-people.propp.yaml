- code: PROPP-9
  label: Mediation
  proposed_tier: contested
  status: confirmed
  rationale: "Within Gilgamesh's speech to the Scorpion-man, the hero recounts the misfortune that has set him in motion: Enkidu's death and his own terror of mortality. This retrospective narration functions as an embedded mediation moment — the articulation of the lack ('Устрашился я смерти, не найти мне жизни') that drives the quest. Gilgamesh's declaration to the Scorpion-man of his intention to seek Utnapishtim echoes the mediation function by re-stating the driving lack at the threshold of the journey's most dangerous phase."
  evidence_citations:
  - "Dyakonov 1961, Tablet IX: 'Устрашился я смерти, не найти мне жизни: Мысль о герое не дает мне покоя!' / 'К Утнапишти, отцу моему, иду я поспешно'"
  methodology_fit_warning: true
  methodology_fit_note: PROPP-9 technically belongs to the initial movement of the narrative and has already been established earlier in the epic. Its appearance here is retrospective and embedded in dialogue rather than a new narrative event. It is annotated as 'contested' because while the thematic function (articulating the lack that motivates the quest) is present, it is a recapitulation rather than a structurally new instantiation of mediation.
