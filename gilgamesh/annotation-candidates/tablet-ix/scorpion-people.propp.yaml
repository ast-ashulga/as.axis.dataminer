- code: PROPP-15
  label: Spatial Translocation
  proposed_tier: reconstructed
  status: confirmed
  rationale: Once the Scorpion-man opens the mountain gate, Gilgamesh is directed along the Road of Shamash — a cosmic, supernatural path through total darkness beneath Mount Mashu. This passage constitutes a spatial translocation from the mortal world into an otherworldly domain, structurally analogous to Propp's function of the hero being conveyed to another realm. The twelve-league underground journey through impenetrable darkness ('На двенадцать поприщ простирается внутрь он') marks an unambiguous transition between cosmological zones.
  evidence_citations:
  - "Dyakonov 1961, Tablet IX: 'По дороге Шамаша стопы он направил' / 'На двенадцать поприщ простирается внутрь он: Темнота густа, не видно света'"
  - "Gumilev 1919, Tablet IX: 'Мрак там глубок, и нет там света Ни при выходе солнца, ни при его возвращенье'"
  - George 2003, SB IX 139–170
