- code: PROPP-13
  label: Hero's Reaction
  proposed_tier: reconstructed
  status: confirmed
  rationale: Gilgamesh responds to the Scorpion-people's challenge by composing himself despite his fear, then delivering a full and honest account of his grief, his motivation (Enkidu's death and fear of his own mortality), and his destination (Utnapishtim). This forthright, courageous response — 'В тоске моей плоти, в печали сердца... вперед пойду я!' — demonstrates the hero's correct reaction to the donor's test, which in Propp's scheme determines whether the hero will succeed.
  evidence_citations:
