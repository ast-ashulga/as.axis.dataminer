- code: PROPP-12
  label: First Function of Donor
  proposed_tier: contested
  status: confirmed
  rationale: The Scorpion-people function as threshold guardians who test Gilgamesh by interrogating his identity, origin, and purpose before granting or denying passage. In both translations, the Scorpion-man questions Gilgamesh — 'Зачем ты пришел, хочу узнать я' (Dyakonov) — probing his worthiness. This interrogation constitutes the donor's test prior to the provision of access (the magical or spatial gift of passage through the mountain).
  evidence_citations:
  - "Dyakonov 1961, Tablet IX: 'Почему идешь ты путем далеким, Какою дорогой меня достиг ты... Зачем ты пришел, хочу узнать я'"
  - George 2003, SB IX 77–80
  methodology_fit_warning: true
  methodology_fit_note: "The Scorpion-people are not a donor in the conventional Proppian sense — they do not bestow a magical object or agent. Their 'gift' is information and permission to pass. The fit is partial: they test and then grant access, which aligns structurally with PROPP-12 but lacks the material magical agent typical of the function. Annotated as 'contested' accordingly."
