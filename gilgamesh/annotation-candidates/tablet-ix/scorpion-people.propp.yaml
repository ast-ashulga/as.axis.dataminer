- code: PROPP-11
  label: Departure
  proposed_tier: reconstructed
  status: confirmed
  rationale: Gilgamesh arrives at Mount Mashu and, after his exchange with the Scorpion-people, is granted passage through the mountain gate and sets off along the Road of Shamash. This marks the formal departure into a liminal, otherworldly realm — the hero leaves the known world behind. The Scorpion-man's permission ('Ворота гор для тебя открыты') constitutes the threshold crossing that initiates the hero's journey into darkness.
  evidence_citations:
  - "Dyakonov 1961, Tablet IX: 'Ворота гор для тебя открыты' / 'Гильгамеш, когда услышал это, Человеку-скорпиону был послушен, По дороге Шамаша стопы он направил'"
  - "Gumilev 1919, Tablet IX: 'Но иди, Гильгамеш, не медли в горных воротах'"
  - George 2003, SB IX 136–138
  methodology_fit_warning: true
  methodology_fit_note: This is a secondary departure — Gilgamesh's primary departure from Uruk occurred earlier. Propp's morphology envisions a single departure (PROPP-11), but the Gilgamesh narrative stages multiple threshold crossings. The Mashu gate crossing functions structurally as a departure into a supernatural realm and is annotated as such, though it is more precisely a liminal threshold event than a domestic departure in the Proppian sense.
