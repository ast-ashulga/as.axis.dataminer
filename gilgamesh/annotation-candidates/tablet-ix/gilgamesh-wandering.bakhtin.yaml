- code: BAKHTIN-ROAD
  label: Road / Journey Chronotope
  proposed_tier: reconstructed
  status: confirmed
  rationale: "Gilgamesh's flight into the wilderness and his urgent journey toward Utnapishtim fuses time and space through the motion of travel: grief drives him forward, the desert and mountain passes become the medium through which his existential crisis is traversed. The road here is not merely a physical route but the narrative site where fear, prayer, and revelation converge. Both translations emphasize the urgency of movement ('иду поспешно' / 'путь я предпринял'), characteristic of the road chronotope's collapse of inner and outer progression."
  evidence_citations:
  - "Gumilev 1919, Tablet IX: 'К мощи Ут-напиштима... Путь я предпринял, иду поспешно'"
  - "Dyakonov 1961, Tablet IX: 'Под власть Утнапишти... Путь я предпринял, иду поспешно'"
  - George 2003, SB IX 1–14
