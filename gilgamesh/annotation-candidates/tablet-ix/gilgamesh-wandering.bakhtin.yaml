- code: BAKHTIN-DIVINE
  label: Divine / Cosmic Chronotope
  proposed_tier: contested
  status: confirmed
  rationale: Gilgamesh's prayers to Sin and the assembly of gods, and his invocation of Ishtar, briefly open a cosmological frame within the personal crisis narrative. The appeals gesture toward a divine-time perspective that encompasses and judges human mortality, even if the gods do not respond directly in this segment. The phrase 'к собранью богов мольбы мои вознесутся' (Gumilev) / 'ко всем богам идут мои молитвы' (Dyakonov) explicitly invokes the divine council as an encompassing cosmic register. This application is somewhat attenuated since the gods do not speak here, making it a contested annotation.
  evidence_citations:
  - "Gumilev 1919, Tablet IX: 'Голову я подниму, воззову к великому Сину, И к собранью богов мольбы мои вознесутся'"
  - "Dyakonov 1961, Tablet IX: 'Главу подымая, молюсь я Сину, И ко всем богам идут мои молитвы'"
  methodology_fit_warning: true
  methodology_fit_note: The divine chronotope is most robustly applicable when the cosmic-mythic perspective is actively voiced or enacted (e.g., divine council scenes). Here it appears only as the target of human supplication, not as an autonomous narrative voice. The annotation remains defensible as a projected or invoked cosmic frame, but its strength is weaker than in passages where divine deliberation is foregrounded. Tier assessed as 'contested' accordingly.
