- code: BAKHTIN-THRESHOLD
  label: Threshold Chronotope
  proposed_tier: reconstructed
  status: confirmed
  rationale: "Gilgamesh's nocturnal arrival at the mountain passes marks a liminal boundary between the human world and the cosmic/underworld geography beyond. His terror at the lions, his prayers to Sin and Ishtar, and the suspension of decisive action (lying down, being frightened by dreams) all signal a crisis-moment at the boundary between life and the unknown. Time is effectively suspended in the night encampment: Gilgamesh is neither fully in the mortal world nor yet in the realm he seeks. The mountain rift (ущелья горные / перевалов горных) functions as a threshold space in the Bakhtinian sense."
  evidence_citations:
  - "Gumilev 1919, Tablet IX: 'Ночью пришел я к ущельям горными, Львов я увидел, и вот мне страшно'"
  - "Dyakonov 1961, Tablet IX: 'Перевалов горных достигнув ночью, Львов я видал, и бывало мне страшно'"
  - George 2003, SB IX 1–20
  methodology_fit_warning: false
  ai_generated: true
