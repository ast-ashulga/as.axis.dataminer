- code: TMI-H1376.3
  label: Quest for immortality
  proposed_tier: reconstructed
  status: confirmed
  rationale: "Gilgamesh explicitly articulates his terror of death following Enkidu's demise and undertakes a journey to find Utnapishtim, the sole mortal granted immortality by the gods. The quest motivation is stated directly: 'I shall die! Am I not like Enkidu?' Both translations confirm the hero's flight from death and his purposeful journey toward Utnapishtim as a quest for the secret of eternal life. This is the clearest instantiation of the immortality quest motif in the epic's structural arc."
  evidence_citations:
