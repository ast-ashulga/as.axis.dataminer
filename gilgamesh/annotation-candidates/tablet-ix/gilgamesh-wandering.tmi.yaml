- code: TMI-A1335
  label: Origin of death
  proposed_tier: reconstructed
  status: confirmed
  rationale: Gilgamesh's lament—'And shall I not die as Enkidu did?'—reflects the epic's sustained meditation on the asymmetry between mortal and divine existence, a core mythological theme explaining why humans must die. His grief crystallises the moment of existential confrontation with human mortality as a fixed condition, contrasted implicitly with divine immortality. This passage functions as a narrative articulation of the mortal lot, a motif that underlies the entire ninth tablet's opening movement.
  evidence_citations:
  - "Gumilev 1919, Tablet IX: 'Я умру! Не такой же ль и я, как Эабани?'"
  - "Dyakonov 1961, Tablet IX: 'И я не так ли умру, как Энкиду?'"
  - George 2003, SB IX 3
  methodology_fit_warning: false
  ai_generated: true
