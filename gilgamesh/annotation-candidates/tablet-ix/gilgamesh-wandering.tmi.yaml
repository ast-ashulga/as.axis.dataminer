- code: TMI-F110
  label: Journey to earthly paradise
  proposed_tier: contested
  status: confirmed
  rationale: The journey to Utnapishtim at the ends of the earth—crossing mountain passes at night, traversing lion-haunted terrain—is cognate with the journey-to-earthly-paradise motif, as Utnapishtim dwells at the mouth of the rivers in a remote paradisiacal location. However, the destination is more precisely a liminal threshold realm than a conventional paradise, and the motif in Tablet IX is only incipient; the full journey is elaborated in later tablets. Application here is defensible but partial, warranting a contested tier.
  evidence_citations:
  - "Gumilev 1919, Tablet IX: 'К мощи Ут-напиштима... Путь я предпринял'"
  - "Dyakonov 1961, Tablet IX: 'Под власть Утнапишти... Путь я предпринял'"
  - George 2003, SB IX 1–6
  methodology_fit_warning: true
  methodology_fit_note: The TMI-F110 paradise journey motif fits the overall arc of Tablet IX–XI better than this specific opening passage; applying it here risks conflating narrative destination with the journey's initiation phase. The annotation is nonetheless defensible as marking the moment of departure toward that destination.
