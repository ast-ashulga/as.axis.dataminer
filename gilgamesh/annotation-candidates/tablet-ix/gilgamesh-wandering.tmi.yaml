- code: TMI-D1810
  label: Magic knowledge through dreams
  proposed_tier: contested
  status: confirmed
  rationale: The Gumilev translation notes that Gilgamesh 'lay down on the earth and was frightened by a terrible dream,' implying a dream vision at the mountain pass—a recurrent device in the epic whereby divine or prophetic content is communicated to the hero nocturnally. However, the content of this specific dream is not elaborated in either translation provided, making full TMI-D1810 application uncertain. The Dyakonov version replaces the dream with a waking vision of lions, further complicating the textual basis. The annotation remains contested due to this translational divergence.
