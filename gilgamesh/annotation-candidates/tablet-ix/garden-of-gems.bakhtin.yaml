annotations:
- code: BAKHTIN-DIVINE
  label: Divine / Cosmic Chronotope
  proposed_tier: contested
  status: confirmed
  rationale: "The garden of gems (kirimāhu) that Gilgamesh enters at the tunnel's end exists in mythic, cosmic time rather than human time: it lies along the path of the sun-god Shamash himself and is adorned with carnelian, lapis lazuli, and gem-fruit that belong to the divine rather than mortal world. The trees bearing jewels ('На лазоревом камне выросло райское древо... Между них изумруды, рубины, яхонт' in Gumilev; 'Сердолик плоды приносит... Лазурит растет листвою' in Dyakonov) evoke the cosmological paradise at the edge of the world. This space operates on a timescale that subsumes human experience, characteristic of Bakhtin's Divine/Cosmic chronotope. The garden is not encountered in historical time but in the eternal mythic time of divine geography."
  evidence_citations:
  - "Gumilev 1919, Tablet IX: 'Деревья богов он увидел, к ним путь направил... На лазоревом камне выросло райское древо'"
  - "Dyakonov 1961, Tablet IX: 'рощу из каменьев увидев: Сердолик плоды приносит... Лазурит растет листвою'"
  - George 2003, SB IX 171–196
  methodology_fit_warning: true
  methodology_fit_note: Bakhtin did not theorize the Divine chronotope with reference to ancient Mesopotamian material, and the gem-garden's symbolic register (divine gemstones as paradise markers) is culturally specific in ways that partially exceed Bakhtinian categories. The annotation is nonetheless defensible because the passage explicitly presents a cosmic, non-human spatial-temporal zone — the sun's own garden — that operates on mythic rather than historical time. The fit concern is acknowledged but does not invalidate the annotation; it is downgraded to 'reconstructed' rather than any higher certainty.
