- code: BAKHTIN-HEROIC-BODY
  label: Heroic Body Chronotope
  proposed_tier: contested
  status: confirmed
  rationale: "The passage measures cosmological space through the endurance of Gilgamesh's body: each league traversed in total darkness is a unit of physical heroic endurance, and the hero's body becomes the instrument by which the impossible tunnel is mapped and conquered. The Dyakonov version makes the body's crisis explicit — at the third league Gilgamesh turns back, then steels himself — inscribing psychological and physical heroism directly onto the spatial progression. This partially activates the Heroic Body chronotope, where the world's narrative is written through the hero's physical performance. However, the body is largely absent as a described object here (no wounds, no feats of strength described), making this a weak activation of the code."
  evidence_citations:
  - "Dyakonov 1961, Tablet IX: 'Третье поприще пройдя, он вспять обратился. С духом собрался, вперед зашагал он. Четвертое поприще уже прошел он'"
  - "Gumilev 1919, Tablet IX: 'Восемь часов идет, и дует северный ветер'"
  methodology_fit_warning: true
  methodology_fit_note: The Heroic Body chronotope is contested here because the passage foregrounds spatial-temporal measurement rather than bodily inscription per se. The body is the implicit instrument of traversal but is not the explicit narrative site. The annotation is proposed as 'contested' and supplementary to the primary BAKHTIN-ROAD and BAKHTIN-THRESHOLD annotations.
