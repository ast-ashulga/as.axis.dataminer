  methodology_fit_warning: true
  methodology_fit_note: The gem-garden fruit is not unambiguously identified with the plant of immortality in the Standard Babylonian text; the immortality plant (uruḫḫu) appears explicitly only in Tablet XI. Applying TMI-D1346 to Tablet IX requires an interpretive leap that is defensible as foreshadowing within the quest structure but is contested as a direct motif assignment.
