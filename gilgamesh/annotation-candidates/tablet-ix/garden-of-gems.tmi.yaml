- code: TMI-F10
  label: Journey to heaven
  proposed_tier: contested
  status: confirmed
  rationale: The passage describes Gilgamesh traversing the solar tunnel through Mount Mashu — the path of the sun — and emerging on the divine side of the cosmic mountain, which some scholars interpret as entry into the divine realm rather than strictly an earthly paradise. However, the garden is not unambiguously celestial or heavenly; it is better classified as an earthly paradise (TMI-F110), making this code secondary and contested. The overlap between TMI-F10 and TMI-F110 in this context reflects genuine scholarly debate about the cosmological status of the garden in the Standard Babylonian Version.
  evidence_citations:
  - "Gumilev 1919, Tablet IX: 'на лазоревом камне выросло райское древо'"
  - George 2003, SB IX 135–175
  methodology_fit_warning: true
  methodology_fit_note: The boundary between TMI-F10 (Journey to heaven) and TMI-F110 (Journey to earthly paradise) is not clearly demarcated by the Thompson Index in the context of ancient Near Eastern cosmology, where the garden of the sun occupies a liminal space. The annotation is defensible as secondary/contested but TMI-F110 should be preferred as primary.
