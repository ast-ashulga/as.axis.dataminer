- code: TMI-D1346
  label: Magic plant gives immortality
  proposed_tier: contested
  status: confirmed
  rationale: The gem-trees of the divine garden are described as bearing perfect, wondrous fruit ('плоды совершенны для взгляда'; 'Сердолик плоды приносит'), and the garden is explicitly populated with miraculous vegetation. Some scholars read the garden of gems as a precursor or symbolic anticipation of the plant of immortality retrieved later in Tablet XI. However, in this passage no plant of immortality is explicitly named, possessed, or consumed, making the direct application of TMI-D1346 to this specific segment contested rather than primary.
  evidence_citations:
