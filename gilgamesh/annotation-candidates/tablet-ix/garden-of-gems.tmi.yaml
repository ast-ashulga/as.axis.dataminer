- code: TMI-H1376.3
  label: Quest for immortality
  proposed_tier: reconstructed
  status: confirmed
  rationale: The traversal of the Mashu tunnel and entry into the divine garden is a narrative stage within Gilgamesh's overarching quest for immortality, motivated by grief over Enkidu's death. The garden of gems is a threshold marker in this quest sequence, representing the hero's passage beyond the limits of the mortal world toward the divine realm where Uta-napishti (the flood survivor granted eternal life) resides. Both translations frame the journey as an extraordinary ordeal — twelve double-hours of darkness — appropriate to a quest structure.
  evidence_citations:
