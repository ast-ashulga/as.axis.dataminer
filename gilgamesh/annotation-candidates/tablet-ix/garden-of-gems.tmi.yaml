- code: TMI-F110
  label: Journey to earthly paradise
  proposed_tier: reconstructed
  status: confirmed
  rationale: Gilgamesh traverses the tunnel of Mashu and emerges into a paradisiacal garden at the edge of the world, populated with gem-bearing trees and miraculous fruit — a liminal divine space at the boundary of the mortal world. Both translations render this as a sacred grove belonging to the gods ('деревья богов' in Gumilev; 'роща из каменьев' in Dyakonov), consistent with the standard identification of the garden of the sun-god as an earthly paradise. The passage maps closely onto the scholarly reconstruction of the garden of Shamash, which George 2003 identifies as a paradise located at the ends of the earth, at the far shore of the cosmic sea.
  evidence_citations:
  - "Gumilev 1919, Tablet IX: 'Деревья богов он увидел, к ним путь направил'"
  - "Dyakonov 1961, Tablet IX: 'рощу из каменьев увидев'"
  - George 2003, SB IX 170–196
  methodology_fit_warning: false
  ai_generated: true
