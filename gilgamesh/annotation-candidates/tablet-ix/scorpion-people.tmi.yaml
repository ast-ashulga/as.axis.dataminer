- code: TMI-A1335
  label: Origin of death
  proposed_tier: contested
  status: confirmed
  rationale: Gilgamesh's lament over Enkidu — 'Его постигла судьба человека!' and his fear that he too will 'lie down never to rise again' — encapsulates the mythic theme of the mortal human condition versus divine immortality. The contrast between Utnapishtim's exceptional immortality and the universal human fate of death is explicitly articulated, reflecting the TMI-A1335 motif of why humans must die. However, this passage presents the existential consequence rather than an aetiological origin narrative proper, making the code contested.
  evidence_citations:
  - "Dyakonov 1961, Tablet IX: 'Его постигла судьба человека!... Так же, как он, и я не лягу ль, Чтоб не встать во веки веков?'"
  - George 2003, SB IX 3–6
  methodology_fit_warning: true
  methodology_fit_note: TMI-A1335 is typically applied to aetiological myths explaining the origin of death as an institution. Here the motif appears as a lived existential crisis rather than a cosmogonic explanation. The application is defensible as a thematic resonance but should not be treated as a full structural match.
