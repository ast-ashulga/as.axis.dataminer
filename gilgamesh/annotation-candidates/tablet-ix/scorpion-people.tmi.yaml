- code: TMI-H900
  label: Tasks and quests
  proposed_tier: reconstructed
  status: confirmed
  rationale: The Scorpion-man effectively sets out the conditions and impossibility of the road through Mashu as a barrier to Gilgamesh's quest, functioning as a threshold guardian who defines the task's extreme difficulty. His warning — that no one has ever passed through this mountain — frames the passage as a formal quest threshold test, consistent with TMI-H900's broader category of hero assigned impossible or dangerous quest conditions.
  evidence_citations:
