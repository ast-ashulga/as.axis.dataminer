- code: TMI-F10
  label: Journey to heaven
  proposed_tier: contested
  status: confirmed
  rationale: The passage describes Gilgamesh's approach to Mount Mashu, whose peaks touch the vault of heaven ('Наверху металла небес достигают' / 'Головы их касался свод небесный'). The road of Shamash through the mountain is a liminal cosmic pathway between the mortal world and divine/celestial realms, making TMI-F10 applicable, though the journey is more precisely a transit through a cosmic underworld tunnel than a straightforward ascent to heaven. The code is therefore contested since the destination is Utnapishtim at the ends of the earth rather than a heavenly realm proper.
