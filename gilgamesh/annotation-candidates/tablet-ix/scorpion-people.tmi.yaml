- code: TMI-F110
  label: Journey to earthly paradise
  proposed_tier: reconstructed
  status: confirmed
  rationale: Gilgamesh explicitly states his destination is Utnapishtim, the flood survivor who was granted eternal life and dwells at the ends of the earth — a classic earthly paradise motif. The Scorpion-man's warning that no mortal has ever traversed this path reinforces the extraordinary, paradise-boundary nature of the journey. This is the strongest applicable TMI code for the overarching narrative function of the scene.
  evidence_citations:
