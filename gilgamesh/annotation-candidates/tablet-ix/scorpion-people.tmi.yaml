- code: TMI-H1376.3
  label: Quest for immortality
  proposed_tier: reconstructed
  status: confirmed
  rationale: "The passage is a pivotal moment in Gilgamesh's quest for immortality: he explicitly tells the Scorpion-man that he travels to Utnapishtim to learn the secret of life and death ('Я спрошу у него о жизни и смерти!'). His grief over Enkidu's death and terror of his own mortality are stated as the direct motivations, making TMI-H1376.3 the primary quest motif operative in the scene."
  evidence_citations:
