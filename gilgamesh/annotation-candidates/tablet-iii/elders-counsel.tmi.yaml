- code: TMI-F567.2
  label: Wild man
  proposed_tier: reconstructed
  status: confirmed
  rationale: Enkidu is referenced in both translations as the liminal figure who uniquely knows the roads to the Cedar Forest — knowledge rooted in his origin as a wild man raised among animals. The elders' directive that 'Enkidu goes before you; he knows the way to the cedar forest' implicitly draws on his pre-civilized, wilderness expertise. His role as guide and protector in this passage is a narrative residue of his wild-man character established in earlier tablets.
  evidence_citations:
  - Dyakonov 1961, Tablet III ('Пускай Энкиду идет пред тобою, / Он знает дорогу к кедровому лесу')
  - George 2003, SB I 102–106 (Enkidu's origin among wild animals in the steppe)
