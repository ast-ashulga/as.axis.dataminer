  label: Tasks and quests
  proposed_tier: reconstructed
  status: confirmed
  rationale: The elders formally acknowledge and sanction Gilgamesh's quest against Humbaba, framing the expedition to the Cedar Forest as a heroic task undertaken under communal charge. The council's blessing and the explicit assignment of protective duties to Enkidu constitute a social ratification of the quest condition. The elders' final injunction — 'we entrust the king to you in council; when you return, you shall entrust the king back to us' — functions as a formal commissioning of the task.
