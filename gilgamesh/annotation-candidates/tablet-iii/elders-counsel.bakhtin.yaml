- code: BAKHTIN-ROAD
  label: Road / Journey Chronotope
  proposed_tier: reconstructed
  status: confirmed
  rationale: The elders' counsel explicitly frames the coming expedition as a journey along a known road to the Cedar Forest, fusing temporal urgency (preparation, departure, promised return) with spatial directionality. The advice 'Он знает дорогу к кедровому лесу' and the injunction that Enkidu walk ahead as guide foreground the road itself as the site of danger, companionship, and transformation. Chance and fate are anticipated along this path, consistent with Bakhtin's formulation of the road as the space where destinies intersect and are tested.
