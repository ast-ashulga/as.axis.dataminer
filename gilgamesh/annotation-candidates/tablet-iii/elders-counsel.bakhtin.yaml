- code: BAKHTIN-THRESHOLD
  label: Threshold Chronotope
  proposed_tier: reconstructed
  status: confirmed
  rationale: "The scene is structurally liminal: the community formally blesses and dispatches its king before he crosses into the wilderness and confronts Humbaba. The elders' words — 'Мы в совете тебе царя поручаем, / Как вернешься ты -- нам царя поручишь!' — mark a boundary between the known world of Uruk and the dangerous unknown, with the return an open question. Gilgamesh's intention to visit Ninsun's 'high palace' before departure in the Gumilev version reinforces a threshold ritual of leave-taking before the decisive crossing."
  evidence_citations:
  - "Dyakonov 1961, Tablet III: 'Мы в совете тебе царя поручаем, / Как вернешься ты -- нам царя поручишь!'"
  - "Gumilev 1919, Tablet III: 'Друг мой, пойдем во дверец высокий / К служанке Нинсун, великой царице'"
  methodology_fit_warning: false
  ai_generated: true
