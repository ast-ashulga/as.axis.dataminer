- code: PROPP-9
  label: Mediation
  proposed_tier: contested
  status: confirmed
  rationale: "Enkidu's dying address to Gilgamesh — 'Друг мой отныне меня возненавидел... Я и ты — не равно ли мы смертны?' — functions as a moment of mediation in which the misfortune (mortality, the loss of the companion) is made explicit and communicated to the hero. By voicing the shared condition of death and implicitly questioning why he has been abandoned, Enkidu signals to Gilgamesh that a response is required, initiating the call to counter-action. This is, however, an attenuated mediation: there is no formal dispatcher figure, and the 'call' is embedded in lamentation rather than explicit command."
  evidence_citations:
  - Dyakonov 1961, Tablet VII
  methodology_fit_warning: true
  methodology_fit_note: Propp's mediation function presupposes a clear dispatcher who announces the misfortune and sends the hero. Here the dying Enkidu himself serves this role obliquely through existential questioning rather than direct commission, making the annotation contested. The function is present in spirit but structurally diffuse compared to canonical folktale instances.
