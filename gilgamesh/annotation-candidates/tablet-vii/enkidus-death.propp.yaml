- code: PROPP-8
  label: Villainy / Lack
  proposed_tier: reconstructed
  status: confirmed
  rationale: Enkidu's mortal illness and impending death constitute a fundamental 'lack' or harm visited upon the hero-pair. The gods have decreed Enkidu's death as punishment for the slaying of Humbaba and the Bull of Heaven, and this passage depicts the physical manifestation of that divine villainy. The twelve-day progression of his suffering ('стал недуг тяжелей у Энкиду') marks the irreversible onset of catastrophic loss that will propel Gilgamesh into his subsequent quest. This is the narrative wound that initiates the second great movement of the epic.
  evidence_citations:
  - Dyakonov 1961, Tablet VII
  - George 2003, SB VII 1–60
  methodology_fit_warning: true
  methodology_fit_note: The Propp framework assigns villainy/lack typically to an external antagonist's direct action, but here the 'villain' is divine decree rather than a personified foe acting in the present scene. The mapping is defensible as a 'lack' sub-function (absence of vitality, impending loss of the companion) but is not a clean fit to the classical morphological schema.
