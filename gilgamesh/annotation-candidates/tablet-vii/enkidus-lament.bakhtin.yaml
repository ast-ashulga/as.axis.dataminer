- code: BAKHTIN-THRESHOLD
  label: Threshold Chronotope
  proposed_tier: reconstructed
  status: confirmed
  rationale: "Enkidu's twelve-day illness and the extended dying process constitute a sustained threshold moment: he is suspended between life and death, neither fully in the world of the living nor yet claimed by the underworld. Normal time is marked obsessively by the counting of days (день четвертый, и пятый, шестой, и седьмой...) yet this enumeration only underscores stasis and the suspension of forward movement. The threshold here is both physical (the sickbed as liminal site) and existential (the boundary between being and non-being). This is among the most paradigmatic threshold chronotopes in ancient epic literature."
  evidence_citations:
  - "Gumilev 1919, Tablet VII: 'День четвертый, и пятый, шестой, и седьмой, и восьмой, и девятый, / Всех двенадцать дней оставляет болезнь Эабани в постели'"
  - George 2003, SB VII 1–14
  methodology_fit_warning: false
