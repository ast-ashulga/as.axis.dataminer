- code: BAKHTIN-DIVINE
  label: Divine / Cosmic Chronotope
  proposed_tier: reconstructed
  status: confirmed
  rationale: "Gilgamesh's prayer to the gods and Shamash's response from heaven introduce the Divine chronotope: mythic, cosmological time interrupts and frames the human drama of Enkidu's dying. Shamash's declaration from the sky — that the word of a god cannot be revoked, that the lot once cast cannot be retrieved — articulates a cosmic temporality that stands above and governs human fate. The enumeration of divine figures (Anu, Enlil, Shamash, and then in the underworld Ereshkigal and Anu and Enlil receiving offerings from the dead) further positions the narrative within a layered cosmic order that encompasses both living and dead time."
  evidence_citations:
  - "Dyakonov 1961, Tablet VII: 'Пусть, отец богов, будет милостив Ану, / Даже Эллиль да сжалится, смилуется Шамаш'"
  - "Dyakonov 1961, Tablet VII: 'Услыхал его Шамаш, воззвал к нему с неба: / ...Слово, что сказано, бог не изменит... / Судьба людская проходит,-- ничто не останется в мире!'"
  - George 2003, SB VII 40–60
