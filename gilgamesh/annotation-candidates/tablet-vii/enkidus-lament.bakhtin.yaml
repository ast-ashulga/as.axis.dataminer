  generated_by_model: claude-sonnet-4-6
- code: BAKHTIN-UNDERWORLD
  label: Underworld / Netherworld Chronotope
  proposed_tier: reconstructed
  status: confirmed
  rationale: "Enkidu's dream-vision of the House of Dust (Дом праха) is a canonical instantiation of the Underworld chronotope: time is suspended or inverted, the dreamer crosses the boundary of death while still living, and he encounters the dead — former kings, priests, legendary figures such as Etana and Sumuqan — who now exist in a state of diminished, lightless being. The descent is enacted through the dream rather than bodily travel, but this does not diminish the chronotopic force; the spatial markers (дом мрака, жилище Иркаллы, дом, откуда вошедший никогда не выходит) are explicit and structural. Ereshkigal and the tablet-keeper Belet-seri, who reads Enkidu's fate aloud, confirm the underworld's function as a space where cosmic judgment operates outside living time."
  evidence_citations:
  - "Dyakonov 1961, Tablet VII: 'Взглянул и увел меня в дом мрака, жилище Иркаллы, / В дом, откуда вошедший никогда не выходит'"
  - "Dyakonov 1961, Tablet VII: 'В Доме праха, куда вступил я, / Живут жрец и служка... Живет Эрешкигаль, земли царица'"
  - George 2003, SB VII 155–200
  methodology_fit_warning: false
