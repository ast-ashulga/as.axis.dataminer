- code: BAKHTIN-HEROIC-BODY
  label: Heroic Body Chronotope
  proposed_tier: contested
  status: confirmed
  rationale: Enkidu's body in decline and in dream-struggle functions as a site where the narrative's central transformation is inscribed. In his dream, his physical struggle with the bird-man figure — striking, being struck, being seized 'like a vice' (как тисками) and transformed into a bird — enacts the hero's passage from warrior to victim, from the world of physical heroic time to the suspended time of the underworld. This application is contested because Enkidu's body here is not the site of triumphant heroic inscription (the more typical form of the BAKHTIN-HEROIC-BODY chronotope) but rather of its negation and dissolution; the framework's fit is meaningful but requires interpretive extension to cover bodily defeat and metamorphosis as much as bodily achievement.
  evidence_citations:
  - "Dyakonov 1961, Tablet VII: 'Он за власы схватил, меня одолел он... Сжал, как тисками, все мое тело'"
  - "Dyakonov 1961, Tablet VII: 'Он ко мне прикоснулся, превратил меня в птаху, / Крылья, как птичьи, надел мне на плечи'"
  - "Gumilev 1919, Tablet VII: 'Вот боюсь я борьбы и не выйду в поле'"
  methodology_fit_warning: true
  methodology_fit_note: The BAKHTIN-HEROIC-BODY chronotope is more naturally aligned with scenes of heroic achievement and physical triumph. Its application here, to a scene of bodily subjugation, illness, and oneiric transformation, requires acknowledging that the passage inverts rather than instantiates the standard heroic-body pattern. The annotation is still defensible as a negative or inverted instance — Enkidu's body marks the end of his heroic time precisely through its failure — but the contested tier is appropriate.
