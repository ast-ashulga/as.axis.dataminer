- code: PROPP-9
  label: Mediation
  proposed_tier: contested
  status: confirmed
  rationale: "Enkidu's dream functions as the communicative channel through which the misfortune (his decreed death) becomes known to the heroes. In both translations, Enkidu recounts the divine council to Gilgamesh, making the misfortune manifest and socially shared. In Dyakonov's version, Enkidu explicitly opens speech to relay the dream: 'Друг мой, о чем совещаются великие боги? / Слушай мой сон, что я видел ночью' — the dream-report serves as mediation, calling forth awareness of the doom. Gumilev similarly frames the exchange as Enkidu addressing Gilgamesh about the dream's content, establishing shared knowledge of impending catastrophe."
  evidence_citations:
  - "Dyakonov 1961, Tablet VII: 'Слушай мой сон, что я видел ночью'"
  - "Gumilev 1919, Tablet VII: 'Друг, почему собрались на совет великие боги, / И во сне тревожном я дверь увидел'"
  methodology_fit_warning: true
  methodology_fit_note: Propp's PROPP-9 typically involves a third-party mediator (a herald, a messenger) formally dispatching the hero. Here, mediation is internal and oneiric — the dream itself mediates. This is a partial fit; the function is present in structural terms (misfortune made known, heroes brought to awareness) but the formal mechanism differs from the folktale archetype.
