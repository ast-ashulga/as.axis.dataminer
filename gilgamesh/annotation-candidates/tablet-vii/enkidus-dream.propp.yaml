- code: PROPP-8
  label: Villainy / Lack
  proposed_tier: reconstructed
  status: confirmed
  rationale: The divine council scene, rendered in both Gumilev and Dyakonov, depicts the gods deliberating and decreeing Enkidu's death as punishment for the slaying of Humbaba and the Bull of Heaven. This constitutes the primary villainous act — the imposition of mortal harm upon a hero-companion — that drives the narrative forward. In Dyakonov's version, Ellil pronounces 'Пусть умрет Энкиду' ('Let Enkidu die'), a direct divine sentence that functions as the harm visited upon the heroes. The lack identified here — Enkidu's impending death and, by extension, Gilgamesh's confrontation with mortality — is the foundational lack that propels the subsequent quest for immortality.
  evidence_citations:
  - "Dyakonov 1961, Tablet VII: 'Эллиль промолвил: Пусть умрет Энкиду'"
  - "Gumilev 1919, Tablet VII: 'Тленье повсюду, куда бы я взоры ни кинул / Друг мой, свершается сон, вещавший мне гибель'"
  - George 2003, SB VII 1–37
  methodology_fit_warning: true
  methodology_fit_note: The 'villain' here is not a discrete antagonist figure but the divine assembly acting collectively, and the harm is a decree rather than an active predatory act. Propp's PROPP-8 maps imperfectly onto theologically motivated divine punishment; the function is nonetheless defensible as the narrative mechanism that initiates the lack driving subsequent action.
