- code: PROPP-3
  label: Violation
  proposed_tier: contested
  status: confirmed
  rationale: "The divine council's deliberation explicitly references the prior violation committed by the heroes: the slaying of Humbaba and the Bull of Heaven, acts performed against divine sanction or at the cost of divine displeasure. In Dyakonov's version, Anu asks 'Зачем они сразили Быка и Хумбабу?' and states that one who 'у гор похитил кедры' must die — framing the heroes' earlier deeds as violations of cosmic prohibition. This retrospective identification of violation is what activates PROPP-8 in this tablet. The function is cited here as retrospective confirmation rather than active narration."
  evidence_citations:
  - "Dyakonov 1961, Tablet VII: 'Зачем они сразили Быка и Хумбабу? / Тому, кто у гор похитил кедры!'"
  - George 2003, SB VII 3–8
  methodology_fit_warning: true
  methodology_fit_note: PROPP-3 is being applied retrospectively — the violation itself occurred in earlier tablets and is here named as its consequence unfolds. Propp's framework is synchronically sequential, not retrospective. This annotation is contested because it captures a structural echo rather than a live narrative moment in this segment.
