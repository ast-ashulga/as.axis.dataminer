- code: PROPP-10
  label: Beginning Counter-Action
  proposed_tier: contested
  status: confirmed
  rationale: "In Dyakonov's version, Enkidu's response to the dream is to propose active engagement: 'Давай, мой друг, пойдем и Эллиля попросим!' ('Come, my friend, let us go and petition Ellil!'). This represents, however briefly and futilely, a moment of counter-decisional agency — the heroes agree to seek redress from the divine powers responsible for the decree. The visit to the temple door confirms this movement into action. However, the counter-action is immediately undercut by Enkidu's recognition that the door — his pious gift — is itself complicit in his doom, rendering the function ambiguous."
  evidence_citations:
  - "Dyakonov 1961, Tablet VII: 'Давай, мой друг, пойдем и Эллиля попросим! / У входа в храм они остановились'"
  methodology_fit_warning: true
  methodology_fit_note: The counter-action here is nascent and collapses into lamentation rather than generating a true departure sequence. This makes the annotation contested — the structural moment is present but the narrative does not sustain it as a launching function; it dissolves into Enkidu's curse of the door and his acceptance of fate.
