  proposed_tier: reconstructed
  status: confirmed
  rationale: "Shamash's response to Gilgamesh's plea contains a direct articulation of the irreversibility of mortal fate: 'Слово, что сказано, бог не изменит... Судьба людская проходит — ничто не останется в мире.' This passage encodes the mythological principle that death is the irrevocable lot of humankind, contrasted with divine permanence — a structural statement about the origin and nature of human mortality. The juxtaposition of Gilgamesh's futile prayers with Shamash's cosmic decree underscores the myth-aetiological dimension of the episode."
