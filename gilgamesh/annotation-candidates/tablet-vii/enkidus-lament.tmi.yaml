- code: TMI-Q2
  label: Kind and unkind
  proposed_tier: contested
  status: confirmed
  rationale: This code applies in a limited and contested manner. Enkidu's lament touches on the contrast between his own fate — dying in bed, stripped of the warrior's death he might have deserved — and the fates of kings and heroes in the House of Dust. The Gumilev passage captures his bitterness at being 'cursed' and dying ignobly ('как того, что в сраженье утратил отвагу'), while the Dyakonov passage presents him witnessing the undifferentiated equality of the dead. TMI-Q2 is only weakly applicable here; the full kind/unkind contrast is more explicit in other sections of the epic (the cedar forest episodes or the Utnapishtim narrative). The fit is genuinely debatable.
