- code: TMI-D1810
  label: Magic knowledge through dreams
  proposed_tier: reconstructed
  status: confirmed
  rationale: Enkidu receives prophetic knowledge of his impending death through a dream in which the divine council of Anu, Enlil, and Shamash deliberate over the fates of Gilgamesh and Enkidu. The dream functions as a conduit of divine decree, revealing to the dreamer the gods' judgment before it is enacted in waking reality. This corresponds directly to TMI-D1810's definition of divine or prophetic knowledge conveyed through a dream sequence.
  evidence_citations:
