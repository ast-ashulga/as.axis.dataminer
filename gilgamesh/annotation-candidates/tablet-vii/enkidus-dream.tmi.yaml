- code: TMI-A1335
  label: Origin of death
  proposed_tier: reconstructed
  status: confirmed
  rationale: The divine council scene explicitly encodes the mythological principle that mortality is the lot of humans while gods remain exempt. Enlil's decree — 'Пусть умрет Энкиду, но Гильгамеш умереть не должен!' — is not merely a plot decision but a cosmological statement establishing why a mortal companion must die while the semi-divine hero survives. This reflects the broader Mesopotamian mythological framework explaining the boundary between mortal and divine existences, which TMI-A1335 addresses.
  evidence_citations:
  - "Dyakonov 1961, Tablet VII ('Эллиль промолвил: Пусть умрет Энкиду, но Гильгамеш умереть не должен!')"
  - George 2003, SB VII 1–60
  methodology_fit_warning: false
  ai_generated: true
  generated_by_model: claude-sonnet-4-6
- code: TMI-Q2
  label: Kind and unkind
  proposed_tier: contested
  status: confirmed
  rationale: The divine council's differential sentencing — Enkidu dies, Gilgamesh is spared — can be read as a form of differential divine judgment, with Shamash interceding on Enkidu's behalf as one who 'ежедневно в их товарищах ты ходишь.' However, TMI-Q2 classically involves contrasting treatment of characters based on their moral conduct toward a testing figure, not divine arbitration among equals. The application is structurally suggestive but not a clean fit; the contrast here is cosmological (mortal vs. semi-divine) rather than moral (kind vs. unkind), making this annotation contested.
  evidence_citations:
  - Dyakonov 1961, Tablet VII ('Не твоим ли веленьем убиты Бык и Хумбаба? Должен ли ныне Энкиду умереть безвинно?')
  methodology_fit_warning: true
  methodology_fit_note: TMI-Q2 is designed for folk-tale structures of contrasting moral behavior and reward/punishment. Its application to a divine council arbitrating between two co-protagonists on cosmological grounds is a category stretch. The annotation is defensible only at the thematic level of differential divine favor, not at the structural level the motif index anticipates.
