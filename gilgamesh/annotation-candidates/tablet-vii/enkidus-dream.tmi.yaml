- code: TMI-F80
  label: Journey to land of dead
  proposed_tier: contested
  status: confirmed
  rationale: Enkidu's lament — 'неужели сидеть мне с призраком, у могильного входа?' — and his reference to never again seeing his 'любимого брата' evoke anticipatory imagery of the underworld threshold. While no actual journey to the land of the dead occurs in this segment, the 'могильный вход' (entrance to the grave/underworld) is explicitly invoked as Enkidu's imminent destination, gesturing toward the underworld journey motif that is elaborated in Tablet XII. The annotation is contested because the segment describes anticipation and lamentation rather than an enacted descent.
  evidence_citations:
  - Dyakonov 1961, Tablet VII ('неужели сидеть мне с призраком, у могильного входа?')
  - George 2003, SB VII (Enkidu's illness and death sequence)
  methodology_fit_warning: true
  methodology_fit_note: TMI-F80 properly applies to enacted journeys to the underworld. Its application here is anticipatory rather than actualized, and should be understood as a proleptic marker pointing forward to Tablet XII's underworld material rather than a direct annotation of this segment's action.
