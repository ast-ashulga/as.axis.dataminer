- code: PROPP-15
  label: Spatial Translocation
  proposed_tier: contested
  status: confirmed
  rationale: "Enkidu's dream describes his journey to the House of Dust / realm of Ereshkigal — a classic 'other realm' in Proppian terms. The passage provides an extended, topographically detailed account of this translocation: 'Взглянул и увел меня в дом мрака, жилище Иркаллы, / В дом, откуда вошедший никогда не выходит.' This is structurally analogous to PROPP-15, where the hero is conveyed to another realm. The mapping is contested, however, because it occurs within a dream-vision rather than as a literal narrative journey, and because it is Enkidu (not the primary hero Gilgamesh) who is translocated — though Enkidu functions as a proxy figure whose fate drives the main hero's subsequent spatial translocation."
  evidence_citations:
  - Dyakonov 1961, Tablet VII ('Взглянул и увел меня в дом мрака, жилище Иркаллы')
  - George 2003, SB VII 155–165
  methodology_fit_warning: true
  methodology_fit_note: The translocation occurs within a dream narrative recounted by Enkidu, not as a literal journey by the primary hero. Propp's framework assumes physical movement of the hero to another realm. Applying this function to a dream-vision account by a secondary figure (Enkidu) is a structural analogy; the annotation remains defensible because the underworld vision is presented with full narrative elaboration and functions as a foreshadowing/surrogate for Gilgamesh's own later boundary-crossing.
