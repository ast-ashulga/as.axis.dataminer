- code: PROPP-10
  label: Beginning Counter-Action
  proposed_tier: reconstructed
  status: confirmed
  rationale: Gilgamesh's declaration that he will pray to the great gods — Anu, Enlil, and Shamash — and adorn their statues with gold represents an active decision to counter the misfortune. 'А теперь помолюсь я богам великим, / Милость взыскуя, обращусь к твоему богу!' is a formal, willed resolve to act against the doom. This aligns with PROPP-10 as the seeker's agreement to undertake counter-action, even though the gods' response via Shamash immediately forecloses the specific avenue Gilgamesh proposes, setting the stage for the broader quest that follows in subsequent tablets.
