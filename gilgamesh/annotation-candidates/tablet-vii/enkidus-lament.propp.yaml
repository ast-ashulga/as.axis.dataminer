- code: PROPP-9
  label: Mediation
  proposed_tier: reconstructed
  status: confirmed
  rationale: "The misfortune (Enkidu's fatal illness and divine condemnation) is made known to Gilgamesh directly through Enkidu's own voice: 'Он зовет тогда Гильгамеша, говорит прекрасному другу.' This communication of suffering — reinforced by Enkidu's recounting of the underworld dream — serves the mediatory function of making the lack fully visible to the hero and spurring him toward action. Gilgamesh's immediate emotional response ('сразу жарко заплакал') and his vow to intercede with the gods confirm that the misfortune has been formally registered and transmitted."
  evidence_citations:
