- code: PROPP-1
  label: Absentation
  proposed_tier: contested
  status: confirmed
  rationale: "Enkidu's death — foreshadowed throughout this tablet and made explicit through the dream of the House of Dust — functions structurally as an absentation: a central figure is permanently removed from the heroic household. Dyakonov's rendition of the underworld vision culminates in Ereshkigal's scribe declaring 'Смерть уже взяла того человека,' confirming Enkidu's imminent departure from the living world. However, applying PROPP-1 here is contested because Propp's absentation typically refers to a living character's physical departure at the narrative's opening, not to death mid-narrative; the mapping is structural rather than literal."
  evidence_citations:
  - Dyakonov 1961, Tablet VII ('Смерть уже взяла того человека!')
  - George 2003, SB VII 180–200
  methodology_fit_warning: true
  methodology_fit_note: Propp's absentation is defined as a living family member leaving home, typically at the story's outset. Applying it to a death-vision mid-narrative is a structural analogy rather than a direct mapping, and should be treated as contested. The function is defensible insofar as Enkidu's removal from the heroic community is the structural trigger for Gilgamesh's subsequent quest (Tablets VIII–XI), mirroring the narrative role of absentation.
