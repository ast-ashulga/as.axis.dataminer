  generated_by_model: claude-sonnet-4-6
- code: TMI-F80
  label: Journey to land of dead
  proposed_tier: contested
  status: confirmed
  rationale: While Enkidu does not physically journey to the underworld in this passage, his twelve-day deathbed vigil and the 'unexplained dream' he experiences are preparatory to his crossing the threshold of death, and in the Standard Babylonian tradition this passage anticipates the underworld vision dreams of Tablet VII. The motif of the land of the dead is present proleptically; however, applying F80 directly to a deathbed scene rather than an active journey is a methodological stretch.
  evidence_citations:
  - Dyakonov 1961, Tablet VII
  - George 2003, SB VII 1–60
  methodology_fit_warning: true
  methodology_fit_note: TMI-F80 strictly denotes an active narrative journey to the underworld undertaken by a living hero. Applying it to Enkidu's dying process and dream-visions is a loose fit; the annotation is contested because the passage depicts approach to death rather than a completed journey. A stronger application of F80 belongs to the Gilgamesh–Enkidu dialogue in Tablet XII, where Enkidu's shade returns from the underworld.
