- code: TMI-A1335
  label: Origin of death
  proposed_tier: reconstructed
  status: confirmed
  rationale: Enkidu's dying lament — 'I and you — are we not equally mortal?' — directly articulates the theme of human mortality as the shared, inescapable condition of humankind, contrasted implicitly with divine immortality. This passage dramatizes the existential recognition of death as the lot of mortals, which the broader epic will then thematize through Gilgamesh's subsequent quest. The rhetorical question functions as a mythological statement about the nature of human existence rather than merely a personal complaint.
  evidence_citations:
  - Dyakonov 1961, Tablet VII
  - George 2003, SB VII 135–145
  methodology_fit_warning: false
