- code: TMI-D1810
  label: Magic knowledge through dreams
  proposed_tier: reconstructed
  status: confirmed
  rationale: The passage opens with Enkidu experiencing an 'unexplained dream' ('сон необъясненный') that precedes and apparently precipitates his loss of strength and physical decline. In the broader Tablet VII context, Enkidu's dreams contain prophetic content (visions of the underworld and divine judgment), and the motif of divinely conveyed knowledge through dream is explicitly operative here even if the dream's content is only alluded to in this excerpt. The dream functions as a threshold event marking his transition toward death.
  evidence_citations:
  - Dyakonov 1961, Tablet VII
  - George 2003, SB VII 1–10
  methodology_fit_warning: true
  methodology_fit_note: The specific dream content is not rendered in this passage excerpt, making full confirmation of the prophetic/divine knowledge dimension dependent on surrounding tablets. The annotation is defensible given the established scholarly consensus about SB Tablet VII's dream sequence, but the evidence within this isolated passage alone is incomplete.
