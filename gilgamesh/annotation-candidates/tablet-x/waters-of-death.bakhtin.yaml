- code: BAKHTIN-HEROIC-BODY
  label: Heroic Body Chronotope
  proposed_tier: reconstructed
  status: confirmed
  rationale: "Both translations emphasise the physical degradation of Gilgamesh's body as a direct inscription of his journey's temporal and spatial scope: worn clothing, flesh filled with sorrow, sleeplessness, and a body sustained only by wild animals. Utnapishtim's opening recognition — that something is wrong with Gilgamesh's appearance — confirms the body as legible narrative text. In the Dyakonov version, even Gilgamesh's royal garment stripped for use as a sail becomes a body-extension marking the extremity of his passage. The body is simultaneously evidence of heroic endurance and of mortality's claims."
  evidence_citations:
  - "Gumilev 1919, Tablet X: 'Вверг себя в нищету я, болью исполнил члены, / Не вступил я в дом Сабеянки, моя одежда истлела!'"
  - "Dyakonov 1961, Tablet X: 'Плоть свою я наполнил тоскою, / Не дойдя до хозяйки богов, сносил я одежду'"
  - "Dyakonov 1961, Tablet X: 'Скинул Гильгамеш одежду, ее развернул он. / Как парус, ее руками поднял'"
  - George 2003, SB X 173–200
