- code: BAKHTIN-THRESHOLD
  label: Threshold Chronotope
  proposed_tier: reconstructed
  status: confirmed
  rationale: "The navigation of the Waters of Death with the punting poles — 120 poles exhausted one by one, Gilgamesh forbidden to touch the lethal water, finally stripping his garment to use as a sail — constitutes a liminal passage between the world of the living and the realm of Utnapishtim the Far. Time is suspended in the ritual counting of the poles, and the moment of arrival is a crisis point: Utnapishtim cannot even identify who approaches, signalling that Gilgamesh stands at the boundary between mortal and transcendent space. The prohibition on touching the water ('Воды смерти рукою не тронь') literalizes the threshold logic."
  evidence_citations:
  - "Dyakonov 1961, Tablet X: 'Воды смерти рукою не тронь, берегися! … На сто двадцатом кончились шесты у Гильгамеша'"
  - "Dyakonov 1961, Tablet X: 'Я гляжу на него - узнать не могу я, / Я гляжу на него - и понять не могу я, / Я гляжу на него - и не ведаю, кто он'"
  - George 2003, SB X 85–100
  methodology_fit_warning: false
  ai_generated: true
  generated_by_model: claude-sonnet-4-6
- code: BAKHTIN-UNDERWORLD
  label: Underworld / Netherworld Chronotope
  proposed_tier: contested
  status: confirmed
  rationale: "The Waters of Death do not constitute a full underworld descent in the Tablet X passage — Gilgamesh does not enter the realm of the dead — but the space traversed is explicitly lethal and liminal, and Utnapishtim exists in a space beyond ordinary mortal time. The annotation is therefore contested: the Waters of Death share underworld chronotopic qualities (suspended time, boundary of death, encounter with a figure who has passed beyond mortality) without being a classical katabasis. Utnapishtim's speech on the equivalence of the sleeping and the dead ('Мертвый и спящий друг с другом схожи') imports underworld temporality directly into the dialogue."
  evidence_citations:
  - "Gumilev 1919, Tablet X: 'Мертвый и спящий друг с другом схожи, / Оба не знают лика смерти'"
  - "Dyakonov 1961, Tablet X: 'Пленный и мертвый друг с другом схожи / Не смерти ли образ они являют?'"
  - George 2003, SB X 300–322
  methodology_fit_warning: true
  methodology_fit_note: The Waters of Death are spatially contiguous with but not identical to the underworld proper; Gilgamesh does not descend to the land of the dead in this tablet. Applying BAKHTIN-UNDERWORLD here is defensible as a partial or analogical application — the space has underworld-adjacent qualities and the dialogue thematises death-time — but the annotation should not be read as asserting a full katabasis structure. Scholarly caution is warranted.
