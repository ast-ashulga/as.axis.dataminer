  generated_by_model: claude-sonnet-4-6
- code: BAKHTIN-DIVINE
  label: Divine / Cosmic Chronotope
  proposed_tier: reconstructed
  status: confirmed
  rationale: Utnapishtim's philosophical speech invokes the Anunnaki and Mametu/Mамет as the cosmic arbiters of life and death, explicitly embedding human mortality within a divine-cosmological framework that transcends ordinary narrative time. The council of the great gods ('Ануннаки, великие боги') who conceal the moment of death and determine fates ('Жизнь или смерть они указуют') introduces the mythic, trans-human temporal perspective that defines this chronotope. Both translations converge on this cosmological register.
  evidence_citations:
  - "Gumilev 1919, Tablet X: 'Ануннаки, великие боги, ее скрывают, / Мамету, госпожа судеб, управляет с ними, / Жизнь или смерть они указуют'"
  - "Dyakonov 1961, Tablet X: 'То сбираются Ануннаки, великие боги, / Мамет, создавшая судьбы, судьбу с ними вместе судит: / Они смерть и жизнь определили'"
  - George 2003, SB X 314–322
  methodology_fit_warning: false
