annotations:
- code: BAKHTIN-ROAD
  label: Road / Journey Chronotope
  proposed_tier: reconstructed
  status: confirmed
  rationale: "Gilgamesh's speech to Utnapishtim is a compressed retrospective of the entire journey chronotope: traversal of mountains, crossing of seas, deprivation of food and clothing, and the decisive encounter at journey's end. Time and space are fused in the catalogue of hardships ('я прошел все страны, / Перебрался я через трудные горы, / Переплыл все пучины моря'), and the road functions as the arena in which Gilgamesh is tested and transformed before the climactic meeting. The encounter with the distant Utnapishtim is itself the 'chance meeting at the road's terminus' that Bakhtin identifies as constitutive of this chronotope."
  evidence_citations:
  - "Gumilev 1919, Tablet X: 'и поднялся я, и прошел все страны, / Перебрался я через трудные горы, / Переплыл все пучины моря'"
  - "Dyakonov 1961, Tablet X: 'Я скитался долго, обошел все страны, / Я взбирался на трудные горы, / Через все моря я переправлялся'"
  - George 2003, SB X 173–185
