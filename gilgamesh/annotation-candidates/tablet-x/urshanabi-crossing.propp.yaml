annotations:
- code: PROPP-10
  label: Beginning Counter-Action
  proposed_tier: reconstructed
  status: confirmed
  rationale: Gilgamesh resolves to act on his quest by explicitly asking Urshanabi for the route to Utnapishtim. This decision to press forward despite the challenge of the Waters of Death constitutes the hero's internal commitment to counter the lack (loss of Enkidu, quest for immortality). Both translations render this moment of resolve clearly before any practical steps are taken.
  evidence_citations:
  - "Gumilev 1919, Tablet X: 'И теперь, Ур-Эа, когда я лицо твое вижу, укажи мне дорогу к отшельнику Ут-напиштиму'"
  - "Dyakonov 1961, Tablet X: 'Теперь, Уршанаби,- где путь к Утнапишти?'"
  methodology_fit_warning: true
  methodology_fit_note: PROPP-10 is typically a discrete narrative beat at the story's outset. Here it recurs mid-quest, reflecting the episodic, multi-stage structure of the Gilgamesh epic which does not map cleanly to Propp's linear morphology. The annotation is nonetheless defensible as a local counter-action beat within the broader quest sequence.
