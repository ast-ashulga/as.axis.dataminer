  generated_by_model: claude-sonnet-4-6
- code: PROPP-15
  label: Spatial Translocation
  proposed_tier: reconstructed
  status: confirmed
  rationale: The crossing of the Waters of Death is a canonical spatial translocation from the mortal world to the realm of Utnapishtim — a figure who exists beyond the boundaries of the living. Both translations explicitly describe the journey taking three days (telescoping six weeks), marking it as a mythologically significant passage into another realm. Urshanabi serves as guide across this threshold.
  evidence_citations:
  - "Gumilev 1919, Tablet X: 'Путь их — на месяц. На третий день поглядели: Ур-Эа вступил в воды смерти'"
  - "Dyakonov 1961, Tablet X: 'Путь шести недель за три дня совершили, и вступил Уршанаби в воды смерти'"
  - George 2003, SB X 200–210
  methodology_fit_warning: false
