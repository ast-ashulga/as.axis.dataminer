  generated_by_model: claude-sonnet-4-6
- code: PROPP-12
  label: First Function of Donor
  proposed_tier: contested
  status: confirmed
  rationale: Urshanabi functions as a donor figure who tests Gilgamesh before providing assistance. In the Dyakonov version, Urshanabi reproaches Gilgamesh for having destroyed the 'idols' (stone men) that were the magical protection against the Waters of Death, and then issues a task — cutting 120 punting poles — before agreeing to ferry him. This is structurally the donor's preliminary test or challenge.
  evidence_citations:
  - "Dyakonov 1961, Tablet X: 'Идолы те, Гильгамеш, мне оберегом были... В ярости твоей ты идолы разрушил, без тех идолов тебя переправить трудно'"
  - "Gumilev 1919, Tablet X: 'Братья каменьев тобой разбиты; подними, Гильгамеш, свою секиру, в шестьдесят локтей выруби жерди'"
  - George 2003, SB X 155–175
  methodology_fit_warning: true
  methodology_fit_note: "The donor function in Propp involves a figure who tests the hero and then provides a magical agent. Urshanabi is an ambiguous case: he is both donor and guide, and the 'test' is partly caused by Gilgamesh's own prior destruction of the protective stone figures. The moral causality differs from Propp's schema, where the test is typically posed independently of the hero's prior actions. The annotation is defensible but contested."
  ai_generated: true
  generated_by_model: claude-sonnet-4-6
- code: PROPP-13
  label: Hero's Reaction
  proposed_tier: reconstructed
  status: confirmed
  rationale: "Gilgamesh responds positively and obediently to Urshanabi's directive: he takes up his axe, goes into the forest, cuts the 120 poles, tars them, and brings them to the boatman. This compliance with the donor's instruction is the classic hero's reaction that unlocks provision of the magical agent (passage across the Waters of Death)."
  evidence_citations:
  - "Gumilev 1919, Tablet X: 'И когда Гильгамеш исполнил это, он и Ур-Эа взошли на судно'"
  - "Dyakonov 1961, Tablet X: 'Гильгамеш, услышав эти речи, боевой топор он поднял рукою... углубился в лес, нарубил шестов там... осмолил, сделал лопасти, к нему принес их'"
  methodology_fit_warning: false
  ai_generated: true
  generated_by_model: claude-sonnet-4-6
- code: PROPP-14
  label: Provision / Receipt of Magical Agent
  proposed_tier: contested
  status: confirmed
  rationale: The 120 punting poles function as the magical agent enabling passage across the Waters of Death — a sea that cannot be touched by mortal hands. The instruction to use them one at a time (never letting his hands touch the water) and ultimately to use his own garment as a sail when poles are exhausted frames them as an instrumentally magical provision. The boatman's agreement to ferry Gilgamesh is itself the key enabling provision.
  evidence_citations:
  - "Gumilev 1919, Tablet X: 'Ур-Эа говорит Гильгамешу: Гильгамеш, подвигайся впереди, работай жердью, да не коснутся руки твоей воды смерти!'"
  - "Dyakonov 1961, Tablet X: 'Сто двадцать шестов по пятнадцати сажен, осмоли, сделай лопасти и мне принеси их'"
  - George 2003, SB X 175–200
  methodology_fit_warning: true
  methodology_fit_note: The 'magical agent' here is instrumental-technological (poles, boat) rather than supernatural in the typical Proppian sense (a talisman, enchanted object). The Waters of Death do carry a mythological-magical quality that lends some credibility to the function, but the fit is partially analogical rather than direct.
