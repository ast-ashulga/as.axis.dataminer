- code: BAKHTIN-ROAD
  label: Road / Journey Chronotope
  proposed_tier: reconstructed
  status: confirmed
  rationale: "The encounter between Gilgamesh and Siduri is paradigmatically structured by the road chronotope: Gilgamesh arrives at her dwelling as a traveler in motion, his face and body marked by the hardships of a 'dальний путь' (far road/journey). The road is not merely backdrop but the active medium through which the meeting is made possible — Siduri herself interrogates him about his route ('какою дорогой меня достиг ты, реки переплыл, где трудна переправа?'). The encounter generates revelation (Siduri's disclosure of the Waters of Death and Urshanabi) and sets the next stage of the journey, fulfilling the road chronotope's function as a site of meeting and narrative turning."
  evidence_citations:
  - "Gumilev 1919, Tablet X: 'С лицом уходящего дальней дорогой лицо его схоже'"
  - "Dyakonov 1961, Tablet X: 'Идущему дальним путем он лицом подобен'; 'Какою дорогой меня достиг ты, реки переплыл, где трудна переправа?'"
  - George 2003, SB X 1–21
