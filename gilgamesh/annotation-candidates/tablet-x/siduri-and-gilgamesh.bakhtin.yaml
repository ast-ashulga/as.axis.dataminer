- code: BAKHTIN-HEROIC-BODY
  label: Heroic Body Chronotope
  proposed_tier: reconstructed
  status: confirmed
  rationale: "Gilgamesh's body functions as the primary narrative index of his journey and grief: both translators foreground that his flesh encodes divine origins ('плоть богов таится в его теле') yet is visibly ravaged by suffering ('щеки впали, голова поникла, лицо увяло'). The body simultaneously testifies to heroic past deeds — Humbaba, the Bull of Heaven, the mountain lions — and to the present temporal dislocation caused by mourning and wandering. His animal-skin clothing and dust-covered form are spatial-temporal markers inscribed on the body itself, readable by Siduri from a distance as signs of the road and of crisis."
  evidence_citations:
  - "Dyakonov 1961, Tablet X: 'Шкурой одетый, покрытый прахом, / Плоть богов таится в его теле'; 'Почему твои щеки впали, голова поникла, / Печально сердце, лицо увяло'"
  - "Gumilev 1919, Tablet X: 'Шкурой окутан, тело его — тело бога, / Грудь исполнена скорбью'"
  - George 2003, SB X 3–8
