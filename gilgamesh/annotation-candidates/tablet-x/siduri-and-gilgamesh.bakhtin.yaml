- code: BAKHTIN-THRESHOLD
  label: Threshold Chronotope
  proposed_tier: reconstructed
  status: confirmed
  rationale: "Siduri's tavern-dwelling at the edge of the sea marks a classic threshold space — a liminal boundary between the world of the living and the Waters of Death beyond. The act of door-closing and door-threatening ('ударю я в дверь, разломаю затворы!') literalizes the threshold as a boundary to be negotiated, suspended between admission and exclusion. Gilgamesh is caught at the decisive turning point of his quest: he has not yet crossed to Utnapishtim, but can no longer return to ordinary life. Time itself feels suspended — his journey through wilderness has erased normal temporal markers ('столько долгих лет был я спящим')."
  evidence_citations:
  - "Gumilev 1919, Tablet X: 'Увидала его Сабеянка, двери закрыла, / Двери закрыла, заложила засовом'; 'Глубоки воды смерти, заградившие подступы!'"
  - "Dyakonov 1961, Tablet X: 'Увидав его, хозяйка затворила двери, / Затворила двери, засов заложила'"
  - George 2003, SB X 6–10
