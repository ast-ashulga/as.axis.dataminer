- code: BAKHTIN-UNDERWORLD
  label: Underworld / Netherworld Chronotope
  proposed_tier: reconstructed
  status: confirmed
  rationale: The Waters of Death ('воды смерти') named explicitly by Siduri constitute the boundary marker of the underworld chronotope — a domain where time is inverted or suspended and movement through death's boundary is the narrative challenge. Gilgamesh's grief for Enkidu, his refusal to bury him for six days and seven nights, and his terror of death ('устрашился я смерти') all embed the underworld logic within this episode even before the actual crossing. The passage anticipates the spatial-temporal inversion of the Netherworld without yet enacting it, which slightly attenuates the fit but does not negate it.
  evidence_citations:
  - "Dyakonov 1961, Tablet X: 'Глубоки воды смерти, что ее преграждают'; 'Шесть дней, семь ночей над ним я плакал, / Не предавая его могиле'"
  - "Gumilev 1919, Tablet X: 'Глубоки воды смерти, заградившие подступы!'; 'Да увидит мертвый сияние солнца!'"
  - George 2003, SB X 77–79
  methodology_fit_warning: true
  methodology_fit_note: 'The underworld chronotope is anticipated and bordered here rather than fully enacted: Gilgamesh has not yet crossed the Waters of Death. The annotation is defensible as a prospective or liminal instance of the chronotope — the boundary is named, feared, and structurally present — but readers should note this is a threshold-to-the-underworld moment rather than the underworld itself. The methodology remains applicable with this qualification.'
