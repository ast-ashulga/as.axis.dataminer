- code: TMI-H1376.3
  label: Quest for immortality
  proposed_tier: reconstructed
  status: confirmed
  rationale: The entire crossing sequence is motivated by Gilgamesh's quest to reach Utnapishtim and learn the secret of eternal life. His repeated declaration of purpose to Urshanabi — 'where is the way to Utnapishtim?' — frames the crossing as a stage in the immortality quest. The Waters of Death that must be navigated mark the liminal boundary between the mortal world and the dwelling of the immortal flood-survivor.
  evidence_citations:
