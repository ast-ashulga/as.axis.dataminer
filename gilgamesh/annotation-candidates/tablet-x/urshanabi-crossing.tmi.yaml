- code: TMI-F80
  label: Journey to land of dead
  proposed_tier: reconstructed
  status: confirmed
  rationale: The Waters of Death (mê mūti) explicitly delimit the passage into a realm beyond mortal geography. Urshanabi warns Gilgamesh not to let his hands touch these waters, which function as a boundary marker for the land of the dead or the beyond. The navigation of this liminal sea in a boat parallels underworld journey motifs across Near Eastern and comparative traditions, making this a strong fit for TMI-F80, though the destination is technically the dwelling of a deified human rather than a proper underworld.
  evidence_citations:
  - "Dyakonov 1961, Tablet X: 'И вступил Уршанаби в воды смерти'"
  - "Gumilev 1919, Tablet X: 'Ур-Эа вступил в воды смерти. Ур-Эа говорит Гильгамешу: Гильгамеш, подвигайся впереди, работай жердью, да не коснутся руки твоей воды смерти!'"
  - George 2003, SB X 170–178
  methodology_fit_warning: true
  methodology_fit_note: The Waters of Death and the realm of Utnapishtim do not map precisely onto standard 'land of the dead' concepts — Utnapishtim dwells at the mouth of the rivers (far-world paradise), not in the underworld proper (Irkalla). TMI-F80 is therefore an approximate fit; TMI-F110 (Journey to earthly paradise) may be equally or more applicable. The annotation is defensible as a liminal death-boundary crossing motif, but the overlap with TMI-F110 should be noted.
