- code: TMI-D1840
  label: Magic invulnerability
  proposed_tier: contested
  status: confirmed
  rationale: "In the Dyakonov translation, the 'idols' (stone things / Brothers of Stone in Gumilev) that Gilgamesh destroys in his fury were described by Urshanabi as protective talismans: 'Идолы те, Гильгамеш, мне оберегом были, чтобы я не прикоснулся к водам смерти.' These stone beings rendered Urshanabi invulnerable to the deadly waters, functioning as a form of magical protection. TMI-D1840 applies in a transferred or object-mediated sense rather than to Gilgamesh's body directly."
  evidence_citations:
  - "Dyakonov 1961, Tablet X: 'Идолы те, Гильгамеш, мне оберегом были, чтобы я не прикоснулся к водам смерти'"
  - George 2003, SB X 92–96 (the stone things / ūrātu)
  methodology_fit_warning: true
  methodology_fit_note: TMI-D1840 typically applies to the hero's body being rendered invulnerable, not to protective objects. Here the application is to the ferryman's protective talismans. The fit is partial and the annotation is marked contested accordingly. The 'stone ones' (ūrātu) are philologically obscure and their precise function is debated in scholarship (George 2003, vol. 1, pp. 495–496), adding further methodological caution.
