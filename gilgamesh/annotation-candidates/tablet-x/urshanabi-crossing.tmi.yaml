  label: Tasks and quests
  proposed_tier: reconstructed
  status: confirmed
  rationale: "Gilgamesh is on a quest to find Utnapishtim, driven by grief over Enkidu's death and desire for immortality. The encounter with Urshanabi/Ur-Ea represents a threshold condition: before crossing, Gilgamesh must fulfil a practical task — cutting 120 punting poles — as a prerequisite for passage. This task functions structurally as a quest-enabling ordeal imposed by the ferryman."
