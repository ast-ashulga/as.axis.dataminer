- code: TMI-F110
  label: Journey to earthly paradise
  proposed_tier: contested
  status: confirmed
  rationale: Utnapishtim's dwelling place — at the mouth of rivers, beyond the Waters of Death — corresponds to an earthly paradise at the world's edge rather than an infernal realm. Gilgamesh's journey across the sea to reach this remote immortal enclave fits the motif of a hero traveling to a peripheral paradise. The destination is contested between F80 and F110 in scholarship, and the ambiguity of the text supports marking this annotation as contested.
  evidence_citations:
  - "Gumilev 1919, Tablet X: 'Из жилища богов сюда я явился, далеким путем от восхода солнца'"
  - "Dyakonov 1961, Tablet X: 'Если возможно - переправлюсь морем'"
  - George 2003, SB X 79; cf. George 2003 commentary vol. 1, pp. 498–502 on the geography of Utnapishtim's abode
  methodology_fit_warning: true
  methodology_fit_note: The distinction between TMI-F80 and TMI-F110 is genuinely ambiguous for this passage. Utnapishtim's realm combines features of both paradise and a post-mortem beyond. Scholarly consensus (George 2003) treats it as an extra-mundane locus rather than a proper underworld, lending stronger support to F110, but the Waters of Death label introduces F80 resonances that cannot be fully dismissed. Both codes should be retained with appropriate confidence qualifications.
