- code: TMI-H900
  label: Tasks and quests
  proposed_tier: reconstructed
  status: confirmed
  rationale: 'Siduri effectively assigns Gilgamesh a conditional task: to find Urshanabi/Ur-Ea in the forest, and only if that contact is successful may he cross the sea. This structures the remainder of the tablet as a quest-task sequence with conditions attached, a clear instance of the hero being set a challenge before he can proceed toward his ultimate goal.'
  evidence_citations:
  - "Gumilev 1919, Tablet X: 'Пусть он лицо твое увидит! Можешь, — плыви с ними; нельзя, — возвращайся!'"
  - "Dyakonov 1961, Tablet X: 'Найди его и с ним повидайся, Если возможно - с ним переправься, Если нельзя, то вспять обратися'"
