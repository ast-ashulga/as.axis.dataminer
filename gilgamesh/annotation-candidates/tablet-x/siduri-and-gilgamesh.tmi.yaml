- code: TMI-A1335
  label: Origin of death
  proposed_tier: reconstructed
  status: confirmed
  rationale: Siduri delivers the theological statement that the gods ordained death for humankind and kept life for themselves, functioning as an etiological explanation of human mortality embedded within the narrative. Both translations render this passage clearly, making it a textbook instance of the motif. The passage simultaneously serves as counsel to Gilgamesh and as cosmological myth.
  evidence_citations:
  - "Gumilev 1919, Tablet X: 'Когда род людской создавали боги, Смерть они приказали роду людскому и в своих руках жизнь сохранили'"
  - "Dyakonov 1961, Tablet X: 'Боги, когда создавали человека, Смерть они определили человеку, Жизнь в своих руках удержали'"
  - George 2003, SB X 322–324
  methodology_fit_warning: false
