- code: TMI-F80
  label: Journey to land of dead
  proposed_tier: contested
  status: confirmed
  rationale: The segment explicitly describes the approach to and discussion of the 'waters of death' (воды смерти), which guard the passage to Utnapishtim's realm. Siduri's description of the impassable sea, the dangers of the waters of death, and the advice to seek the ferryman Urshanabi/Ur-Ea all frame the upcoming journey as a transit to a realm beyond mortal reach, structurally equivalent to a journey to the land of the dead. The motif applies to the planned journey, announced and contextualized in this passage, even if the crossing itself occurs in Tablet XI.
  evidence_citations:
  - "Gumilev 1919, Tablet X: 'Глубоки воды смерти, заградившие подступы!'"
  - "Dyakonov 1961, Tablet X: 'Глубоки воды смерти, что ее преграждают'"
  - George 2003, SB X 85–89
  methodology_fit_warning: true
  methodology_fit_note: There is a methodology-fit concern in that the 'waters of death' lead not to a conventional underworld but to the island dwelling of Utnapishtim, who is a deified flood-survivor living at the ends of the earth. TMI-F110 (Journey to earthly paradise) may be equally or more applicable. The application of TMI-F80 is defensible insofar as the waters of death function as a liminal, chthonic barrier structurally analogous to those separating the living from the dead, but the contested tier is appropriate given the ambiguity.
  ai_generated: true
  generated_by_model: claude-sonnet-4-6
- code: TMI-F110
  label: Journey to earthly paradise
  proposed_tier: contested
  status: confirmed
  rationale: Utnapishtim dwells beyond the waters of death at the ends of the earth, a locus classicus of the paradisiacal 'far away' realm, not the underworld proper. Siduri's description of the journey's difficulty and its destination at the dwelling of the immortal Utnapishtim fits the pattern of a journey to an earthly paradise at the world's edge. However, because the 'waters of death' frame the crossing in thanatological terms, the assignment of this code over TMI-F80 remains contested.
  evidence_citations:
  - "Gumilev 1919, Tablet X: 'Есть, Гильгамеш, Ур-Эа, лодочник Ут-напиштима'"
  - "Dyakonov 1961, Tablet X: 'Есть, Гильгамеш, Уршанаби, корабельщик Утнапишти'"
  - George 2003, SB X 83–100
  methodology_fit_warning: true
  methodology_fit_note: TMI-F110 and TMI-F80 overlap significantly in this context because Utnapishtim's dwelling combines features of both the land of the dead (inaccessibility, waters of death as threshold) and the earthly paradise (immortality granted to its inhabitant, located at the ends of the earth). Both codes are applied as complementary annotations rather than mutually exclusive alternatives, but neither is unambiguously dominant.
