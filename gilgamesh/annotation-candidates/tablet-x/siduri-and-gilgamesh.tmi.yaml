- code: TMI-H1376.3
  label: Quest for immortality
  proposed_tier: reconstructed
  status: confirmed
  rationale: Gilgamesh explicitly articulates his quest for immortality in his speech to Siduri, driven by terror at Enkidu's death and fear of his own mortality. He seeks the path to Utnapishtim precisely because he hopes to escape death. This is among the most canonical applications of this motif in world literature.
  evidence_citations:
