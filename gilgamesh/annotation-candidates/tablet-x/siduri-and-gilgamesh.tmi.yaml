- code: TMI-Q2
  label: Kind and unkind
  proposed_tier: contested
  status: confirmed
  rationale: Siduri initially bars her door in fear of the wild-looking Gilgamesh, then relents and engages him compassionately, offering both philosophical counsel and practical guidance. This reversal from exclusion to hospitality structurally echoes the kind-and-unkind pattern, though here the contrast is between Siduri's initial mistrust and her subsequent generosity to a worthy suppliant rather than between two distinct characters. The motif-fit is partial and therefore contested.
  evidence_citations:
  - "Gumilev 1919, Tablet X: 'Увидала его Сабеянка, двери закрыла... [затем] Укажи, Сабеянка, мне путь к Ут-напиштиму'"
  - "Dyakonov 1961, Tablet X: 'Увидав его, хозяйка затворила двери... [затем] Найди его и с ним повидайся'"
  methodology_fit_warning: true
  methodology_fit_note: TMI-Q2 classically involves two characters receiving differential treatment based on moral behavior. Here the dynamic is compressed into a single character (Siduri) who moves from rejection to assistance, which is a non-standard application. The code is retained at the contested tier as it captures a meaningful structural analogue, but the single-character compression reduces the fit with the canonical motif definition.
