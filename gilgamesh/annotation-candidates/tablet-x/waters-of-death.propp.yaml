- code: PROPP-8
  label: Villainy / Lack
  proposed_tier: contested
  status: confirmed
  rationale: "Utnapishtim's philosophical speech on universal mortality explicitly articulates the lack that drives the entire epic: immortality is withheld from mortals by divine decree, and the hour of death is unknowable. The speech — 'They have not revealed the time of death, but they have revealed: let the living live!' — names and confirms the foundational lack. However, this is not a new establishment of lack but a re-articulation and philosophical framing of it mid-quest, making the application contested rather than primary."
  evidence_citations:
  - "Dyakonov 1961, Tablet X: 'Они смерть и жизнь определили, / Не поведали смертного часа'"
  - "Gumilev 1919, Tablet X: 'Нет с давнишних пор на земле бессмертья'"
  - George 2003, SB X 318–322
  methodology_fit_warning: true
