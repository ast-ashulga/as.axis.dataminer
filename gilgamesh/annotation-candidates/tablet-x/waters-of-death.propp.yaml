- code: PROPP-9
  label: Mediation
  proposed_tier: contested
  status: confirmed
  rationale: Gilgamesh's speech to Utnapishtim recounts the death of Enkidu and the terror of mortality that drove him to this quest — articulating the initial misfortune (loss of his companion, confrontation with death) and the lack (immortality or its secret) that set the narrative in motion. While the formal 'calling or dispatching' of the hero already occurred earlier in the epic, this passage functions as a retrospective mediation in which Gilgamesh himself voices the misfortune before the donor-figure Utnapishtim. The fit is slightly forced since this is a restatement rather than initial dispatch, warranting a contested tier.
  evidence_citations:
  - "Gumilev 1919, Tablet X: 'Вверг себя в нищету я, болью исполнил члены'"
  - "Dyakonov 1961, Tablet X: 'Плоть свою я наполнил тоскою'"
  methodology_fit_warning: true
