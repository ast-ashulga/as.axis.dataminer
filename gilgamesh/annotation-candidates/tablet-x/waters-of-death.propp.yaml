- code: PROPP-12
  label: First Function of Donor
  proposed_tier: reconstructed
  status: confirmed
  rationale: "Utnapishtim functions here as a donor-figure who tests or interrogates Gilgamesh before any potential provision of the magical agent (the secret of immortality or the plant of life). His questioning — 'Why is your heart troubled, your brow furrowed?' — and his subsequent philosophical discourse on the inevitability of death constitute the donor's initial engagement with the hero. In Proppian morphology, the donor does not immediately provide the agent but first poses a challenge or question; Utnapishtim's extended speech on mortality serves this function. The fit is moderate: Utnapishtim's role is more ambiguous than a classic fairy-tale donor, as he also delivers a thematic lesson rather than a pure test."
  evidence_citations:
  - "Gumilev 1919, Tablet X: 'Что случилось с твоею мощью? Взгляд твой зачем опущен?'"
  - "Dyakonov 1961, Tablet X: 'Почему, Гильгамеш, ты исполнен тоскою?'"
  - George 2003, SB X 260–322
