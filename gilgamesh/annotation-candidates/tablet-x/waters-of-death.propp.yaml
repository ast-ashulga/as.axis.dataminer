  label: Spatial Translocation
  proposed_tier: reconstructed
  status: confirmed
  rationale: "Gilgamesh has crossed the Waters of Death to reach Utnapishtim, who dwells at the ends of the earth — a realm beyond the mortal world. This passage documents the arrival at that liminal destination, the culmination of a translocation arc. Urshanabi's detailed instructions about using poles and avoiding contact with the Waters of Death are the operative mechanism of this crossing. The journey described — across mountains, seas, and finally the Waters of Death — constitutes the classic Proppian spatial translocation 'to another kingdom.' The methodology fit is moderate: the 'other realm' here is cosmological rather than fairy-tale fantastical, but the structural function is equivalent."
