- code: PROPP-13
  label: Hero's Reaction
  proposed_tier: reconstructed
  status: confirmed
  rationale: Gilgamesh responds to Utnapishtim's interrogation with a full account of his suffering and quest, demonstrating his worthiness and sincerity before the donor-figure. This narration of hardship — crossing mountains, seas, hunting wild animals, enduring deprivation — is the hero's reaction to the donor's initial challenge. In Propp's schema, the hero's reaction (whether passing or failing the test) determines whether the magical agent will be granted; here Gilgamesh's honest account of suffering positions him as a genuine seeker.
