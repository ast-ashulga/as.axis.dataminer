- code: PROPP-13
  label: Hero's Reaction
  proposed_tier: reconstructed
  status: confirmed
  rationale: Gilgamesh reacts to the donor's (Siduri's) challenge by neither retreating nor immediately complying, but by asserting himself forcefully and then revealing his identity and grief. His narrative of Enkidu's death and his own existential fear constitutes an emotional and rhetorical response to the donor's testing, fulfilling the hero's reaction function. In both translations he answers her interrogation with a full account of his losses and his quest's purpose.
  evidence_citations:
  - "Dyakonov 1961, Tablet X: 'Я - Гильгамеш, убивший стража леса... Энкиду, друг мой, которого так любил я... Устрашился я смерти, не найти мне жизни!'"
  - "Gumilev 1919, Tablet X: 'Гильгамеш задумал войти в эти двери, Поднял голову, отцепил секиру... Укажи, Сабеянка, мне путь к Ут-напиштиму'"
