- code: PROPP-14
  label: Provision / Receipt of Magical Agent
  proposed_tier: contested
  status: confirmed
  rationale: 'Siduri provides Gilgamesh not with a magical object but with crucial navigational information: the existence and location of Urshanabi the ferryman, who is the means of crossing the waters of death. In many oral epic traditions, information about the route or the agent of crossing functions structurally as a magical agent. However, this is a significantly attenuated instance — no object is transferred, only knowledge — making the annotation contested.'
  evidence_citations:
  - "Gumilev 1919, Tablet X: 'Есть, Гильгамеш, Ур-Эа, лодочник Ут-напиштима, С ними «братья каменьев», в лесу он сбирает травы, Пусть он лицо твое увидит!'"
  - "Dyakonov 1961, Tablet X: 'Есть, Гильгамеш, Уршанаби, корабельщик Утнапишти, У него есть идолы, в лесу он ловит змея; Найди его и с ним повидайся'"
  methodology_fit_warning: true
  methodology_fit_note: The Propp framework envisions a tangible magical agent (a sword, a horse, a talisman). Here the 'agent' is directional information about a person who can facilitate further spatial translocation. The substitution of knowledge for object is common in non-European epic traditions but represents a genuine stretch of the framework's original intent. The annotation is defensible by analogy with donor scenes in other traditions but should be treated as contested.
