annotations:
- code: PROPP-8
  label: Villainy / Lack
  proposed_tier: reconstructed
  status: confirmed
  rationale: Enkidu's death constitutes the foundational lack that drives Gilgamesh's entire quest. Gilgamesh explicitly names this loss as the source of his anguish and the motivation for his journey, lamenting that his companion has become earth. The lack is not only the loss of Enkidu but also Gilgamesh's resulting existential lack of immortality or assurance against death. This dual lack — of the companion and of eternal life — is precisely articulated in both translations.
  evidence_citations:
  - "Dyakonov 1961, Tablet X: 'Энкиду, друг мой любимый, стал землею! Так же, как он, и я не лягу ль, Чтоб не встать во веки веков?'"
  - "Gumilev 1919, Tablet X: 'Эабани, брат мой, пантера пустыни, Ныне судьба его совершилась, Не такой же ль и я, не случится ль со мной того же?'"
  - George 2003, SB X 40–72
  methodology_fit_warning: true
  methodology_fit_note: In the Propp scheme, Villainy/Lack typically inaugurates the tale and is distinct from the hero's backstory narrated mid-journey. Here the lack is retrospectively reported by the hero to the donor figure (Siduri), rather than structurally placed at the narrative's opening. The function is present but displaced, which is characteristic of the Gilgamesh epic's non-linear structure and represents a moderate methodology-fit concern. The annotation remains defensible because the lack functionally motivates all subsequent quest actions.
  ai_generated: true
  generated_by_model: claude-sonnet-4-6
- code: PROPP-9
  label: Mediation
  proposed_tier: contested
  status: confirmed
  rationale: "Siduri's role at the tavern partially fulfills the mediation function: she becomes the figure through whom the hero's misfortune is acknowledged and the path forward (to Utnapishtim via Urshanabi) is named. However, Siduri does not strictly 'dispatch' the hero — she first tries to dissuade him and offers a carpe diem counsel. The mediation is thus ambivalent and only partially operative, making this annotation contested."
  evidence_citations:
  - "Gumilev 1919, Tablet X: 'Есть, Гильгамеш, Ур-Эа, лодочник Ут-напиштима... Пусть он лицо твое увидит! Можешь, — плыви с ними; нельзя, — возвращайся!'"
  - "Dyakonov 1961, Tablet X: 'Есть, Гильгамеш, Уршанаби, корабельщик Утнапишти... Найди его и с ним повидайся'"
  methodology_fit_warning: true
  methodology_fit_note: Siduri occupies an ambiguous structural role that does not map cleanly onto the mediator function. She simultaneously serves as a potential donor figure (providing information and direction) and as a discourager. The Propp framework does not readily accommodate this functional ambivalence, and the mediation is conditional rather than authoritative, which weakens the fit.
