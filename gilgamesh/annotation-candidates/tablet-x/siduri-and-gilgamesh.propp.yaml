- code: PROPP-12
  label: First Function of Donor
  proposed_tier: reconstructed
  status: confirmed
  rationale: Siduri acts as a donor figure who tests or evaluates Gilgamesh before providing guidance. She initially closes her doors and questions him, assessing his identity and purpose — a classic gatekeeping behaviour consistent with the donor's first function. Her interrogation ('Почему твое сердце бьется, взор опущен' / 'Почему идешь ты путем далеким') constitutes the testing moment before she ultimately provides directional information.
  evidence_citations:
  - "Dyakonov 1961, Tablet X: 'Зачем ты пришел, хочу узнать я, Куда путь твой лежит, хочу узнать я!'"
  - "Gumilev 1919, Tablet X: 'Увидала его Сабеянка, двери закрыла, Двери закрыла, заложила засовом'"
  - George 2003, SB X 1–25
  methodology_fit_warning: false
