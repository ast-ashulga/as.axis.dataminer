  generated_by_model: claude-sonnet-4-6
- code: PROPP-15
  label: Spatial Translocation
  proposed_tier: reconstructed
  status: confirmed
  rationale: The entire scene with Siduri is a threshold moment preparing Gilgamesh's passage to the realm of Utnapishtim across the Waters of Death — a liminal, otherworldly space. Siduri's directions to Urshanabi explicitly set up the translocation. The waters of death ('воды смерти') function as the boundary between the mortal world and the immortal realm, making this passage structurally equivalent to the hero being guided to another realm.
  evidence_citations:
  - "Gumilev 1919, Tablet X: 'Глубоки воды смерти, заградившие подступы!'"
  - "Dyakonov 1961, Tablet X: 'Глубоки воды смерти, что ее преграждают'"
  - George 2003, SB X 75–90
  methodology_fit_warning: true
  methodology_fit_note: The translocation is anticipated and directed here but not yet executed within this passage — the actual crossing occurs in subsequent tablet sections. Applying PROPP-15 to this segment is therefore prospective rather than descriptive of completed action. The annotation is defensible as marking the structural setup for translocation, but readers should note that the function is initiated rather than fulfilled here.
