- code: PROPP-10
  label: Beginning Counter-Action
  proposed_tier: reconstructed
  status: confirmed
  rationale: Despite Siduri's explicit warning that immortality cannot be found and her counsel to accept mortal pleasures, Gilgamesh unambiguously decides to continue his quest and presses her for the route to Utnapishtim. This resolute refusal to abandon the quest and the explicit request for directions constitutes the hero's decision to act against the misfortune (fear of death, loss of Enkidu). Both translations render this as a clear volitional moment.
  evidence_citations:
  - "Gumilev 1919, Tablet X: 'Укажи, Сабеянка, мне путь к Ут-напиштиму... Если возможно, поплыву через море, Если нельзя, отправлюсь полем'"
  - "Dyakonov 1961, Tablet X: 'Теперь, хозяйка,- где путь к Утнапишти? Каков его признак,- дай его мне ты... Если возможно - переправлюсь морем, Если нельзя - побегу пустыней!'"
