- code: TMI-F567.2
  label: Wild man
  proposed_tier: reconstructed
  status: confirmed
  rationale: "Gilgamesh's lament explicitly recalls Enkidu's origin as a wild being: 'твоя мать антилопа / И онагр, твой отец, тебя породили, / Молоком своим тебя звери взрастили' (Dyakonov). The eulogy characterises him as 'пантера пустыни' and 'гонитель онагров в степи, пантер на просторах', anchoring Enkidu retrospectively in the wild-man identity even in death. This retrospective framing confirms the applicability of TMI-F567.2 as a defining attribute of the deceased."
  evidence_citations:
  - Dyakonov 1961, Tablet VIII ('твоя мать антилопа / И онагр, твой отец, тебя породили, / Молоком своим тебя звери взрастили')
  - Gumilev 1919, Tablet VIII ('Эабани, мой друг, мой брат, пантера пустыни')
  - George 2003, SB VIII 3–6
