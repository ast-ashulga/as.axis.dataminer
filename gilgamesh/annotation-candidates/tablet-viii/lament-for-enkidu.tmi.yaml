- code: TMI-Q2
  label: Kind and unkind
  proposed_tier: contested
  status: confirmed
  rationale: The lament passage implicitly contrasts the fate of Enkidu — who dies — with the implied survival and continued glory of Gilgamesh, whom the gods favour ('Боги любят тебя и сделают сильным'). This binary of mortal vulnerability versus divine favour echoes the TMI-Q2 pattern of differential treatment, though the passage does not deploy it as a narrative plot mechanism but rather as an elegiac meditation. The fit is therefore debatable.
  evidence_citations:
  - Gumilev 1919, Tablet VIII ('Боги любят тебя и сделают сильным... Но от своей судьбы и ты не уйдешь')
  - George 2003, SB VIII 1–20
  methodology_fit_warning: true
  methodology_fit_note: TMI-Q2 is designed for plot-level contrast between characters receiving different rewards or punishments. In this elegiac context the contrast is implicit and thematic rather than narratively enacted, reducing the strength of the fit. Annotation is defensible as a secondary motif but should not be treated as a primary structural feature of this segment.
