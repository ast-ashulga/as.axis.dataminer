- code: TMI-A1335
  label: Origin of death
  proposed_tier: reconstructed
  status: confirmed
  rationale: "Enkidu's dying words explicitly articulate the mortal condition as something inescapable even for the heroic companion of a favoured king: 'Смерть покорила меня' and 'от своей судьбы и ты не уйдешь, прекрасный'. The lament frames Enkidu's death as emblematic of the human lot, anticipating the wider narrative's meditation on why gods are immortal and humans are not. Dyakonov's version reinforces this by calling on all of creation to mourn, underscoring the cosmic weight of mortal death."
  evidence_citations:
  - Gumilev 1919, Tablet VIII ('Смерть покорила меня, я ныне бессилен... от своей судьбы и ты не уйдешь')
  - Dyakonov 1961, Tablet VIII ('Что за сон теперь овладел тобою? Стал ты темен и меня не слышишь')
  - George 2003, SB VIII 1–5
  methodology_fit_warning: false
  ai_generated: true
