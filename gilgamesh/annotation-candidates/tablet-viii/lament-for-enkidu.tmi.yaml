- code: TMI-H1376.3
  label: Quest for immortality
  proposed_tier: reconstructed
  status: confirmed
  rationale: Although the quest for immortality is not yet undertaken in Tablet VIII, Enkidu's death is universally recognised in scholarship as the direct narrative trigger that launches Gilgamesh toward his quest for immortality in Tablets IX–XI. The lament's insistence on mortality ('Смерть покорила меня'; 'от своей судьбы и ты не уйдешь') functions as the motivational seed of TMI-H1376.3, making this segment the initiatory moment of that quest-motif even if the quest itself begins later.
  evidence_citations:
  - Gumilev 1919, Tablet VIII ('Смерть покорила меня, я ныне бессилен')
  - George 2003, SB VIII 1–10; cf. SB IX 1–4 for the explicit onset of the quest
  methodology_fit_warning: true
  methodology_fit_note: TMI-H1376.3 formally applies to the quest episode rather than its triggering event. Applying it here is defensible as marking the motif's narrative inception, but annotators should note the code technically activates in Tablet IX. The annotation is included here to flag the causal nexus; a secondary 'proleptic' qualifier is recommended in the full database record.
