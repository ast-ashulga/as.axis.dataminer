- code: PROPP-10
  label: Beginning Counter-Action
  proposed_tier: reconstructed
  status: confirmed
  rationale: "Gilgamesh's response to the people of Uruka — 'И боюсь теперь смерти, и бегу в пустынное поле, / Надо мной тяготеет предсмертное слово друга' — marks the moment he articulates his decision to act, even if the decision is framed as flight and fear rather than heroic resolve. In Proppian terms, this is the seeker recognizing and accepting the necessity of departure. The Dyakonov passage reinforces this: Gilgamesh explicitly dons the lion-skin and declares flight into the wilderness, signaling the transition from mourning to counter-action. The application is defensible though the tone is elegiac rather than purposive, warranting a contested tier."
  evidence_citations:
  - Gumilev 1919, Tablet VIII
  - Dyakonov 1961, Tablet VIII
  methodology_fit_warning: true
  methodology_fit_note: Gilgamesh's 'counter-action' here is driven by terror rather than heroic agency, making this a looser fit to the Proppian function which typically involves a conscious, purposive decision to seek resolution. The elegiac and ritual context of Tablet VIII sits uneasily with the morphological schema, though the structural pivot toward departure is undeniable.
