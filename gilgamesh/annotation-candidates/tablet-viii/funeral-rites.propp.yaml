- code: PROPP-17
  label: Branding
  proposed_tier: contested
  status: confirmed
  rationale: "In the Dyakonov passage, Gilgamesh's assumption of the lion-skin ('Львиной шкурой облачился') and rending of fine garments ('рубище надел я') constitutes a visible, physical transformation of identity marking — a self-imposed branding that signals his altered status as mourner and wanderer. In Proppian morphology, branding signifies that the hero has been marked by the trials of the narrative. The application is contested: this is a ritual mourning practice attested in the broader Ancient Near Eastern context, and while it functions structurally as a marking, it is not the result of combat or donor interaction as Propp's schema assumes."
  evidence_citations:
