- code: PROPP-9
  label: Mediation
  proposed_tier: reconstructed
  status: confirmed
  rationale: The people of Uruk confront Gilgamesh and vocalize his transformed state — 'Почему ж твоя мощь погибла… Почему ты бежишь в пустынное поле?' — functioning as a mediating voice that makes the misfortune (Enkidu's death and Gilgamesh's resultant despair) publicly known and named. Additionally, the divine voice from heaven in the Dyakonov passage — 'Внезапно с неба призыв раздался' — can be read as a second mediating address, though its content is fragmentary. The collective address by the people of Uruk most closely resembles the Proppian mediating function that precedes the hero's active response.
