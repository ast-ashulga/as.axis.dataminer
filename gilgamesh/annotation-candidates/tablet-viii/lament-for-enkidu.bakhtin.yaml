- code: BAKHTIN-HEROIC-BODY
  label: Heroic Body Chronotope
  proposed_tier: reconstructed
  status: confirmed
  rationale: "Enkidu's body in death becomes the primary spatial-temporal site of the narrative: Gilgamesh physically interacts with the corpse — covering it, touching the still heart, tearing his garments — and the body registers the transition from heroic life to death. The body's stillness ('он головы поднять не может', 'сердце не бьется') is the time-space marker that anchors the entire lament. Furthermore, the living Enkidu's body is recalled through his heroic deeds — slaying Humbaba, killing the Bull of Heaven — which are inscribed on the body as narrative markers. Gilgamesh's own body enacts grief through animal-metaphor violence: 'как рыкающий лев, он рванулся' / 'Точно львица, чьи львята — в ловушке, / Мечется грозно взад и вперед он'."
  evidence_citations:
