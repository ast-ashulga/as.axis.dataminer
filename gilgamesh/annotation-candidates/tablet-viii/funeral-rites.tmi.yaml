- code: TMI-Q2
  label: Kind and unkind
  proposed_tier: contested
  status: confirmed
  rationale: The passage juxtaposes Gilgamesh's exemplary devotion to Enkidu — six days of mourning, commissioning a magnificent funerary statue, elaborate offerings — against the implicit norm of ordinary human behaviour described by the divine decree. While the Q2 motif typically operates across two characters contrasted within a single narrative episode, here the contrast is between the hero's extraordinary grief-observance and the mundane lot of farmers and shepherds declared by Ellil. The fit is partial and the application is debatable.
  evidence_citations:
  - Dyakonov 1961, Tablet VIII ('Веселым людям скорбный обряд поручил я'; 'Земледелец пашет землю, урожай собирает')
  methodology_fit_warning: true
  methodology_fit_note: TMI-Q2 is primarily designed for folktale structures contrasting two characters (kind/unkind siblings, etc.). Applied to epic lamentation and divine decree, the motif maps only loosely. The annotation captures a real structural contrast but the framework was not designed for this use case; confidence is accordingly reduced to 'contested'.
  ai_generated: true
  generated_by_model: claude-sonnet-4-6
- code: TMI-D1810
  label: Magic knowledge through dreams
  proposed_tier: contested
  status: confirmed
  rationale: The sudden divine voice from heaven — 'Внезапно с неба призыв раздался' — delivering knowledge about the ordained nature of human mortality to Gilgamesh has structural affinity with the motif of supernaturally conveyed prophetic or cosmological knowledge. However, the passage presents this as a waking divine address (Ellil speaking) rather than a dream vision per se, making the TMI-D1810 code an imperfect fit. The motif is more fully instantiated in Tablet VII (Enkidu's dream) and the application here is at best peripheral.
  evidence_citations:
