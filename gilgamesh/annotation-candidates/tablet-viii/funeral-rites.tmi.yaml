- code: TMI-A1335
  label: Origin of death
  proposed_tier: reconstructed
  status: confirmed
  rationale: The divine voice (Эллиль) speaks from heaven to declare that death is the appointed lot of mortals — 'Издревле, Гильгамеш, назначено людям' — framing human mortality as a primordial decree. This directly encodes the mythological motif explaining why humans die while gods do not, triggered by Gilgamesh's confrontation with Enkidu's death. The passage draws the structural opposition between mortal fate and divine permanence that underlies the entire quest narrative to follow.
  evidence_citations:
