- code: TMI-H1376.3
  label: Quest for immortality
  proposed_tier: reconstructed
  status: confirmed
  rationale: "Gilgamesh's lament over Enkidu explicitly crystallises his terror of death and foreshadows the quest narrative: 'И боюсь теперь смерти, и бегу в пустынное поле… И не лягу ли я, как он, чтоб вовек не подняться?' This fear-of-death declaration functions as the motivational seed of the immortality quest that will dominate Tablets IX–XI. The motif is incipient here rather than fully enacted, but the passage serves as the quest's narrative origin point."
  evidence_citations:
  - Gumilev 1919, Tablet VIII ('И боюсь теперь смерти, и бегу в пустынное поле')
  - George 2003, SB VIII 56–61
  methodology_fit_warning: false
