- code: PROPP-1
  label: Absentation
  proposed_tier: reconstructed
  status: confirmed
  rationale: "Enkidu's death constitutes a permanent absentation — the departure of a key companion from the living world and from Gilgamesh's side. Both translators render Enkidu's dying words and final stillness as a definitive leaving: 'я ныне бессилен... и лежу, и больше не встану' (Gumilev 1919, Tablet VIII) and 'стал ты темен и меня не слышишь' (Dyakonov 1961, Tablet VIII). While Propp's function typically concerns a family member leaving home, the structural role here — a companion's permanent removal triggering the hero's subsequent quest — is functionally analogous and well-attested in comparative Propp applications to non-fairy-tale epics."
  evidence_citations:
  - "Gumilev 1919, Tablet VIII: 'я ныне бессилен... и лежу, и больше не встану'"
  - "Dyakonov 1961, Tablet VIII: 'стал ты темен и меня не слышишь'"
  - George 2003, SB VIII
  methodology_fit_warning: true
  methodology_fit_note: Propp's Absentation normally concerns a living family member physically departing. Applying it to death stretches the function's original scope, though the structural consequence — the hero's world is disrupted by loss, motivating the subsequent quest — is morphologically parallel. The fit is defensible but not natural.
  ai_generated: true
  generated_by_model: claude-sonnet-4-6
- code: PROPP-8
  label: Villainy / Lack
  proposed_tier: reconstructed
  status: confirmed
  rationale: "Enkidu's death establishes the central Lack that drives Gilgamesh's subsequent quest for immortality. The passage explicitly names the agent of harm: 'Демон алой у меня его отнял!' (Dyakonov 1961, Tablet VIII), identifying a villainous force responsible for the loss. Gilgamesh's grief — tearing his garments, discarding royal insignia, lamenting publicly — registers the magnitude of the lack. This is the morphological wound that the remainder of the epic attempts, and ultimately fails, to liquidate."
  evidence_citations:
  - "Dyakonov 1961, Tablet VIII: 'Демон алой у меня его отнял!'"
  - "Gumilev 1919, Tablet VIII: 'Рвал одежду свою, проливал обильные слезы, Сбросил царские знаки, скорбя о его кончине'"
  - George 2003, SB VIII
  methodology_fit_warning: false
