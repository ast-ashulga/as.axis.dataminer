- code: PROPP-9
  label: Mediation
  proposed_tier: contested
  status: confirmed
  rationale: Gilgamesh's public lament — addressed explicitly to the elders and men of Uruk ('Внимайте же мне, мужи, внимайте, / Внимайте, старейшины огражденного Урука!', Dyakonov 1961, Tablet VIII) — functions as a formal proclamation of misfortune to the community, structurally analogous to the mediation moment in which the hero's loss becomes socially acknowledged and the call to counter-action is framed. However, there is no external dispatcher or herald in this passage; Gilgamesh himself performs the announcement, which makes the mapping to PROPP-9 partial and contested.
  evidence_citations:
  - "Dyakonov 1961, Tablet VIII: 'Внимайте же мне, мужи, внимайте, / Внимайте, старейшины огражденного Урука!'"
  - "Gumilev 1919, Tablet VIII: 'И над другом своим Гильгамеш заплакал'"
  methodology_fit_warning: true
  methodology_fit_note: Propp's Mediation presupposes a third party who announces misfortune and dispatches the hero. Here Gilgamesh both suffers the loss and proclaims it, collapsing PROPP-9 and PROPP-10 into a single self-directed act. The annotation is structurally suggestive but methodologically strained; 'contested' tier is appropriate.
