- code: PROPP-17
  label: Branding
  proposed_tier: contested
  status: confirmed
  rationale: "Gilgamesh's visible transformation through grief — tearing his clothing, loosening his hair, discarding his royal emblems — functions structurally as a marking that distinguishes him from his prior kingly state and signals his entry into a liminal condition. Both translators emphasize the physical self-transformation: 'Рвал одежду свою... Сбросил царские знаки' (Gumilev 1919, Tablet VIII) and 'Словно кудель, раздирает власы он, / Словно скверну, срывает одежду' (Dyakonov 1961, Tablet VIII). This self-branding through mourning rites prepares the narrative for Gilgamesh's departure and quest, paralleling the hero's marking before translocation."
  evidence_citations:
  - "Gumilev 1919, Tablet VIII: 'Рвал одежду свою, проливал обильные слезы, Сбросил царские знаки'"
  - "Dyakonov 1961, Tablet VIII: 'Словно кудель, раздирает власы он, / Словно скверну, срывает одежду'"
  methodology_fit_warning: true
  methodology_fit_note: Propp's Branding typically involves an external mark conferred upon the hero by another character. Here the marking is self-inflicted through ritual mourning. The structural function — hero is visibly distinguished and changed by the pivotal event — is analogous, but the inversion of agency makes this a contested application.
