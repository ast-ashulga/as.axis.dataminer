  methodology_fit_warning: true
  methodology_fit_note: The flood narrative is among the most comparatively studied passages in ancient Near Eastern literature, with direct parallels to the Atrahasis Epic and biblical Genesis. Applying TMI motif A1010 (deluge) and Propp's donor/task functions is structurally productive but must acknowledge the inter-traditional intertextuality. Bakhtinian heteroglossia is particularly apt for this passage given its embedded-narrative framing (Utnapishtim's first-person account within Gilgamesh's quest), though the category was developed for novelistic discourse and its application to oral-derived epic should be explicitly hedged.
