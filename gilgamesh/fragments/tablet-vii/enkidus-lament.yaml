  body: 'Энкиду лежит на смертном одре двенадцать дней, не в силах подняться [NAS: nms://gilgamesh/tablet-vii/enkidus-lament]. Он обращается к Гильгамешу, говоря, что проклят неким богом и более не способен сражаться [NAS: nms://gilgamesh/tablet-vii/enkidus-lament]. Гильгамеш, услышав слова друга, горько плачет и обещает молить великих богов — Ану, Энлиля и Шамаша — о милосердии [NAS: nms://gilgamesh/tablet-vii/enkidus-lament]. Шамаш, согласно тексту, отвечает с небес, предупреждая, что судьба изречена и не может быть отменена [NAS: nms://gilgamesh/tablet-vii/enkidus-lament]. Энкиду рассказывает другу страшный сон: некое существо с орлиными крыльями и когтями схватило его и увлекло в Дом праха — царство мёртвых, где обитают лишённые света тени [NAS: nms://gilgamesh/tablet-vii/enkidus-lament]. В этом подземном мире Энкиду видит прежних царей, жрецов и легендарных героев, а царица Эрешкигаль и её писец Белет-цери фиксируют его судьбу [NAS: nms://gilgamesh/tablet-vii/enkidus-lament]. Сегмент завершается просьбой умирающего Энкиду к другу хранить о нём память [NAS: nms://gilgamesh/tablet-vii/enkidus-lament].'
