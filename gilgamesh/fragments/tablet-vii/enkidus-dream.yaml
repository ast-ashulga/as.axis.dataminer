  body: 'Седьмая таблица открывается сценой, в которой Энкиду рассказывает Гильгамешу о тревожном сне [NAS: nms://gilgamesh/tablet-vii/enkidus-dream]. На совете богов — Ану, Эллиля и Шамаша — решается судьба героев, убивших Хумбабу и Небесного Быка [NAS: nms://gilgamesh/tablet-vii/enkidus-dream]. Эллиль постановляет, что именно Энкиду должен умереть вместо Гильгамеша, тогда как Шамаш возражает против этого приговора [NAS: nms://gilgamesh/tablet-vii/enkidus-dream]. Затем Энкиду обращается к деревянной двери храма, которую он некогда изготовил в дар Эллилю из кедра Хумбабова леса [NAS: nms://gilgamesh/tablet-vii/enkidus-dream]. Он горько укоряет дверь, лишённую разума, сожалея, что посвятил ей столь редкостное дерево, и говорит, что лучше разрубил бы её в щепы, узнай он о грядущей расплате [NAS: nms://gilgamesh/tablet-vii/enkidus-dream]. Таким образом, эпизод представляет Энкиду как обречённого героя, осознающего неотвратимость своей гибели [NAS: nms://gilgamesh/tablet-vii/enkidus-dream].'
