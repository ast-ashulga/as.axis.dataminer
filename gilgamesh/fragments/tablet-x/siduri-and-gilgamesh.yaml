  body: 'Гильгамеш, облачённый в звериные шкуры и несущий на лице следы горя и долгих скитаний, приближается к жилищу Сидури — хозяйки богов, обитающей у берега моря [NAS: nms://gilgamesh/tablet-x/siduri-and-gilgamesh]. Увидев его издали, Сидури принимает странника за разбойника и запирает двери на засов, однако Гильгамеш угрожает выломать их [NAS: nms://gilgamesh/tablet-x/siduri-and-gilgamesh]. В ответ на расспросы хозяйки он раскрывает свою скорбь: гибель Энкиду, которого он оплакивал шесть дней и семь ночей, не предавая земле, породила в нём невыносимый страх смерти [NAS: nms://gilgamesh/tablet-x/siduri-and-gilgamesh]. Сидури произносит знаменитое наставление: боги предназначили смерть людям, удержав жизнь в своих руках, а потому герою следует радоваться земным благам — пиру, чистым одеждам, объятиям супруги и детям [NAS: nms://gilgamesh/tablet-x/siduri-and-gilgamesh]. Тем не менее Гильгамеш настаивает на пути к Утнапишти, и Сидури, по всей видимости, указывает ему на перевозчика Уршанаби как на единственного возможного помощника в пересечении вод смерти [NAS: nms://gilgamesh/tablet-x/siduri-and-gilgamesh].'
