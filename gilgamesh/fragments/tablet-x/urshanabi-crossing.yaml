  body: 'Гильгамеш, услышав слова таверщицы, направляется к берегу, где встречает перевозчика Уршанаби [NAS: nms://gilgamesh/tablet-x/urshanabi-crossing]. В ходе встречи герой, согласно тексту, в приступе ярости уничтожает «каменных идолов» — особых талисманов, охранявших Уршанаби от прикосновения вод смерти [NAS: nms://gilgamesh/tablet-x/urshanabi-crossing]. Уршанаби объясняет, что без этих защитных предметов переправа крайне затруднена, и повелевает Гильгамешу срубить сто двадцать шестов длиной около пятнадцати саженей каждый [NAS: nms://gilgamesh/tablet-x/urshanabi-crossing]. Гильгамеш исполняет это приказание, после чего оба вступают на судно и отправляются в плавание [NAS: nms://gilgamesh/tablet-x/urshanabi-crossing]. Путь, рассчитанный на шесть недель, они преодолевают за три дня, достигая вод смерти, где шесты поочерёдно ломаются и Гильгамеш, по всей видимости, использует собственную одежду в качестве паруса [NAS: nms://gilgamesh/tablet-x/urshanabi-crossing].'
