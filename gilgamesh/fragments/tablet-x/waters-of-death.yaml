  body: 'Переправившись через воды смерти, Гильгамеш использует сто двадцать шестов, чтобы не касаться смертоносных вод руками, а когда шесты заканчиваются, поднимает одежду как парус [NAS: nms://gilgamesh/tablet-x/waters-of-death]. Утнапиштим, наблюдая издали, с удивлением замечает незнакомца на судне и не может распознать, кто перед ним [NAS: nms://gilgamesh/tablet-x/waters-of-death]. Гильгамеш обращается к Утнапиштиму и рассказывает о своих странствиях через горы и моря, о лишениях, истлевшей одежде и пропитании дичью [NAS: nms://gilgamesh/tablet-x/waters-of-death]. В ответ Утнапиштим произносит речь о природе смертности: он указывает, что ничто на земле не вечно — ни дома, ни братские узы, ни реки [NAS: nms://gilgamesh/tablet-x/waters-of-death]. Согласно тексту, великие боги Ануннаки вместе с богиней Мамет определяют судьбы людей, устанавливая границу между жизнью и смертью, однако не открывают смертного часа [NAS: nms://gilgamesh/tablet-x/waters-of-death].'
