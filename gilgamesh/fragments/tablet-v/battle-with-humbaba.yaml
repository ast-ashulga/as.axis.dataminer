  body: 'Пятая таблица эпоса описывает кульминационную битву Гильгамеша и Энкиду с Хумбабой, стражем Кедрового леса [NAS: nms://gilgamesh/tablet-v/battle-with-humbaba]. Гильгамеш поднимает боевой топор и извлекает меч, нанося Хумбабе удар в затылок, тогда как Энкиду одновременно поражает его в грудь [NAS: nms://gilgamesh/tablet-v/battle-with-humbaba]. На третьем ударе, согласно тексту, страж падает и его тело замирает [NAS: nms://gilgamesh/tablet-v/battle-with-humbaba]. Гибель Хумбабы сопровождается, по всей видимости, космическим резонансом: кедры стонут на два поприща вокруг, а горы и лесистые вершины объемлет покой [NAS: nms://gilgamesh/tablet-v/battle-with-humbaba]. Текст также сообщает об уничтожении семи «лучей» Хумбабы и снятии с его тела боевого снаряжения весом в пятнадцать талантов [NAS: nms://gilgamesh/tablet-v/battle-with-humbaba].'
