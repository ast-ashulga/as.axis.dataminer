  body: 'Восьмая таблица эпоса описывает реакцию Гильгамеша на смерть Энкиду и совершение погребальных обрядов [NAS: nms://gilgamesh/tablet-viii/funeral-rites]. Согласно тексту, Гильгамеш на протяжении шести дней и ночей пребывал подле тела друга, отказываясь признать его гибель [NAS: nms://gilgamesh/tablet-viii/funeral-rites]. Жители Урука собираются к герою и указывают на разительную перемену в его облике — опущенный взор, изборождённое морщинами чело и неутихающую скорбь [NAS: nms://gilgamesh/tablet-viii/funeral-rites]. Гильгамеш созывает ремесленников — ваятелей, медников, кузнецов и камнерезов — с целью изготовления статуи Энкиду, которая, судя по тексту, должна была быть выполнена из золота, алебастра и лазури [NAS: nms://gilgamesh/tablet-viii/funeral-rites]. Герой укладывает тело друга на почётном ложе, повелевает народу Урука совершить траурные обряды и сам облачается в рубище и львиную шкуру [NAS: nms://gilgamesh/tablet-viii/funeral-rites]. Текст также сообщает, что Гильгамеш готовит подношение богу Шамашу — сосуды с мёдом и маслом, — а голос с неба, по всей видимости принадлежащий Эллилю, напоминает о неизбежности человеческого удела [NAS: nms://gilgamesh/tablet-viii/funeral-rites].'
