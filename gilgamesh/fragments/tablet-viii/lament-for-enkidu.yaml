  body: 'На рассвете восьмой таблицы Гильгамеш обращается с плачем к умершему Энкиду, призывая природу, животных, реки и жителей Урука разделить его скорбь [NAS: nms://gilgamesh/tablet-viii/lament-for-enkidu]. Он перечисляет тех, кто должен оплакивать друга: кедры и кипарисы, дикие звери степи, воды Евфрата, старейшины и женщины Урука, слуги и блудница, умастившая Энкиду [NAS: nms://gilgamesh/tablet-viii/lament-for-enkidu]. Гильгамеш именует Энкиду «младшим братом», «пантерой пустыни» и перечисляет их общие подвиги — победу над Хумбабой и убийство Небесного быка [NAS: nms://gilgamesh/tablet-viii/lament-for-enkidu]. Обнаружив, что сердце друга не бьётся, Гильгамеш в отчаянии бросается на тело, подобно львице, потерявшей детёнышей, рвёт одежду и волосы, снимает с себя царские знаки [NAS: nms://gilgamesh/tablet-viii/lament-for-enkidu]. Таким образом, эпизод представляет развёрнутый ритуальный плач, в котором личная утрата Гильгамеша соединяется с космическим измерением скорби [NAS: nms://gilgamesh/tablet-viii/lament-for-enkidu].'
