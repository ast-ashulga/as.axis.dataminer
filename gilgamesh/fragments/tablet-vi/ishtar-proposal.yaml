  body: 'После победы над Хумбабой Гильгамеш омывается и облачается в чистые одежды, украшает себя тиарой [NAS: nms://gilgamesh/tablet-vi/ishtar-proposal]. Богиня Иштар, увидев его красоту, предлагает ему стать её супругом, обещая богатую колесницу из ляпис-лазури и золота, покорность царей и процветание стад [NAS: nms://gilgamesh/tablet-vi/ishtar-proposal]. Гильгамеш отвергает предложение богини, уподобляя её любовь буре, смоле и ветхим дверям, неспособным защитить от непогоды [NAS: nms://gilgamesh/tablet-vi/ishtar-proposal]. В обоснование отказа герой перечисляет прежних возлюбленных Иштар: Таммуза, обречённого на вечные стенания; пастуха, превращённого в гиену; льва, коня и садовника Ишуллану, которого богиня, по тексту, обратила в крысу [NAS: nms://gilgamesh/tablet-vi/ishtar-proposal]. Таким образом, отказ Гильгамеша представляет собой редкий в древней литературе случай открытого противостояния смертного и великой богини [NAS: nms://gilgamesh/tablet-vi/ishtar-proposal].'
