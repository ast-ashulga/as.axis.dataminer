  body: 'Оскорблённая словами Гильгамеша, богиня Иштар поднимается на небо и предстаёт перед своим отцом Ану с жалобой на героя [NAS: nms://gilgamesh/tablet-vi/bull-of-heaven]. Она требует у Ану ниспослать Небесного Быка, угрожая в случае отказа разрушить врата подземного мира и выпустить мёртвых на землю [NAS: nms://gilgamesh/tablet-vi/bull-of-heaven]. Ану уступает её требованию, и Небесный Бык низводится в Урук, где своим дыханием повергает в гибельные ямы сотни горожан [NAS: nms://gilgamesh/tablet-vi/bull-of-heaven]. При третьем дыхании Быка Энкиду хватает его за рога, и Гильгамеш поражает чудовище кинжалом между рогами и шеей [NAS: nms://gilgamesh/tablet-vi/bull-of-heaven]. Герои вырывают сердце Быка и возлагают его перед богом Шамашем [NAS: nms://gilgamesh/tablet-vi/bull-of-heaven]. Разъярённая Иштар произносит проклятие, однако Энкиду бросает в неё ногу убитого животного [NAS: nms://gilgamesh/tablet-vi/bull-of-heaven]. Гильгамеш посвящает рога Быка своему божеству Лугальбанде, и герои торжественно возвращаются в Урук [NAS: nms://gilgamesh/tablet-vi/bull-of-heaven].'
