  body: 'Иштар поднимается на стену Урука и, охваченная скорбью, произносит проклятие против Гильгамеша, убившего Небесного быка [NAS: nms://gilgamesh/tablet-vi/enkidus-curse]. Энкиду, услышав её слова, вырывает часть тела быка и бросает её в лицо богине, сопровождая этот жест дерзкими угрозами [NAS: nms://gilgamesh/tablet-vi/enkidus-curse]. В ответ Иштар созывает блудниц и плакальщиц, чтобы оплакать поверженного быка [NAS: nms://gilgamesh/tablet-vi/enkidus-curse]. Гильгамеш тем временем собирает ремесленников и хвастается рогами быка, украшенными лазуритом, которые он посвящает своему богу Лугальбанде [NAS: nms://gilgamesh/tablet-vi/enkidus-curse]. Герои триумфально шествуют по улицам Урука, а Гильгамеш провозглашает своё и Энкиду величие перед горожанами [NAS: nms://gilgamesh/tablet-vi/enkidus-curse]. Эпизод завершается пиром во дворце, после которого Энкиду засыпает и видит сон, толкование которого он намеревается сообщить другу [NAS: nms://gilgamesh/tablet-vi/enkidus-curse].'
