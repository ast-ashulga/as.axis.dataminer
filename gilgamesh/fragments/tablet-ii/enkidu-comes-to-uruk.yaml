  body: 'Энкиду, ведомый блудницей, прибывает в окрестности Урука, где пастухи узнают в нём существо, схожее с Гильгамешем обликом, но отличное происхождением [NAS: nms://gilgamesh/tablet-ii/enkidu-comes-to-uruk]. Блудница обучает его есть хлеб и пить сикеру — семь кувшинов, после чего, согласно тексту, душа Энкиду возрадовалась, и он умастился елеем, оделся и уподобился людям [NAS: nms://gilgamesh/tablet-ii/enkidu-comes-to-uruk]. Обретя человеческий облик, он берёт оружие и становится защитником пастухов от львов и волков [NAS: nms://gilgamesh/tablet-ii/enkidu-comes-to-uruk]. Блудница описывает Энкиду величие Гильгамеша, которого любят боги Шамаш, Ану, Бел и Эа, и сообщает, что Гильгамеш уже видел его во сне как могучего соперника [NAS: nms://gilgamesh/tablet-ii/enkidu-comes-to-uruk]. Мать Гильгамеша толкует сон как предвестие верного друга [NAS: nms://gilgamesh/tablet-ii/enkidu-comes-to-uruk]. Встреча двух героев завершается тем, что Энкиду преграждает Гильгамешу путь в брачный покой, после чего они садятся рядом, как братья [NAS: nms://gilgamesh/tablet-ii/enkidu-comes-to-uruk].'
