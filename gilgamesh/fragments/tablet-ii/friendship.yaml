  body: 'Во второй таблице эпоса Гильгамеш замечает, что Энкиду опечален и плачет, и спрашивает о причине его горя [NAS: nms://gilgamesh/tablet-ii/friendship]. Энкиду отвечает, что томится бездействием и чувствует, как иссякает его сила [NAS: nms://gilgamesh/tablet-ii/friendship]. В ответ Гильгамеш предлагает другу совершить поход на далёкие Ливанские горы, чтобы сразить чудовище Хумбабу и тем самым истребить зло в мире, а также снискать себе вечную славу [NAS: nms://gilgamesh/tablet-ii/friendship]. Энкиду предостерегает: Хумбаба наделён силой Шамаша и отвагой Адду, а Эллиль поставил его стражем кедрового леса, внушая людям страх [NAS: nms://gilgamesh/tablet-ii/friendship]. Гильгамеш возражает, что человеческая жизнь конечна и что смелость важнее страха смерти, обещая идти впереди и оставить после себя доброе имя [NAS: nms://gilgamesh/tablet-ii/friendship]. Таким образом, данный эпизод представляет ключевой момент формирования героического замысла: дружба и стремление к бессмертной славе побуждают двух героев решиться на опасное предприятие [NAS: nms://gilgamesh/tablet-ii/friendship].'
