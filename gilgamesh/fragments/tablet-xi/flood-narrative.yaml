  body: 'Утнапишти раскрывает Гильгамешу тайное решение богов: совет во главе с Ану, Эллилем и Эа постановил устроить потоп [NAS: nms://gilgamesh/tablet-xi/flood-narrative]. Бог Эа, не нарушая клятвы напрямую, передаёт предупреждение через тростниковую стену: Утнапишти, сыну Убар-Туту, велено разрушить дом и выстроить корабль [NAS: nms://gilgamesh/tablet-xi/flood-narrative]. Согласно тексту, герой строит огромное судно с шестью палубами и девятью отсеками, грузит на него семью, мастеров, скот и всё серебро и золото [NAS: nms://gilgamesh/tablet-xi/flood-narrative]. По знаку Шамаша Утнапишти входит на корабль; разражается страшная буря под предводительством Адада, которая длится шесть дней и семь ночей [NAS: nms://gilgamesh/tablet-xi/flood-narrative]. Иштар горестно сожалеет о гибели людей, а боги в страхе жмутся к небу Ану [NAS: nms://gilgamesh/tablet-xi/flood-narrative]. На седьмой день корабль останавливается у горы Ницир; Утнапишти последовательно выпускает голубя, ласточку и ворона, и лишь ворон не возвращается [NAS: nms://gilgamesh/tablet-xi/flood-narrative]. Герой приносит жертву, боги слетаются на её запах, однако Иштар требует не подпускать Эллиля к жертвоприношению за то, что он не размыслил,'
