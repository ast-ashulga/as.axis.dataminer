  body: 'Ут-напишти бросает Гильгамешу вызов: не спать шесть дней и семь ночей, намекая, что неспособность победить сон свидетельствует о невозможности обрести бессмертие [NAS: nms://gilgamesh/tablet-xi/sleep-challenge]. Однако едва герой садится на землю, сон немедленно овладевает им — в обоих переводах он уподобляется буре или пустынной мгле [NAS: nms://gilgamesh/tablet-xi/sleep-challenge]. Супруга Ут-напишти предлагает разбудить Гильгамеша, однако Ут-напишти, по всей видимости, скептически отзывается о человеческой природе и велит ей печь хлебы у изголовья спящего, отмечая прошедшие дни [NAS: nms://gilgamesh/tablet-xi/sleep-challenge]. Семь хлебов фиксируют семь дней сна: их последовательное разложение служит неопровержимым вещественным доказательством [NAS: nms://gilgamesh/tablet-xi/sleep-challenge]. Проснувшись, Гильгамеш утверждает, что спал лишь мгновение, но хлебы опровергают его слова [NAS: nms://gilgamesh/tablet-xi/sleep-challenge]. Герой признаёт своё поражение, восклицая, что смерть преследует его повсюду [NAS: nms://gilgamesh/tablet-xi/sleep-challenge].'
