  body: 'Гильгамеш, привязав к ногам тяжёлые камни, погружается на дно океана и добывает растение вечной молодости, которое, согласно тексту, способно возвращать старику юность [NAS: nms://gilgamesh/tablet-xi/plant-of-immortality]. Герой намеревается доставить его в Урук и разделить с согражданами, называя растение «старик становится юным» [NAS: nms://gilgamesh/tablet-xi/plant-of-immortality]. Однако во время привала у колодца с пресной водой змея, почуяв запах чудесного растения, похищает его, одновременно сбрасывая собственную кожу — деталь, которую текст, по всей видимости, связывает с обретением змеёй способности к обновлению [NAS: nms://gilgamesh/tablet-xi/plant-of-immortality]. Гильгамеш в отчаянии плачет и в горестном монологе, обращённом к лодочнику Уршанаби, сетует на тщетность своих усилий [NAS: nms://gilgamesh/tablet-xi/plant-of-immortality]. Утнапишти, согласно версии Дьяконова, также повелевает Уршанаби омыть и переодеть героя перед возвращением в Урук [NAS: nms://gilgamesh/tablet-xi/plant-of-immortality].'
