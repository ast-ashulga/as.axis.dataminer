  body: 'Данный фрагмент соответствует лакуне в используемом источнике: текст обрывается в середине наставлений Утнапиштима лодочнику Уршанаби [NAS: nms://gilgamesh/tablet-xi/lacuna-end-of-plant-and-return]. Согласно каноническому тексту Стандартной вавилонской версии, восстанавливаемому по Джорджу (2003), далее следуют эпизоды обнаружения Гильгамешем растения бессмертия на морском дне, его похищения змеёй и скорбного монолога героя [NAS: nms://gilgamesh/tablet-xi/lacuna-end-of-plant-and-return]. Завершение таблички XI, по всей видимости, включало возвращение Гильгамеша в Урук и его созерцание городских стен [NAS: nms://gilgamesh/tablet-xi/lacuna-end-of-plant-and-return]. Таблица XII, повествующая о нисхождении за пуккой, также отсутствует в данном источнике [NAS: nms://gilgamesh/tablet-xi/lacuna-end-of-plant-and-return].'
