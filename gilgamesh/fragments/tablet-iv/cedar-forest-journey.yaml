  body: 'Четвёртая таблица эпоса описывает совместное путешествие Гильгамеша и Энкиду к Кедровому лесу [NAS: nms://gilgamesh/tablet-iv/cedar-forest-journey]. По мере приближения к лесу Энкиду охватывает страх и слабость: его руки немеют, тело теряет силы, и он убеждает друга отступить [NAS: nms://gilgamesh/tablet-iv/cedar-forest-journey]. Энкиду напоминает, что страж леса Хумбаба наделён устрашающей силой — его голос подобен буре, а дыхание несёт гибель всякому, кто осмелится войти под кедры [NAS: nms://gilgamesh/tablet-iv/cedar-forest-journey]. В ответ Гильгамеш призывает друга преодолеть страх, указывая, что вместе они сильнее, чем поодиночке, — текст использует образ троекратно скрученного каната, который трудно разорвать [NAS: nms://gilgamesh/tablet-iv/cedar-forest-journey]. Гильгамеш обещает, что осторожный и решительный воин сохранит и себя, и товарища, а их имена прославятся в веках [NAS: nms://gilgamesh/tablet-iv/cedar-forest-journey].'
