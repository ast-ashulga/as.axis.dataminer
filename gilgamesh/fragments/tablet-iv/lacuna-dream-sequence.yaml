  body: 'На четвёртой табличке Стандартной вавилонской версии эпоса текст, по всей видимости, содержал серию пророческих снов Гильгамеша, приснившихся ему во время похода к Кедровому лесу [NAS: nms://gilgamesh/tablet-iv/lacuna-dream-sequence]. Согласно реконструкции Джорджа (2003), каждый сон толковался Энкиду как благоприятное предзнаменование перед встречей с Хумбабой [NAS: nms://gilgamesh/tablet-iv/lacuna-dream-sequence]. Однако в источнике Дьяконова (1961) данный эпизод отсутствует, что учёные объясняют либо лакуной в используемых табличках, либо намеренным сокращением при переводе [NAS: nms://gilgamesh/tablet-iv/lacuna-dream-sequence]. Таким образом, полноценная реконструкция сновидческой последовательности возможна лишь на основании сводного анализа сохранившихся клинописных фрагментов, а не данного конкретного источника [NAS: nms://gilgamesh/tablet-iv/lacuna-dream-sequence].'
