  body: 'Третья таблица эпоса содержит сцену, в которой старейшины Урука обращаются к Гильгамешу перед его выступлением в поход [NAS: nms://gilgamesh/tablet-iii/elders-counsel]. Согласно тексту, они наставляют царя не полагаться на одну лишь собственную силу и советуют ему сохранять хладнокровие в бою [NAS: nms://gilgamesh/tablet-iii/elders-counsel]. Особая роль в этих наставлениях отводится Энкиду: старейшины указывают, что именно он должен идти впереди, поскольку знает дорогу к кедровому лесу и имеет опыт сражений [NAS: nms://gilgamesh/tablet-iii/elders-counsel]. Текст, по всей видимости, подчёркивает взаимную ответственность двух героев: Энкиду поручается оберегать Гильгамеша в пути, а совет старейшин символически вверяет царя под его защиту [NAS: nms://gilgamesh/tablet-iii/elders-counsel]. Помимо этого, отрывок, судя по переводу Гумилёва, включает намерение Гильгамеша посетить богиню Нинсун — свою мать — перед отходом [NAS: nms://gilgamesh/tablet-iii/elders-counsel].'
