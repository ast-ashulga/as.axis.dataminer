  body: 'По повелению Гильгамеша охотник отправляется в пустыню, взяв с собой блудницу Шамхат, и они трое суток идут до водопоя, где обитает Энкиду [NAS: nms://gilgamesh/tablet-i/shamhat-and-enkidu]. Там Шамхат обнажается перед диким человеком, и их соитие продолжается, согласно тексту, шесть дней и семь ночей [NAS: nms://gilgamesh/tablet-i/shamhat-and-enkidu]. После этого Энкиду обращается к своим зверям, однако газели и прочие животные пустыни бегут от него, а его тело, по свидетельству источника, становится тяжёлым и теряет прежнюю прыть [NAS: nms://gilgamesh/tablet-i/shamhat-and-enkidu]. Тем не менее текст указывает, что взамен Энкиду обретает новый разум [NAS: nms://gilgamesh/tablet-i/shamhat-and-enkidu]. Шамхат убеждает его отправиться в Урук к Гильгамешу, описывая последнего как совершенного силой владыку людей [NAS: nms://gilgamesh/tablet-i/shamhat-and-enkidu]. Энкиду соглашается, желая найти достойного соперника и друга [NAS: nms://gilgamesh/tablet-i/shamhat-and-enkidu].'
