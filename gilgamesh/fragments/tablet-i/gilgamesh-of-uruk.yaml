  body: 'Первая таблица эпоса открывается восхвалением Гильгамеша как существа, «на две трети бога и на одну — человека», обладающего несравненной мудростью и видевшего «всё до края вселенной» [NAS: nms://gilgamesh/tablet-i/gilgamesh-of-uruk]. Ему приписывается строительство великой стены Урука и священного храма Эаны, кирпичи которой, согласно тексту, были заложены семью мудрецами [NAS: nms://gilgamesh/tablet-i/gilgamesh-of-uruk]. Вместе с тем жители Урука жалуются на тираническое поведение царя: он не оставляет сына отцу и невесты жениху, днём и ночью притесняя подданных [NAS: nms://gilgamesh/tablet-i/gilgamesh-of-uruk]. Их мольбы достигают богов, которые обращаются к богине Аруру с просьбой создать Гильгамешу равного соперника, дабы город мог обрести покой [NAS: nms://gilgamesh/tablet-i/gilgamesh-of-uruk]. Таким образом, пассаж одновременно прославляет героя и обозначает нарративный импульс к появлению Энкиду [NAS: nms://gilgamesh/tablet-i/gilgamesh-of-uruk].'
