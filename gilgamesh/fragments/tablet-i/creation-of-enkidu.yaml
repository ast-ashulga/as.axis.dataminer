  body: 'Богиня Аруру, услышав обращённую к ней просьбу, создаёт в своём сердце образ, подобный Ану, затем умывает руки, лепит из глины существо и бросает его на землю [NAS: nms://gilgamesh/tablet-i/creation-of-enkidu]. Так появляется Энкиду — герой, порождение дикой природы, чьё тело покрыто шерстью, а волосы, согласно тексту, ниспадают подобно густым колосьям [NAS: nms://gilgamesh/tablet-i/creation-of-enkidu]. Он не ведает ни людей, ни цивилизации: пасётся среди газелей, пьёт воду вместе со зверями и одет лишь подобно богу Сумукану [NAS: nms://gilgamesh/tablet-i/creation-of-enkidu]. Охотник трижды встречает Энкиду у водопоя и, объятый страхом, возвращается домой с помрачневшим лицом [NAS: nms://gilgamesh/tablet-i/creation-of-enkidu]. Он отправляется в Урук и сообщает Гильгамешу, что некий могучий муж из гор засыпает его ловушки, вырывает сети и уводит степных зверей [NAS: nms://gilgamesh/tablet-i/creation-of-enkidu].'
