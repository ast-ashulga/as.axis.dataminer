  body: 'Гильгамеш вступает в подземный тоннель, по которому движется солнце, и проходит его в кромешной тьме [NAS: nms://gilgamesh/tablet-ix/garden-of-gems]. Текст, по-видимому, структурирован как ритмическое повторение: герой преодолевает двенадцать «поприщ» (двойных часов пути), на каждом из которых отмечается полная темнота и отсутствие ориентиров [NAS: nms://gilgamesh/tablet-ix/garden-of-gems]. Лишь на девятом отрезке, согласно версии Дьяконова, Гильгамеш ощущает дуновение холодного ветра, а на двенадцатом появляется свет [NAS: nms://gilgamesh/tablet-ix/garden-of-gems]. Выйдя из тоннеля, герой обнаруживает чудесный сад, где деревья плодоносят драгоценными камнями — сердоликом, лазуритом, изумрудом и иными самоцветами [NAS: nms://gilgamesh/tablet-ix/garden-of-gems]. Гильгамеш поднимает взор на это дивное зрелище, и текст, судя по обеим версиям, акцентирует визуальное потрясение героя перед садом богов [NAS: nms://gilgamesh/tablet-ix/garden-of-gems].'
