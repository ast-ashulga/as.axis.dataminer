  body: 'Девятая таблица открывается изображением Гильгамеша, охваченного горем после гибели Энкиду: он горько оплакивает друга и бежит в пустыню [NAS: nms://gilgamesh/tablet-ix/gilgamesh-wandering]. Страх собственной смерти побуждает героя предпринять путь к Утнапишти, сыну Убар-Туту, в надежде обрести бессмертие или его тайну [NAS: nms://gilgamesh/tablet-ix/gilgamesh-wandering]. Достигнув горных перевалов ночью, Гильгамеш встречает львов и, согласно тексту, испытывает страх [NAS: nms://gilgamesh/tablet-ix/gilgamesh-wandering]. Герой возносит молитвы богу луны Сину и прочим богам с просьбой о защите [NAS: nms://gilgamesh/tablet-ix/gilgamesh-wandering]. Перевод Дьяконова указывает, что после пробуждения Гильгамеш видит резвящихся львов и вступает с ними в схватку, поражая их топором и мечом [NAS: nms://gilgamesh/tablet-ix/gilgamesh-wandering]. Таким образом, эпизод представляет героя в состоянии экзистенциального кризиса, движимого страхом смертности [NAS: nms://gilgamesh/tablet-ix/gilgamesh-wandering].'
