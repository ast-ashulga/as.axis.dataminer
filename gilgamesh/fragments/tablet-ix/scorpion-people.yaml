  body: 'Гильгамеш достигает горы Машу [NAS: nms://gilgamesh/tablet-ix/scorpion-people], у врат которой стоят стражи — люди-скорпионы, чей устрашающий облик, согласно тексту, простирается от небесного свода до преисподней [NAS: nms://gilgamesh/tablet-ix/scorpion-people]. Увидев их, герой испытывает страх, однако собирает решимость и приближается к ним [NAS: nms://gilgamesh/tablet-ix/scorpion-people]. Страж-скорпион замечает, что тело Гильгамеша подобно телу бога, а его супруга уточняет: герой на две трети бог и лишь на одну — человек [NAS: nms://gilgamesh/tablet-ix/scorpion-people]. Гильгамеш объясняет цель своего пути: он скорбит о погибшем Энкиду и стремится найти бессмертного Утнапишти, чтобы узнать тайну жизни и смерти [NAS: nms://gilgamesh/tablet-ix/scorpion-people]. Человек-скорпион предупреждает, что путь сквозь гору длиной в двенадцать поприщ непроглядно тёмен и прежде его не одолевал ни один смертный [NAS: nms://gilgamesh/tablet-ix/scorpion-people]. Невзирая на предостережения, Гильгамеш настаивает на продолжении пути, и страж открывает перед ним врата горы Машу [NAS: nms://gilgamesh/tablet-ix/scorpion-people].'
