# All feature flags default to false (P-06).
# Never change these here — override via environment or explicit CLI flag only.

# Phase F: automated parallel detection (deferred post-M2; requires ≥2 confirmed traditions)
parallel_detection_pipeline: false

# Layer 3 original-language fragments (ingested but not served to users)
layer_3_original: false

# Campbell monomyth annotation track (unscoped; separate product decision required)
campbell_track: false

# Derive phase: structured Meridian export artifacts from confirmed annotations
# Deferred until output format is stable and validated against all three traditions
derived_exports: false

# Constellate phase: cross-tradition constellation candidate generation
# Requires derived_exports to have been run for each tradition first.
# Same toggle pattern as derived_exports: set true, run, revert; never commit true.
constellation_candidates: false

# Phase B extension run: propose 4-segment sub-episode NAS for named confirmed parent episodes.
# Gates the --sub-episodes CLI option on `sisyphus segment`. Never commit true.
sub_episode_extension: false

# Derive-taxonomy phase: source-grounded taxonomy generation.
# Derives segmentation rules from actual source text via Phase A structure scan + LLM.
# Set true to run 'sisyphus derive-taxonomy <tradition>'. Revert after each run.
taxonomy_derivation: false
